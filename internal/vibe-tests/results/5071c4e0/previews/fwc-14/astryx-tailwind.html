<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>fwc-14 — astryx-tailwind</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --background: 0 0% 100%;
      --foreground: 222.2 84% 4.9%;
      --card: 0 0% 100%;
      --card-foreground: 222.2 84% 4.9%;
      --popover: 0 0% 100%;
      --popover-foreground: 222.2 84% 4.9%;
      --primary: 222.2 47.4% 11.2%;
      --primary-foreground: 210 40% 98%;
      --secondary: 210 40% 96.1%;
      --secondary-foreground: 222.2 47.4% 11.2%;
      --muted: 210 40% 96.1%;
      --muted-foreground: 215.4 16.3% 46.9%;
      --accent: 210 40% 96.1%;
      --accent-foreground: 222.2 47.4% 11.2%;
      --destructive: 0 84.2% 60.2%;
      --destructive-foreground: 210 40% 98%;
      --border: 214.3 31.8% 91.4%;
      --input: 214.3 31.8% 91.4%;
      --ring: 222.2 84% 4.9%;
      --radius: 0.5rem;
    }
  </style>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            border: 'hsl(var(--border))',
            input: 'hsl(var(--input))',
            ring: 'hsl(var(--ring))',
            background: 'hsl(var(--background))',
            foreground: 'hsl(var(--foreground))',
            primary: { DEFAULT: 'hsl(var(--primary))', foreground: 'hsl(var(--primary-foreground))' },
            secondary: { DEFAULT: 'hsl(var(--secondary))', foreground: 'hsl(var(--secondary-foreground))' },
            destructive: { DEFAULT: 'hsl(var(--destructive))', foreground: 'hsl(var(--destructive-foreground))' },
            muted: { DEFAULT: 'hsl(var(--muted))', foreground: 'hsl(var(--muted-foreground))' },
            accent: { DEFAULT: 'hsl(var(--accent))', foreground: 'hsl(var(--accent-foreground))' },
            popover: { DEFAULT: 'hsl(var(--popover))', foreground: 'hsl(var(--popover-foreground))' },
            card: { DEFAULT: 'hsl(var(--card))', foreground: 'hsl(var(--card-foreground))' },
          },
          borderRadius: {
            lg: 'var(--radius)',
            md: 'calc(var(--radius) - 2px)',
            sm: 'calc(var(--radius) - 4px)',
          },
        },
      },
    }
  </script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: system-ui, -apple-system, sans-serif; }
    #root { min-height: 100%; }

/**
 * Astryx Reset Stylesheet
 *
 * An opinionated CSS reset that provides a clean, predictable base for
 * Astryx applications. Built on the same principles as Tailwind Preflight
 * and modern-normalize, adapted for the Astryx design system.
 *
 * This reset:
 * - Normalizes cross-browser inconsistencies
 * - Sets box-sizing: border-box universally
 * - Removes default margins, padding, and list styles
 * - Makes images block-level and responsive
 * - Resets form elements to inherit font styles
 * - Uses :where() for zero specificity (easy to override)
 *
 * Usage:
 *
 * 1. Import directly (global reset):
 *    import '@astryxdesign/core/reset.css';
 *
 * 2. Combine with base styles and theme:
 *    import '@astryxdesign/core/reset.css';        // @layer reset  — clean slate
 *    import '@astryxdesign/core/astryx.css';        // @layer astryx-base — component styles
 *    import '@astryxdesign/theme-neutral/theme.css'; // @layer astryx-theme — theme overrides
 *
 * Layer order: reset → astryx-base → astryx-theme
 * Consumer styles (unlayered) always override all Astryx layers.
 * The reset has the lowest priority and can be overridden by any other layer.
 *
 * Similar to:
 * - Tailwind CSS Preflight
 * - Chakra UI's preflight (v3)
 * - Bootstrap Reboot
 * - modern-normalize
 */

@layer reset {

  /* ===========================================================================
     Box Model
     =========================================================================== */

  /*
   * Use border-box globally. Prevents padding/border from affecting
   * element dimensions — the single most impactful reset.
   */
  :where(*, *::before, *::after) {
    box-sizing: border-box;
  }

  /*
   * Reset borders to 0-width solid. This lets you add a border by just
   * setting border-width — no need to also specify border-style.
   */
  :where(*, *::before, *::after) {
    border-width: 0;
    border-style: solid;
    border-color: currentColor;
  }

  /* ===========================================================================
     Document
     =========================================================================== */

  /*
   * Consistent line-height, prevent text size adjustment on orientation
   * change in iOS, and set a readable tab size.
   *
   * color-scheme: light dark — declares that this page supports both modes,
   * enabling CSS light-dark() to resolve correctly. Also ensures that CSS
   * tools (e.g. LightningCSS) which polyfill light-dark() for older browsers
   * inject their toggle-variable initialization in the same CSS bundle.
   * XDSTheme overrides color-scheme per-wrapper as needed.
   */
  :where(html) {
    line-height: 1.5;
    -webkit-text-size-adjust: 100%;
    tab-size: 4;
    color-scheme: light dark;
  }

  /*
   * Remove default body margin and set font smoothing for sharper text
   * rendering on macOS/iOS.
   */
  :where(body) {
    margin: 0;
    line-height: inherit;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* ===========================================================================
     Typography
     =========================================================================== */

  /*
   * Reset headings to inherit size and weight. Headings should be styled
   * intentionally — not rely on browser defaults that vary across browsers.
   */
  :where(h1, h2, h3, h4, h5, h6) {
    font-size: inherit;
    font-weight: inherit;
  }

  /*
   * Remove default margins on all block-level text elements.
   */
  :where(h1, h2, h3, h4, h5, h6, p, blockquote, figure, pre, dl, dd) {
    margin: 0;
  }

  /*
   * Links inherit color and text-decoration. Style them intentionally
   * rather than relying on browser-default blue/purple.
   */
  :where(a) {
    color: inherit;
    text-decoration: inherit;
  }

  /*
   * Correct font-weight rendering in Chrome and Safari.
   */
  :where(b, strong) {
    font-weight: bolder;
  }

  /*
   * Use the configured monospace font stack and fix the odd em sizing
   * that browsers apply to code elements.
   */
  :where(code, kbd, samp, pre) {
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas,
      'Liberation Mono', 'Courier New', monospace;
    font-size: 1em;
  }

  /*
   * Correct font-size for small elements.
   */
  :where(small) {
    font-size: 80%;
  }

  /*
   * Prevent sub and sup from affecting line-height.
   */
  :where(sub, sup) {
    font-size: 75%;
    line-height: 0;
    position: relative;
    vertical-align: baseline;
  }

  :where(sub) {
    bottom: -0.25em;
  }

  :where(sup) {
    top: -0.5em;
  }

  /* ===========================================================================
     Lists
     =========================================================================== */

  /*
   * Remove default list styles, margin, and padding. Lists used for
   * navigation or layout shouldn't carry prose styling by default.
   * Use explicit styles for prose lists.
   */
  :where(ol, ul, menu) {
    list-style: none;
    margin: 0;
    padding: 0;
  }

  /* ===========================================================================
     Media
     =========================================================================== */

  /*
   * Make replaced elements block-level. Eliminates the "mystery gap"
   * below inline images and aligns with how these elements are
   * actually used in modern layouts.
   */
  :where(img, svg, video, canvas, audio, iframe, embed, object) {
    display: block;
    vertical-align: middle;
  }

  /*
   * Constrain images and video to their container. Responsive by default.
   */
  :where(img, video) {
    max-width: 100%;
    height: auto;
  }

  /* ===========================================================================
     AspectRatio Fit Baseline
     =========================================================================== */

  /*
   * Child sizing for AspectRatio's `fit` prop — the component marks the
   * child's direct parent with `data-astryx-aspect-ratio-override` (carrying
   * the fit value), and these direct-child rules size the child, so
   * consumers don't hand-write width/height/object-fit on every media child.
   * The marker sits on the parent itself, so the rules don't depend on
   * AspectRatio's internal element structure or its theming surface. As with
   * the [data-astryx-media] baseline below, the rules are zero-specificity
   * and any styling the child sets itself still wins. `fit="center"` needs
   * no rules here — the component centers the child from its own wrapper.
   */
  :where([data-astryx-aspect-ratio-override="cover"], [data-astryx-aspect-ratio-override="contain"])
    > :where(*) {
    width: 100%;
    height: 100%;
  }

  :where([data-astryx-aspect-ratio-override="cover"]) > :where(img, video) {
    object-fit: cover;
  }

  :where([data-astryx-aspect-ratio-override="contain"]) > :where(img, video) {
    object-fit: contain;
  }

  /* ===========================================================================
     Forms
     =========================================================================== */

  /*
   * Form elements should inherit font styles from their parent rather
   * than using the browser's default font stack.
   */
  :where(button, input, optgroup, select, textarea) {
    font: inherit;
    color: inherit;
    margin: 0;
    padding: 0;
  }

  /*
   * Remove default button styling. Buttons should be styled intentionally.
   */
  :where(button, [type='button'], [type='reset'], [type='submit']) {
    -webkit-appearance: button;
    appearance: button;
    background-color: transparent;
    background-image: none;
  }

  /*
   * Pointer cursor for interactive elements.
   */
  :where(button, [role='button']) {
    cursor: pointer;
  }

  /*
   * Default cursor for disabled elements.
   */
  :where(:disabled) {
    cursor: default;
  }

  /*
   * Only allow vertical resizing of textareas to prevent layout breakage.
   */
  :where(textarea) {
    resize: vertical;
  }

  /*
   * Normalize placeholder opacity (Firefox renders at reduced opacity)
   * and set a sensible default color using the Astryx text-placeholder token.
   */
  :where(input::placeholder, textarea::placeholder) {
    opacity: 1;
    color: var(--color-text-secondary, #9ca3af);
  }

  /*
   * Remove the inner padding and cancel buttons in search inputs
   * for Chrome and Safari.
   */
  :where([type='search']::-webkit-search-decoration,
         [type='search']::-webkit-search-cancel-button) {
    -webkit-appearance: none;
  }

  /*
   * Remove default fieldset styles.
   */
  :where(fieldset) {
    margin: 0;
    padding: 0;
  }

  :where(legend) {
    padding: 0;
  }

  /* ===========================================================================
     Tables
     =========================================================================== */

  /*
   * Collapse table borders and fix text-indent/border-color inheritance.
   */
  :where(table) {
    text-indent: 0;
    border-color: inherit;
    border-collapse: collapse;
  }

  /* ===========================================================================
     Misc
     =========================================================================== */

  /*
   * Simplify hr to a single border-top line.
   */
  :where(hr) {
    height: 0;
    color: inherit;
    border-top-width: 1px;
  }

  /*
   * Correct display for summary elements.
   */
  :where(summary) {
    display: list-item;
  }

  /*
   * Reset dialog padding and outline.
   */
  :where(dialog) {
    padding: 0;
    outline: none;
  }

  /*
   * Ensure hidden elements are actually hidden.
   */
  :where([hidden]) {
    display: none;
  }

  /*
   * Remove tap highlight on iOS.
   */
  :where(html) {
    -webkit-tap-highlight-color: transparent;
  }

  /* ===========================================================================
     Touch Devices
     =========================================================================== */

  /*
   * Suppress focus-visible outlines on touch-only devices.
   *
   * Focus rings exist to show keyboard users where focus is. On devices
   * with no hover capability and a coarse pointer (phones, tablets),
   * there's no keyboard navigation — focus rings are visual noise that
   * can flash on tap, on dialog open (showModal auto-focus), or on
   * programmatic focus.
   *
   * This targets touch-only devices specifically:
   * - (hover: none) — no hover capability (not a mouse)
   * - (pointer: coarse) — imprecise pointer (finger, not stylus)
   *
   * Hybrid devices (laptop with touchscreen) are NOT affected because
   * their primary pointer is fine (trackpad/mouse) and hover is available.
   */
  @media (hover: none) and (pointer: coarse) {
    :where(:focus-visible) {
      outline: none;
    }
  }

  /* ===========================================================================
     Color Scheme
     =========================================================================== */

  /*
   * Map data-theme attribute to CSS color-scheme.
   *
   * Setting data-theme on <html> tells the browser which color scheme
   * to use for native UI elements (scrollbars, form controls, date
   * pickers) and enables CSS light-dark() to resolve correctly.
   *
   * XDSTheme auto-detects when it's the root provider and syncs this
   * attribute on the client. For RSC / SSR, set it on <html> in your
   * root layout to avoid a flash of wrong theme:
   *
   *   <html lang="en" data-theme="dark">
   *
   * Values: "light" | "dark" | omitted (defaults to light dark = system)
   */
  :where(html[data-theme="light"]) {
    color-scheme: light;
  }

  :where(html[data-theme="dark"]) {
    color-scheme: dark;
  }

  :where(html:not([data-theme])) {
    color-scheme: light dark;
  }

  /* ===========================================================================
     Media Theme Baseline
     =========================================================================== */

  /*
   * color-scheme flip for [data-*-media] — makes light-dark() base
   * tokens resolve correctly on inverted surfaces without a theme.
   * Token overrides (text/icon/accent) are theme-level (generateOnMediaCSS).
   * Dual-prefix (astryx + legacy xds) during the compat window.
   */
  :where([data-astryx-media="dark"]) {
    color-scheme: dark;
  }

  :where([data-astryx-media="light"]) {
    color-scheme: light;
  }
}

/**
 * Tailwind Bridge
 *
 * Maps design tokens to Tailwind CSS v4 theme variables so you can use
 * Tailwind utility classes backed by the active theme.
 *
 * Instead of: class="text-[var(--color-text-primary)] bg-[var(--color-background-surface)]"
 * Write:      class="text-primary bg-surface"
 *
 * Requires:
 *   - Tailwind CSS v4+
 *   - core CSS and a theme CSS file loaded before Tailwind utilities
 *
 * Usage:
 *   @layer reset, theme, base, astryx-base, astryx-theme, components, utilities;
 *
 *   @import "tailwindcss/theme.css" layer(theme);
 *   @import "tailwindcss/preflight.css" layer(base);
 *   @import "@astryxdesign/core/reset.css";
 *   @import "@astryxdesign/core/astryx.css";
 *   @import "@astryxdesign/theme-neutral/theme.css";
 *   @import "@astryxdesign/core/tailwind-theme.css";
 *   @import "tailwindcss/utilities.css" layer(utilities);
 *
 * @position infrastructure — sits between system tokens and Tailwind utility generation
 */

/*
 * `@theme inline` registers theme variables that Tailwind uses to generate
 * utility classes, WITHOUT emitting CSS declarations. The actual values come
 * from the system CSS custom properties (set by astryx.css / theme packages).
 *
 * This means theme switching just works — when system tokens change (e.g. dark
 * mode, custom theme), Tailwind utilities automatically resolve to the new
 * values because they reference the same CSS custom properties.
 */

@theme inline {
  /* =========================================================================
   * Colors — Semantic
   *
   * These map purpose-specific tokens to Tailwind color utilities.
   * Each name is chosen to read naturally with its most common utility:
   *   text-primary, bg-surface, border-default
   *
   * But since Tailwind generates ALL color utilities from --color-*, you
   * also get bg-primary, text-surface, etc. — which can be useful.
   * ========================================================================= */
