, color: '#7057ff', variant: 'purple'},\n  {id: '5', name: 'help wanted', color: '#008672', variant: 'green'},\n  {id: '6', name: 'question', color: '#d876e3', variant: 'pink'},\n  {id: '7', name: 'wontfix', color: '#ffffff', variant: 'orange'},\n  {id: '8', name: 'priority: high', color: '#b60205', variant: 'red'},\n];\n\nconst styles = stylex.create({\n  colorDot: {\n    width: 12,\n    height: 12,\n    borderRadius: '50%',\n    flexShrink: 0,\n  },\n  labelRow: {\n    cursor: 'pointer',\n    padding: '4px 0',\n  },\n});\n\nexport default function LabelPicker() {\n  const [search, setSearch] = useState('');\n  const [selected, setSelected] = useState<Set<string>>(new Set());\n\n  const filtered = labels.filter(l =>\n    l.name.toLowerCase().includes(search.toLowerCase())\n  );\n\n  const toggleLabel = (id: string) => {\n    setSelected(prev => {\n      const next = new Set(prev);\n      if (next.has(id)) next.delete(id);\n      else next.add(id);\n      return next;\n    });\n  };\n\n  return (\n    <Popover\n      trigger={<Button label=\"Labels\" variant=\"secondary\" />}\n      title=\"Apply labels\"\n    >\n      <VStack gap={2} padding={2}>\n        <TextInput\n          label=\"Filter labels\"\n          isLabelHidden\n          value={search}\n          onChange={setSearch}\n          placeholder=\"Filter labels\"\n        />\n        <VStack gap={1}>\n          {filtered.map(label => (\n            <HStack key={label.id} gap={2} vAlign=\"center\" {...stylex.props(styles.labelRow)}>\n              <CheckboxInput\n                label={label.name}\n                isLabelHidden\n                isChecked={selected.has(label.id)}\n                onChange={() => toggleLabel(label.id)}\n              />\n              <div {...stylex.props(styles.colorDot)} style={{backgroundColor: label.color}} />\n              <Text>{label.name}</Text>\n            </HStack>\n          ))}\n        </VStack>\n      </VStack>\n    </Popover>\n  );\n}\n","dd-8":"import {Table, proportional, pixel} from '@astryxdesign/core/Table';\nimport {Badge} from '@astryxdesign/core/Badge';\n\ntype ContentItem = {\n  id: string;\n  title: string;\n  type: 'Article' | 'Video' | 'Podcast' | 'Newsletter' | 'Course';\n  author: string;\n  date: string;\n};\n\nconst typeVariants: Record<ContentItem['type'], 'blue' | 'purple' | 'orange' | 'teal' | 'green'> = {\n  Article: 'blue',\n  Video: 'purple',\n  Podcast: 'orange',\n  Newsletter: 'teal',\n  Course: 'green',\n};\n\nconst data: ContentItem[] = [\n  {id: '1', title: 'Getting Started with React 19', type: 'Article', author: 'Sarah Chen', date: '2026-07-01'},\n  {id: '2', title: 'Advanced TypeScript Patterns', type: 'Video', author: 'Mike Johnson', date: '2026-06-28'},\n  {id: '3', title: 'Design Systems Weekly', type: 'Podcast', author: 'Lisa Park', date: '2026-07-10'},\n  {id: '4', title: 'Monthly Product Update', type: 'Newsletter', author: 'Team', date: '2026-07-15'},\n  {id: '5', title: 'Accessibility Fundamentals', type: 'Course', author: 'Alex Rivera', date: '2026-06-15'},\n  {id: '6', title: 'CSS Grid Deep Dive', type: 'Article', author: 'Emily Wong', date: '2026-07-05'},\n  {id: '7', title: 'Component Architecture', type: 'Video', author: 'David Kim', date: '2026-07-12'},\n];\n\nexport default function ContentLibrary() {\n  return (\n    <Table\n      data={data}\n      idKey=\"id\"\n      hasHover\n      columns={[\n        {\n          key: 'type',\n          header: 'Type',\n          width: pixel(120),\n          renderCell: (item) => (\n            <Badge variant={typeVariants[item.type]} label={item.type} />\n          ),\n        },\n        {\n          key: 'title',\n          header: 'Title',\n          width: proportional(2),\n        },\n        {\n          key: 'author',\n          header: 'Author',\n          width: proportional(1),\n        },\n        {\n          key: 'date',\n          header: 'Date',\n          width: pixel(120),\n        },\n      ]}\n    />\n  );\n}\n","fwc-14":"import {useState} from 'react';\nimport {Grid} from '@astryxdesign/core/Grid';\nimport {AspectRatio} from '@astryxdesign/core/AspectRatio';\nimport {Lightbox} from '@astryxdesign/core/Lightbox';\nimport stylex from '@stylexjs/stylex';\n\ntype MediaItem = {\n  type: 'image' | 'video';\n  src: string;\n  alt: string;\n  poster?: string;\n};\n\nconst styles = stylex.create({\n  thumbnail: {\n    cursor: 'pointer',\n    borderRadius: 8,\n    overflow: 'hidden',\n  },\n  media: {\n    width: '100%',\n    height: '100%',\n    objectFit: 'cover',\n  },\n});\n\nconst sampleMedia: MediaItem[] = [\n  {type: 'image', src: '/images/photo-1.jpg', alt: 'Mountain landscape'},\n  {type: 'video', src: '/videos/clip-1.mp4', alt: 'Time lapse video', poster: '/images/poster-1.jpg'},\n  {type: 'image', src: '/images/photo-2.jpg', alt: 'Ocean sunset'},\n  {type: 'image', src: '/images/photo-3.jpg', alt: 'City skyline'},\n  {type: 'video', src: '/videos/clip-2.mp4', alt: 'Nature documentary', poster: '/images/poster-2.jpg'},\n  {type: 'image', src: '/images/photo-4.jpg', alt: 'Forest trail'},\n];\n\nexport default function MediaGallery() {\n  const [isOpen, setIsOpen] = useState(false);\n  const [index, setIndex] = useState(0);\n\n  const lightboxMedia = sampleMedia.map(item =>\n    item.type === 'video'\n      ? {type: 'video' as const, src: item.src, alt: item.alt}\n      : {type: 'image' as const, src: item.src, alt: item.alt}\n  );\n\n  return (\n    <>\n      <Grid columns={{minWidth: 200, max: 3}} gap={3}>\n        {sampleMedia.map((item, i) => (\n          <div\n            key={i}\n            {...stylex.props(styles.thumbnail)}\n            onClick={() => {\n              setIndex(i);\n              setIsOpen(true);\n            }}\n            role=\"button\"\n            tabIndex={0}\n            aria-label={`Open ${item.alt}`}\n            onKeyDown={e => {\n              if (e.key === 'Enter' || e.key === ' ') {\n                setIndex(i);\n                setIsOpen(true);\n              }\n            }}\n          >\n            <AspectRatio ratio={16 / 9} fit=\"cover\">\n              {item.type === 'video' ? (\n                <img src={item.poster} alt={item.alt} {...stylex.props(styles.media)} />\n              ) : (\n                <img src={item.src} alt={item.alt} {...stylex.props(styles.media)} />\n              )}\n            </AspectRatio>\n          </div>\n        ))}\n      </Grid>\n      <Lightbox\n        isOpen={isOpen}\n        onOpenChange={setIsOpen}\n        media={lightboxMedia}\n        index={index}\n        onIndexChange={setIndex}\n        hasZoom\n      />\n    </>\n  );\n}\n","io-3":"import {useState, useRef} from 'react';\nimport {Button} from '@astryxdesign/core/Button';\nimport {ProgressBar} from '@astryxdesign/core/ProgressBar';\nimport {VStack} from '@astryxdesign/core/VStack';\nimport {Text} from '@astryxdesign/core/Text';\n\nexport default function FileUploadButton() {\n  const [progress, setProgress] = useState(0);\n  const [isUploading, setIsUploading] = useState(false);\n  const [fileName, setFileName] = useState('');\n  const inputRef = useRef<HTMLInputElement>(null);\n\n  const handleFileSelect = async (e: React.ChangeEvent<HTMLInputElement>) => {\n    const file = e.target.files?.[0];\n    if (!file) return;\n\n    setFileName(file.name);\n    setIsUploading(true);\n    setProgress(0);\n\n    const formData = new FormData();\n    formData.append('file', file);\n\n    try {\n      const xhr = new XMLHttpRequest();\n      xhr.upload.addEventListener('progress', (event) => {\n        if (event.lengthComputable) {\n          setProgress(Math.round((event.loaded / event.total) * 100));\n        }\n      });\n      xhr.addEventListener('load', () => {\n        setProgress(100);\n        setIsUploading(false);\n      });\n      xhr.addEventListener('error', () => {\n        setIsUploading(false);\n      });\n      xhr.open('POST', '/api/upload');\n      xhr.send(formData);\n    } catch {\n      setIsUploading(false);\n    }\n  };\n\n  return (\n    <VStack gap={3} maxWidth={300}>\n      <input\n        ref={inputRef}\n        type=\"file\"\n        onChange={handleFileSelect}\n        style={{display: 'none'}}\n        aria-label=\"Select file to upload\"\n      />\n      <Button\n        label=\"Choose File\"\n        variant=\"primary\"\n        onClick={() => inputRef.current?.click()}\n        isLoading={isUploading}\n      />\n      {fileName && (\n        <>\n          <Text type=\"supporting\">{fileName}</Text>\n          <ProgressBar\n            label={`Uploading ${fileName}`}\n            value={progress}\n            max={100}\n            hasValueLabel\n            variant={progress === 100 ? 'success' : 'accent'}\n          />\n        </>\n      )}\n    </VStack>\n  );\n}\n","ps-2":"import {Theme} from '@astryxdesign/core';\nimport {neutralTheme} from '@astryxdesign/theme-neutral';\nimport {AppShell} from '@astryxdesign/core/AppShell';\nimport {TopNav} from '@astryxdesign/core/TopNav';\nimport {VStack} from '@astryxdesign/core/VStack';\nimport {Heading} from '@astryxdesign/core/Heading';\nimport {Text} from '@astryxdesign/core/Text';\n\nexport default function RootLayout({children}: {children?: React.ReactNode}) {\n  return (\n    <Theme theme={neutralTheme} mode=\"system\">\n      <AppShell\n        header={\n          <TopNav\n            logo={<Text type=\"label\">Internal Tool</Text>}\n          />\n        }\n      >\n        <VStack gap={4} padding={4}>\n          <Heading level={1}>Welcome</Heading>\n          {children}\n        </VStack>\n      </AppShell>\n    </Theme>\n  );\n}\n","rc-3":"import {Grid} from '@astryxdesign/core/Grid';\nimport {Card} from '@astryxdesign/core/Card';\nimport {VStack} from '@astryxdesign/core/VStack';\nimport {Heading} from '@astryxdesign/core/Heading';\nimport {Text} from '@astryxdesign/core/Text';\n\ntype CardData = {\n  title: string;\n  description: string;\n};\n\nconst cards: CardData[] = [\n  {title: 'Design System', description: 'A collection of reusable components and guidelines for building consistent UIs.'},\n  {title: 'Component Library', description: 'Pre-built React components that follow accessibility and theming best practices.'},\n  {title: 'Theme Engine', description: 'Customize colors, typography, and spacing to match your brand identity.'},\n  {title: 'CLI Tools', description: 'Command-line utilities for scaffolding projects and generating component docs.'},\n  {title: 'Documentation', description: 'Comprehensive guides and API references for every component.'},\n  {title: 'Accessibility', description: 'Built-in ARIA support, keyboard navigation, and screen reader compatibility.'},\n];\n\nexport default function ResponsiveCards() {\n  return (\n    <Grid columns={{minWidth: 280, max: 3}} gap={4}>\n      {cards.map(card => (\n        <Card key={card.title} padding={4}>\n          <VStack gap={2}>\n            <Heading level={3}>{card.title}</Heading>\n            <Text type=\"supporting\">{card.description}</Text>\n          </VStack>\n        </Card>\n      ))}\n    </Grid>\n  );\n}\n","sd-7":"import {useState, useEffect} from 'react';\nimport {VStack} from '@astryxdesign/core/VStack';\nimport {HStack} from '@astryxdesign/core/HStack';\nimport {Button} from '@astryxdesign/core/Button';\nimport {ProgressBar} from '@astryxdesign/core/ProgressBar';\nimport {Text} from '@astryxdesign/core/Text';\nimport {Card} from '@astryxdesign/core/Card';\nimport {Icon} from '@astryxdesign/core/Icon';\n\nfunction formatFileSize(bytes: number): string {\n  if (bytes < 1024) return bytes + ' B';\n  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';\n  return (bytes / (1024 * 1024)).toFixed(1) + ' MB';\n}\n\nexport default function FileUpload() {\n  const [file, setFile] = useState<{name: string; size: number} | null>(null);\n  const [progress, setProgress] = useState(0);\n  const [isUploading, setIsUploading] = useState(false);\n  const [isDone, setIsDone] = useState(false);\n\n  useEffect(() => {\n    if (!isUploading) return;\n    const interval = setInterval(() => {\n      setProgress(prev => {\n        if (prev >= 100) {\n          clearInterval(interval);\n          setIsUploading(false);\n          setIsDone(true);\n          return 100;\n        }\n        return prev + 10;\n      });\n    }, 300);\n    return () => clearInterval(interval);\n  }, [isUploading]);\n\n  const handleUpload = () => {\n    setFile({name: 'presentation.pdf', size: 2457600});\n    setProgress(0);\n    setIsUploading(true);\n    setIsDone(false);\n  };\n\n  return (\n    <VStack gap={4} maxWidth={400}>\n      <Button label=\"Upload File\" variant=\"primary\" onClick={handleUpload} />\n      {file && (\n        <Card padding={4}>\n          <VStack gap={3}>\n            <HStack gap={2} vAlign=\"center\">\n              <Text type=\"label\">{file.name}</Text>\n              <Text type=\"supporting\">{formatFileSize(file.size)}</Text>\n            </HStack>\n            <ProgressBar\n              label=\"Upload progress\"\n              value={progress}\n              max={100}\n              hasValueLabel\n              variant={isDone ? 'success' : 'accent'}\n            />\n            {isDone && (\n              <Text color=\"accent\" type=\"supporting\">Upload complete</Text>\n            )}\n          </VStack>\n        </Card>\n      )}\n    </VStack>\n  );\n}\n","tc-5":"import {defineTheme} from '@astryxdesign/core';\nimport {Theme} from '@astryxdesign/core';\nimport {Card} from '@astryxdesign/core/Card';\nimport {VStack} from '@astryxdesign/core/VStack';\nimport {Heading} from '@astryxdesign/core/Heading';\nimport {Text} from '@astryxdesign/core/Text';\n\nconst customTheme = defineTheme({\n  components: {\n    card: {\n      base: {\n        borderRadius: 16,\n        borderWidth: 2,\n        borderStyle: 'solid',\n        borderImage: 'linear-gradient(135deg, #667eea 0%, #764ba2 100%) 1',\n      },\n    },\n  },\n});\n\nexport default function CustomCardTheme() {\n  return (\n    <Theme theme={customTheme}>\n      <VStack gap={4} padding={4}>\n        <Card padding={4}>\n          <VStack gap={2}>\n            <Heading level={3}>Gradient Border Card</Heading>\n            <Text>\n              This card uses component-level style overrides in the theme to apply\n              a gradient border and increased border radius.\n            </Text>\n          </VStack>\n        </Card>\n      </VStack>\n    </Theme>\n  );\n}\n","ty-3":"import {Card} from '@astryxdesign/core/Card';\nimport {VStack} from '@astryxdesign/core/VStack';\nimport {Text} from '@astryxdesign/core/Text';\nimport {Heading} from '@astryxdesign/core/Heading';\n\nexport default function MetricsDashboardCard() {\n  return (\n    <Card padding={4}>\n      <VStack gap={1}>\n        <Text type=\"supporting\" color=\"secondary\">Total Revenue</Text>\n        <Heading level={2}>$12,340.56</Heading>\n        <Text type=\"supporting\" color=\"accent\">+12% from last month</Text>\n      </VStack>\n    </Card>\n  );\n}\n","wd-5":"import {useState} from 'react';\nimport {Dialog} from '@astryxdesign/core/Dialog';\nimport {DialogHeader} from '@astryxdesign/core/Dialog';\nimport {Button} from '@astryxdesign/core/Button';\nimport {TextInput} from '@astryxdesign/core/TextInput';\nimport {TextArea} from '@astryxdesign/core/TextArea';\nimport {VStack} from '@astryxdesign/core/VStack';\nimport {HStack} from '@astryxdesign/core/HStack';\nimport {Text} from '@astryxdesign/core/Text';\nimport {Icon} from '@astryxdesign/core/Icon';\n\nexport default function FeedbackDialog() {\n  const [isOpen, setIsOpen] = useState(false);\n  const [title, setTitle] = useState('');\n  const [comments, setComments] = useState('');\n  const [isSubmitted, setIsSubmitted] = useState(false);\n\n  const handleSubmit = () => {\n    setIsSubmitted(true);\n  };\n\n  const handleReset = () => {\n    setTitle('');\n    setComments('');\n    setIsSubmitted(false);\n    setIsOpen(false);\n  };\n\n  return (\n    <>\n      <Button label=\"Give Feedback\" variant=\"primary\" onClick={() => setIsOpen(true)} />\n      <Dialog isOpen={isOpen} onOpenChange={setIsOpen} purpose=\"form\">\n        <DialogHeader title=\"Feedback\" onOpenChange={setIsOpen} />\n        {isSubmitted ? (\n          <VStack gap={4} padding={4} hAlign=\"center\">\n            <Text type=\"large\" color=\"accent\">Thank you for your feedback!</Text>\n            <Text type=\"supporting\">Your response has been recorded.</Text>\n            <Button label=\"Close\" onClick={handleReset} />\n          </VStack>\n        ) : (\n          <VStack gap={4} padding={4}>\n            <TextInput\n              label=\"Title\"\n              value={title}\n              onChange={setTitle}\n              placeholder=\"Brief summary of your feedback\"\n            />\n            <TextArea\n              label=\"Comments\"\n              value={comments}\n              onChange={setComments}\n              placeholder=\"Tell us more about your experience...\"\n            />\n            <HStack gap={2} hAlign=\"end\">\n              <Button label=\"Cancel\" variant=\"ghost\" onClick={() => setIsOpen(false)} />\n              <Button\n                label=\"Submit\"\n                variant=\"primary\"\n                onClick={handleSubmit}\n                isDisabled={!title || !comments}\n              />\n            </HStack>\n          </VStack>\n        )}\n      </Dialog>\n    </>\n  );\n}\n"},"baselineSourceCode":{"cwm-2":"import {useState} from 'react';\nimport {Popover, PopoverContent, PopoverTrigger} from '@/components/ui/popover';\nimport {Button} from '@/components/ui/button';\nimport {Input} from '@/components/ui/input';\nimport {Checkbox} from '@/components/ui/checkbox';\n\ntype Label = {\n  id: string;\n  name: string;\n  color: string;\n};\n\nconst labels: Label[] = [\n  {id: '1', name: 'bug', color: '#d73a4a'},\n  {id: '2', name: 'enhancement', color: '#a2eeef'},\n  {id: '3', name: 'documentation', color: '#0075ca'},\n  {id: '4', name: 'good first issue', color: '#7057ff'},\n  {id: '5', name: 'help wanted', color: '#008672'},\n  {id: '6', name: 'question', color: '#d876e3'},\n  {id: '7', name: 'wontfix', color: '#e4e669'},\n  {id: '8', name: 'priority: high', color: '#b60205'},\n];\n\nexport default function LabelPicker() {\n  const [search, setSearch] = useState('');\n  const [selected, setSelected] = useState<Set<string>>(new Set());\n\n  const filtered = labels.filter(l =>\n    l.name.toLowerCase().includes(search.toLowerCase())\n  );\n\n  const toggleLabel = (id: string) => {\n    setSelected(prev => {\n      const next = new Set(prev);\n      if (next.has(id)) next.delete(id);\n      else next.add(id);\n      return next;\n    });\n  };\n\n  return (\n    <Popover>\n      <PopoverTrigger asChild>\n        <Button variant=\"outline\">Labels</Button>\n      </PopoverTrigger>\n      <PopoverContent className=\"w-64 p-0\" align=\"start\">\n        <div className=\"p-2 border-b\">\n          <Input\n            value={search}\n            onChange={e => setSearch(e.target.value)}\n            placeholder=\"Filter labels\"\n            className=\"h-8\"\n          />\n        </div>\n        <div className=\"max-h-64 overflow-y-auto p-1\">\n          {filtered.map(label => (\n            <label\n              key={label.id}\n              className=\"flex items-center gap-2 px-2 py-1.5 rounded-sm hover:bg-accent cursor-pointer\"\n            >\n              <Checkbox\n                checked={selected.has(label.id)}\n                onCheckedChange={() => toggleLabel(label.id)}\n              />\n              <span\n                className=\"w-3 h-3 rounded-full flex-shrink-0\"\n                style={{backgroundColor: label.color}}\n              />\n              <span className=\"text-sm\">{label.name}</span>\n            </label>\n          ))}\n        </div>\n      </PopoverContent>\n    </Popover>\n  );\n}\n","dd-8":"import {Table, TableBody, TableCell, TableHead, TableHeader, TableRow} from '@/components/ui/table';\nimport {Badge} from '@/components/ui/badge';\n\ntype ContentItem = {\n  id: string;\n  title: string;\n  type: 'Article' | 'Video' | 'Podcast' | 'Newsletter' | 'Course';\n  author: string;\n  date: string;\n};\n\nconst typeColors: Record<ContentItem['type'], string> = {\n  Article: 'bg-blue-100 text-blue-700 hover:bg-blue-100',\n  Video: 'bg-purple-100 text-purple-700 hover:bg-purple-100',\n  Podcast: 'bg-orange-100 text-orange-700 hover:bg-orange-100',\n  Newsletter: 'bg-teal-100 text-teal-700 hover:bg-teal-100',\n  Course: 'bg-green-100 text-green-700 hover:bg-green-100',\n};\n\nconst data: ContentItem[] = [\n  {id: '1', title: 'Getting Started with React 19', type: 'Article', author: 'Sarah Chen', date: '2026-07-01'},\n  {id: '2', title: 'Advanced TypeScript Patterns', type: 'Video', author: 'Mike Johnson', date: '2026-06-28'},\n  {id: '3', title: 'Design Systems Weekly', type: 'Podcast', author: 'Lisa Park', date: '2026-07-10'},\n  {id: '4', title: 'Monthly Product Update', type: 'Newsletter', author: 'Team', date: '2026-07-15'},\n  {id: '5', title: 'Accessibility Fundamentals', type: 'Course', author: 'Alex Rivera', date: '2026-06-15'},\n  {id: '6', title: 'CSS Grid Deep Dive', type: 'Article', author: 'Emily Wong', date: '2026-07-05'},\n  {id: '7', title: 'Component Architecture', type: 'Video', author: 'David Kim', date: '2026-07-12'},\n];\n\nexport default function ContentLibrary() {\n  return (\n    <Table>\n      <TableHeader>\n        <TableRow>\n          <TableHead className=\"w-[120px]\">Type</TableHead>\n          <TableHead>Title</TableHead>\n          <TableHead>Author</TableHead>\n          <TableHead className=\"w-[120px]\">Date</TableHead>\n        </TableRow>\n      </TableHeader>\n      <TableBody>\n        {data.map(item => (\n          <TableRow key={item.id}>\n            <TableCell>\n              <Badge className={typeColors[item.type]} variant=\"secondary\">\n                {item.type}\n              </Badge>\n            </TableCell>\n            <TableCell className=\"font-medium\">{item.title}</TableCell>\n            <TableCell>{item.author}</TableCell>\n            <TableCell>{item.date}</TableCell>\n          </TableRow>\n        ))}\n      </TableBody>\n    </Table>\n  );\n}\n","fwc-14":"import {useState} from 'react';\nimport {Dialog, DialogContent} from '@/components/ui/dialog';\nimport {Button} from '@/components/ui/button';\n\ntype MediaItem = {\n  type: 'image' | 'video';\n  src: string;\n  alt: string;\n  poster?: string;\n};\n\nconst sampleMedia: MediaItem[] = [\n  {type: 'image', src: '/images/photo-1.jpg', alt: 'Mountain landscape'},\n  {type: 'video', src: '/videos/clip-1.mp4', alt: 'Time lapse video', poster: '/images/poster-1.jpg'},\n  {type: 'image', src: '/images/photo-2.jpg', alt: 'Ocean sunset'},\n  {type: 'image', src: '/images/photo-3.jpg', alt: 'City skyline'},\n  {type: 'video', src: '/videos/clip-2.mp4', alt: 'Nature documentary', poster: '/images/poster-2.jpg'},\n  {type: 'image', src: '/images/photo-4.jpg', alt: 'Forest trail'},\n];\n\nexport default function MediaGallery() {\n  const [isOpen, setIsOpen] = useState(false);\n  const [currentIndex, setCurrentIndex] = useState(0);\n  const [scale, setScale] = useState(1);\n\n  const currentItem = sampleMedia[currentIndex];\n\n  const handleDoubleClick = () => {\n    if (currentItem.type === 'image') {\n      setScale(prev => prev === 1 ? 2 : 1);\n    }\n  };\n\n  return (\n    <>\n      <div className=\"grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 p-4\">\n        {sampleMedia.map((item, i) => (\n          <button\n            key={i}\n            className=\"relative aspect-video overflow-hidden rounded-lg group focus:ring-2 focus:ring-ring focus:outline-none\"\n            onClick={() => {\n              setCurrentIndex(i);\n              setScale(1);\n              setIsOpen(true);\n            }}\n          >\n            <img\n              src={item.type === 'video' ? item.poster : item.src}\n              alt={item.alt}\n              className=\"w-full h-full object-cover transition-transform group-hover:scale-105\"\n            />\n            {item.type === 'video' && (\n              <div className=\"absolute inset-0 flex items-center justify-center bg-black/30\">\n                <svg className=\"w-12 h-12 text-white\" fill=\"currentColor\" viewBox=\"0 0 24 24\">\n                  <path d=\"M8 5v14l11-7z\" />\n                </svg>\n              </div>\n            )}\n          </button>\n        ))}\n      </div>\n\n      <Dialog open={isOpen} onOpenChange={setIsOpen}>\n        <DialogContent className=\"max-w-4xl p-0 bg-black border-none\">\n          <div className=\"relative w-full h-[80vh] flex items-center justify-center\">\n            {currentItem?.type === 'video' ? (\n              <video\n                src={currentItem.src}\n                controls\n                className=\"max-w-full max-h-full\"\n                aria-label={currentItem.alt}\n              />\n            ) : (\n              <img\n                src={currentItem?.src}\n                alt={currentItem?.alt}\n                className=\"max-w-full max-h-full transition-transform cursor-zoom-in\"\n                style={{transform: `scale(${scale})`}}\n                onDoubleClick={handleDoubleClick}\n              />\n            )}\n            <div className=\"absolute bottom-4 left-1/2 -translate-x-1/2 flex gap-2\">\n              <Button\n                variant=\"secondary\"\n                size=\"sm\"\n                onClick={() => setCurrentIndex(prev => Math.max(0, prev - 1))}\n                disabled={currentIndex === 0}\n              >\n                Previous\n              </Button>\n              <Button\n                variant=\"secondary\"\n                size=\"sm\"\n                onClick={() => setCurrentIndex(prev => Math.min(sampleMedia.length - 1, prev + 1))}\n                disabled={currentIndex === sampleMedia.length - 1}\n              >\n                Next\n              </Button>\n            </div>\n          </div>\n        </DialogContent>\n      </Dialog>\n    </>\n  );\n}\n","io-3":"import {useState, useRef} from 'react';\nimport {Button} from '@/components/ui/button';\nimport {Progress} from '@/components/ui/progress';\n\nexport default function FileUploadButton() {\n  const [progress, setProgress] = useState(0);\n  const [isUploading, setIsUploading] = useState(false);\n  const [fileName, setFileName] = useState('');\n  const inputRef = useRef<HTMLInputElement>(null);\n\n  const handleFileSelect = async (e: React.ChangeEvent<HTMLInputElement>) => {\n    const file = e.target.files?.[0];\n    if (!file) return;\n\n    setFileName(file.name);\n    setIsUploading(true);\n    setProgress(0);\n\n    const formData = new FormData();\n    formData.append('file', file);\n\n    try {\n      const xhr = new XMLHttpRequest();\n      xhr.upload.addEventListener('progress', (event) => {\n        if (event.lengthComputable) {\n          setProgress(Math.round((event.loaded / event.total) * 100));\n        }\n      });\n      xhr.addEventListener('load', () => {\n        setProgress(100);\n        setIsUploading(false);\n      });\n      xhr.addEventListener('error', () => {\n        setIsUploading(false);\n      });\n      xhr.open('POST', '/api/upload');\n      xhr.send(formData);\n    } catch {\n      setIsUploading(false);\n    }\n  };\n\n  return (\n    <div className=\"flex flex-col gap-3 max-w-xs\">\n      <input\n        ref={inputRef}\n        type=\"file\"\n        onChange={handleFileSelect}\n        className=\"hidden\"\n        aria-label=\"Select file to upload\"\n      />\n      <Button onClick={() => inputRef.current?.click()} disabled={isUploading}>\n        {isUploading ? 'Uploading...' : 'Choose File'}\n      </Button>\n      {fileName && (\n        <>\n          <p className=\"text-sm text-muted-foreground\">{fileName}</p>\n          <Progress value={progress} />\n          <p className=\"text-xs text-muted-foreground\">{progress}%</p>\n        </>\n      )}\n    </div>\n  );\n}\n","ps-2":"import {ThemeProvider} from '@/components/theme-provider';\n\nexport default function RootLayout({children}: {children?: React.ReactNode}) {\n  return (\n    <ThemeProvider defaultTheme=\"system\" storageKey=\"app-theme\">\n      <div className=\"min-h-screen bg-background text-foreground\">\n        <header className=\"border-b\">\n          <div className=\"container mx-auto px-4 h-14 flex items-center\">\n            <span className=\"font-semibold text-lg\">Internal Tool</span>\n          </div>\n        </header>\n        <main className=\"container mx-auto px-4 py-6\">\n          <h1 className=\"text-3xl font-bold tracking-tight mb-4\">Welcome</h1>\n          {children}\n        </main>\n      </div>\n    </ThemeProvider>\n  );\n}\n","rc-3":"import {Card, CardContent, CardHeader, CardTitle} from '@/components/ui/card';\n\ntype CardData = {\n  title: string;\n  description: string;\n};\n\nconst cards: CardData[] = [\n  {title: 'Design System', description: 'A collection of reusable components and guidelines for building consistent UIs.'},\n  {title: 'Component Library', description: 'Pre-built React components that follow accessibility and theming best practices.'},\n  {title: 'Theme Engine', description: 'Customize colors, typography, and spacing to match your brand identity.'},\n  {title: 'CLI Tools', description: 'Command-line utilities for scaffolding projects and generating component docs.'},\n  {title: 'Documentation', description: 'Comprehensive guides and API references for every component.'},\n  {title: 'Accessibility', description: 'Built-in ARIA support, keyboard navigation, and screen reader compatibility.'},\n];\n\nexport default function ResponsiveCards() {\n  return (\n    <div className=\"grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 p-4\">\n      {cards.map(card => (\n        <Card key={card.title}>\n          <CardHeader>\n            <CardTitle>{card.title}</CardTitle>\n          </CardHeader>\n          <CardContent>\n            <p className=\"text-muted-foreground\">{card.description}</p>\n          </CardContent>\n        </Card>\n      ))}\n    </div>\n  );\n}\n","sd-7":"import {useState, useEffect} from 'react';\nimport {Button} from '@/components/ui/button';\nimport {Progress} from '@/components/ui/progress';\nimport {Card, CardContent} from '@/components/ui/card';\n\nfunction formatFileSize(bytes: number): string {\n  if (bytes < 1024) return bytes + ' B';\n  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';\n  return (bytes / (1024 * 1024)).toFixed(1) + ' MB';\n}\n\nexport default function FileUpload() {\n  const [file, setFile] = useState<{name: string; size: number} | null>(null);\n  const [progress, setProgress] = useState(0);\n  const [isUploading, setIsUploading] = useState(false);\n  const [isDone, setIsDone] = useState(false);\n\n  useEffect(() => {\n    if (!isUploading) return;\n    const interval = setInterval(() => {\n      setProgress(prev => {\n        if (prev >= 100) {\n          clearInterval(interval);\n          setIsUploading(false);\n          setIsDone(true);\n          return 100;\n        }\n        return prev + 10;\n      });\n    }, 300);\n    return () => clearInterval(interval);\n  }, [isUploading]);\n\n  const handleUpload = () => {\n    setFile({name: 'presentation.pdf', size: 2457600});\n    setProgress(0);\n    setIsUploading(true);\n    setIsDone(false);\n  };\n\n  return (\n    <div className=\"max-w-md space-y-4\">\n      <Button onClick={handleUpload}>Upload File</Button>\n      {file && (\n        <Card>\n          <CardContent className=\"pt-6 space-y-3\">\n            <div className=\"flex justify-between items-center\">\n              <p className=\"font-medium text-sm\">{file.name}</p>\n              <p className=\"text-xs text-muted-foreground\">{formatFileSize(file.size)}</p>\n            </div>\n            <div className=\"space-y-1\">\n              <Progress value={progress} />\n              <p className=\"text-xs text-muted-foreground text-right\">{progress}%</p>\n            </div>\n            {isDone && (\n              <p className=\"text-sm text-green-600 font-medium\">Upload complete</p>\n            )}\n          </CardContent>\n        </Card>\n      )}\n    </div>\n  );\n}\n","tc-5":"import {Card, CardContent, CardHeader, CardTitle} from '@/components/ui/card';\n\nexport default function CustomCardTheme() {\n  return (\n    <div className=\"p-6 space-y-4\">\n      <Card className=\"rounded-2xl border-2 border-transparent bg-clip-padding [border-image:linear-gradient(135deg,#667eea,#764ba2)_1]\">\n        <CardHeader>\n          <CardTitle>Gradient Border Card</CardTitle>\n        </CardHeader>\n        <CardContent>\n          <p className=\"text-muted-foreground\">\n            This card uses a gradient border via CSS border-image and\n            an increased border-radius for a rounded appearance.\n          </p>\n        </CardContent>\n      </Card>\n    </div>\n  );\n}\n","ty-3":"import {Card, CardContent} from '@/components/ui/card';\n\nexport default function MetricsDashboardCard() {\n  return (\n    <Card>\n      <CardContent className=\"pt-6\">\n        <div className=\"space-y-1\">\n          <p className=\"text-sm text-muted-foreground\">Total Revenue</p>\n          <p className=\"text-3xl font-bold tracking-tight\">$12,340.56</p>\n          <p className=\"text-sm text-green-600\">+12% from last month</p>\n        </div>\n      </CardContent>\n    </Card>\n  );\n}\n","wd-5":"import {useState} from 'react';\nimport {Dialog, DialogContent, DialogHeader, DialogTitle, DialogFooter} from '@/components/ui/dialog';\nimport {Button} from '@/components/ui/button';\nimport {Input} from '@/components/ui/input';\nimport {Textarea} from '@/components/ui/textarea';\nimport {Label} from '@/components/ui/label';\n\nexport default function FeedbackDialog() {\n  const [isOpen, setIsOpen] = useState(false);\n  const [title, setTitle] = useState('');\n  const [comments, setComments] = useState('');\n  const [isSubmitted, setIsSubmitted] = useState(false);\n\n  const handleSubmit = () => {\n    setIsSubmitted(true);\n  };\n\n  const handleReset = () => {\n    setTitle('');\n    setComments('');\n    setIsSubmitted(false);\n    setIsOpen(false);\n  };\n\n  return (\n    <>\n      <Button onClick={() => setIsOpen(true)}>Give Feedback</Button>\n      <Dialog open={isOpen} onOpenChange={setIsOpen}>\n        <DialogContent>\n          <DialogHeader>\n            <DialogTitle>Feedback</DialogTitle>\n          </DialogHeader>\n          {isSubmitted ? (\n            <div className=\"flex flex-col items-center gap-4 py-6\">\n              <p className=\"text-lg font-medium text-green-600\">Thank you for your feedback!</p>\n              <p className=\"text-sm text-muted-foreground\">Your response has been recorded.</p>\n              <Button onClick={handleReset}>Close</Button>\n            </div>\n          ) : (\n            <>\n              <div className=\"flex flex-col gap-4\">\n                <div>\n                  <Label htmlFor=\"title\">Title</Label>\n                  <Input\n                    id=\"title\"\n                    value={title}\n                    onChange={e => setTitle(e.target.value)}\n                    placeholder=\"Brief summary of your feedback\"\n                  />\n                </div>\n                <div>\n                  <Label htmlFor=\"comments\">Comments</Label>\n                  <Textarea\n                    id=\"comments\"\n                    value={comments}\n                    onChange={e => setComments(e.target.value)}\n                    placeholder=\"Tell us more about your experience...\"\n                    rows={5}\n                  />\n                </div>\n              </div>\n              <DialogFooter>\n                <Button variant=\"ghost\" onClick={() => setIsOpen(false)}>Cancel</Button>\n                <Button onClick={handleSubmit} disabled={!title || !comments}>Submit</Button>\n              </DialogFooter>\n            </>\n          )}\n        </DialogContent>\n      </Dialog>\n    </>\n  );\n}\n"},"htmlSourceCode":{"cwm-2":"import {useState} from 'react';\n\ntype Label = {id: string; name: string; color: string};\n\nconst labels: Label[] = [\n  {id: '1', name: 'bug', color: '#d73a4a'},\n  {id: '2', name: 'enhancement', color: '#a2eeef'},\n  {id: '3', name: 'documentation', color: '#0075ca'},\n  {id: '4', name: 'good first issue', color: '#7057ff'},\n  {id: '5', name: 'help wanted', color: '#008672'},\n  {id: '6', name: 'question', color: '#d876e3'},\n  {id: '7', name: 'wontfix', color: '#e4e669'},\n  {id: '8', name: 'priority: high', color: '#b60205'},\n];\n\nexport default function LabelPicker() {\n  const [isOpen, setIsOpen] = useState(false);\n  const [search, setSearch] = useState('');\n  const [selected, setSelected] = useState<Set<string>>(new Set());\n\n  const filtered = labels.filter(l => l.name.toLowerCase().includes(search.toLowerCase()));\n  const toggleLabel = (id: string) => {\n    setSelected(prev => {const next = new Set(prev); if (next.has(id)) next.delete(id); else next.add(id); return next;});\n  };\n\n  return (\n    <div style={{position: 'relative', display: 'inline-block'}}>\n      <button onClick={() => setIsOpen(!isOpen)} style={{padding: '6px 12px', border: '1px solid #d1d5db', borderRadius: 6, background: 'white', cursor: 'pointer', fontSize: 14}}>Labels</button>\n      {isOpen && (\n        <div style={{position: 'absolute', top: '100%', left: 0, marginTop: 4, width: 240, background: 'white', border: '1px solid #e5e7eb', borderRadius: 8, boxShadow: '0 4px 12px rgba(0,0,0,0.1)', zIndex: 10}}>\n          <div style={{padding: 8, borderBottom: '1px solid #e5e7eb'}}>\n            <input value={search} onChange={e => setSearch(e.target.value)} placeholder=\"Filter labels\" style={{width: '100%', padding: 6, border: '1px solid #d1d5db', borderRadius: 4, fontSize: 13}} />\n          </div>\n          <div style={{maxHeight: 200, overflowY: 'auto', padding: 4}}>\n            {filtered.map(label => (\n              <label key={label.id} style={{display: 'flex', alignItems: 'center', gap: 8, padding: '4px 8px', borderRadius: 4, cursor: 'pointer'}}>\n                <input type=\"checkbox\" checked={selected.has(label.id)} onChange={() => toggleLabel(label.id)} />\n                <span style={{width: 12, height: 12, borderRadius: '50%', background: label.color, flexShrink: 0}} />\n                <span style={{fontSize: 13}}>{label.name}</span>\n              </label>\n            ))}\n          </div>\n        </div>\n      )}\n    </div>\n  );\n}\n","dd-8":"const typeColors: Record<string, {bg: string; text: string}> = {\n  Article: {bg: '#dbeafe', text: '#1d4ed8'},\n  Video: {bg: '#ede9fe', text: '#6d28d9'},\n  Podcast: {bg: '#ffedd5', text: '#c2410c'},\n  Newsletter: {bg: '#ccfbf1', text: '#0f766e'},\n  Course: {bg: '#dcfce7', text: '#15803d'},\n};\n\ntype ContentItem = {\n  id: string;\n  title: string;\n  type: string;\n  author: string;\n  date: string;\n};\n\nconst data: ContentItem[] = [\n  {id: '1', title: 'Getting Started with React 19', type: 'Article', author: 'Sarah Chen', date: '2026-07-01'},\n  {id: '2', title: 'Advanced TypeScript Patterns', type: 'Video', author: 'Mike Johnson', date: '2026-06-28'},\n  {id: '3', title: 'Design Systems Weekly', type: 'Podcast', author: 'Lisa Park', date: '2026-07-10'},\n  {id: '4', title: 'Monthly Product Update', type: 'Newsletter', author: 'Team', date: '2026-07-15'},\n  {id: '5', title: 'Accessibility Fundamentals', type: 'Course', author: 'Alex Rivera', date: '2026-06-15'},\n  {id: '6', title: 'CSS Grid Deep Dive', type: 'Article', author: 'Emily Wong', date: '2026-07-05'},\n  {id: '7', title: position: 'relative', maxWidth: '90vw', maxHeight: '90vh'}}>\n            {currentItem.type === 'video' ? (\n              <video src={currentItem.src} controls style={{maxWidth: '100%', maxHeight: '80vh'}} aria-label={currentItem.alt} />\n            ) : (\n              <img\n                src={currentItem.src}\n                alt={currentItem.alt}\n                style={{maxWidth: '100%', maxHeight: '80vh', transform: `scale(${scale})`, transition: 'transform 0.2s', cursor: 'zoom-in'}}\n                onDoubleClick={handleDoubleClick}\n              />\n            )}\n            <div style={{position: 'absolute', bottom: -40, left: '50%', transform: 'translateX(-50%)', display: 'flex', gap: 8}}>\n              <button onClick={() => setCurrentIndex(p => Math.max(0, p - 1))} disabled={currentIndex === 0} style={{padding: '4px 12px', borderRadius: 4, border: 'none', background: 'white', cursor: 'pointer'}}>Prev</button>\n              <button onClick={() => setCurrentIndex(p => Math.min(sampleMedia.length - 1, p + 1))} disabled={currentIndex === sampleMedia.length - 1} style={{padding: '4px 12px', borderRadius: 4, border: 'none', background: 'white', cursor: 'pointer'}}>Next</button>\n            </div>\n          </div>\n        </div>\n      )}\n    </>\n  );\n}\n","io-3":"import {useState, useRef} from 'react';\n\nexport default function FileUploadButton() {\n  const [progress, setProgress] = useState(0);\n  const [isUploading, setIsUploading] = useState(false);\n  const [fileName, setFileName] = useState('');\n  const inputRef = useRef<HTMLInputElement>(null);\n\n  const handleFileSelect = async (e: React.ChangeEvent<HTMLInputElement>) => {\n    const file = e.target.files?.[0];\n    if (!file) return;\n    setFileName(file.name);\n    setIsUploading(true);\n    setProgress(0);\n    const formData = new FormData();\n    formData.append('file', file);\n    try {\n      const xhr = new XMLHttpRequest();\n      xhr.upload.addEventListener('progress', (event) => {\n        if (event.lengthComputable) setProgress(Math.round((event.loaded / event.total) * 100));\n      });\n      xhr.addEventListener('load', () => {setProgress(100); setIsUploading(false);});\n      xhr.addEventListener('error', () => setIsUploading(false));\n      xhr.open('POST', '/api/upload');\n      xhr.send(formData);\n    } catch {setIsUploading(false);}\n  };\n\n  return (\n    <div style={{display: 'flex', flexDirection: 'column', gap: 12, maxWidth: 300}}>\n      <input ref={inputRef} type=\"file\" onChange={handleFileSelect} style={{display: 'none'}} aria-label=\"Select file\" />\n      <button onClick={() => inputRef.current?.click()} disabled={isUploading} style={{padding: '8px 16px', background: '#0066cc', color: 'white', border: 'none', borderRadius: 6, cursor: 'pointer', opacity: isUploading ? 0.7 : 1}}>\n        {isUploading ? 'Uploading...' : 'Choose File'}\n      </button>\n      {fileName && (\n        <>\n          <span style={{fontSize: 13, color: '#6b7280'}}>{fileName}</span>\n          <div style={{height: 6, background: '#e5e7eb', borderRadius: 3, overflow: 'hidden'}}>\n            <div style={{height: '100%', width: `${progress}%`, background: progress === 100 ? '#16a34a' : '#0066cc', transition: 'width 0.3s'}} />\n          </div>\n          <span style={{fontSize: 12, color: '#6b7280'}}>{progress}%</span>\n        </>\n      )}\n    </div>\n  );\n}\n","ps-2":"export default function RootLayout({children}: {children?: React.ReactNode}) {\n  return (\n    <div style={{minHeight: '100vh', background: '#fafafa', color: '#1a1a1a', fontFamily: 'system-ui, -apple-system, sans-serif'}}>\n      <header style={{borderBottom: '1px solid #e5e7eb', background: 'white'}}>\n        <div style={{maxWidth: 1200, margin: '0 auto', padding: '0 16px', height: 56, display: 'flex', alignItems: 'center'}}>\n          <span style={{fontWeight: 600, fontSize: 18}}>Internal Tool</span>\n        </div>\n      </header>\n      <main style={{maxWidth: 1200, margin: '0 auto', padding: '24px 16px'}}>\n        <h1 style={{fontSize: 28, fontWeight: 700, marginBottom: 16}}>Welcome</h1>\n        {children}\n      </main>\n    </div>\n  );\n}\n","rc-3":"type CardData = {title: string; description: string};\n\nconst cards: CardData[] = [\n  {title: 'Design System', description: 'A collection of reusable components and guidelines for building consistent UIs.'},\n  {title: 'Component Library', description: 'Pre-built React components that follow accessibility and theming best practices.'},\n  {title: 'Theme Engine', description: 'Customize colors, typography, and spacing to match your brand identity.'},\n  {title: 'CLI Tools', description: 'Command-line utilities for scaffolding projects and generating component docs.'},\n  {title: 'Documentation', description: 'Comprehensive guides and API references for every component.'},\n  {title: 'Accessibility', description: 'Built-in ARIA support, keyboard navigation, and screen reader compatibility.'},\n];\n\nexport default function ResponsiveCards() {\n  return (\n    <div style={{display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(280px, 1fr))', gap: 24, padding: 16}}>\n      {cards.map(card => (\n        <div key={card.title} style={{border: '1px solid #e5e7eb', borderRadius: 12, padding: 20, background: 'white'}}>\n          <h3 style={{margin: '0 0 8px', fontSize: 16, fontWeight: 600}}>{card.title}</h3>\n          <p style={{margin: 0, color: '#6b7280', fontSize: 14, lineHeight: 1.5}}>{card.description}</p>\n        </div>\n      ))}\n    </div>\n  );\n}\n","sd-7":"import {useState, useEffect} from 'react';\n\nfunction formatFileSize(bytes: number): string {\n  if (bytes < 1024) return bytes + ' B';\n  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';\n  return (bytes / (1024 * 1024)).toFixed(1) + ' MB';\n}\n\nexport default function FileUpload() {\n  const [file, setFile] = useState<{name: string; size: number} | null>(null);\n  const [progress, setProgress] = useState(0);\n  const [isUploading, setIsUploading] = useState(false);\n  const [isDone, setIsDone] = useState(false);\n\n  useEffect(() => {\n    if (!isUploading) return;\n    const interval = setInterval(() => {\n      setProgress(prev => {\n        if (prev >= 100) {clearInterval(interval); setIsUploading(false); setIsDone(true); return 100;}\n        return prev + 10;\n      });\n    }, 300);\n    return () => clearInterval(interval);\n  }, [isUploading]);\n\n  const handleUpload = () => {setFile({name: 'presentation.pdf', size: 2457600}); setProgress(0); setIsUploading(true); setIsDone(false);};\n\n  return (\n    <div style={{maxWidth: 400}}>\n      <button onClick={handleUpload} style={{padding: '8px 16px', background: '#0066cc', color: 'white', border: 'none', borderRadius: 6, cursor: 'pointer'}}>Upload File</button>\n      {file && (\n        <div style={{marginTop: 16, padding: 16, border: '1px solid #e5e7eb', borderRadius: 8}}>\n          <div style={{display: 'flex', justifyContent: 'space-between', marginBottom: 8}}>\n            <span style={{fontWeight: 500, fontSize: 14}}>{file.name}</span>\n            <span style={{color: '#6b7280', fontSize: 12}}>{formatFileSize(file.size)}</span>\n          </div>\n          <div style={{height: 8, background: '#e5e7eb', borderRadius: 4, overflow: 'hidden'}}>\n            <div style={{height: '100%', width: `${progress}%`, background: isDone ? '#16a34a' : '#0066cc', transition: 'width 0.3s', borderRadius: 4}} />\n          </div>\n          <p style={{textAlign: 'right', fontSize: 12, color: '#6b7280', marginTop: 4}}>{progress}%</p>\n          {isDone && <p style={{color: '#16a34a', fontWeight: 500, fontSize: 14}}>Upload complete</p>}\n        </div>\n      )}\n    </div>\n  );\n}\n","tc-5":"export default function CustomCardTheme() {\n  return (\n    <div style={{padding: 24}}>\n      <div style={{borderRadius: 16, padding: 3, background: 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)'}}>\n        <div style={{background: 'white', borderRadius: 13, padding: 20}}>\n          <h3 style={{margin: '0 0 8px', fontSize: 16, fontWeight: 600}}>Gradient Border Card</h3>\n          <p style={{margin: 0, color: '#6b7280', fontSize: 14, lineHeight: 1.5}}>\n            This card uses a wrapper div with a gradient background and inner padding\n            to create the appearance of a gradient border with increased border radius.\n          </p>\n        </div>\n      </div>\n    </div>\n  );\n}\n","ty-3":"export default function MetricsDashboardCard() {\n  return (\n    <div style={{border: '1px solid #e5e7eb', borderRadius: 12, padding: 20, background: 'white', maxWidth: 280}}>\n      <p style={{margin: 0, fontSize: 13, color: '#6b7280'}}>Total Revenue</p>\n      <p style={{margin: '4px 0', fontSize: 28, fontWeight: 700, letterSpacing: '-0.02em'}}>$12,340.56</p>\n      <p style={{margin: 0, fontSize: 13, color: '#16a34a'}}>+12% from last month</p>\n    </div>\n  );\n}\n","wd-5":"import {useState} from 'react';\n\nexport default function FeedbackDialog() {\n  const [isOpen, setIsOpen] = useState(false);\n  const [title, setTitle] = useState('');\n  const [comments, setComments] = useState('');\n  const [isSubmitted, setIsSubmitted] = useState(false);\n\n  const handleSubmit = () => setIsSubmitted(true);\n  const handleReset = () => {setTitle(''); setComments(''); setIsSubmitted(false); setIsOpen(false);};\n\n  return (\n    <>\n      <button onClick={() => setIsOpen(true)} style={{padding: '8px 16px', background: '#0066cc', color: 'white', border: 'none', borderRadius: 6, cursor: 'pointer', fontSize: 14}}>Give Feedback</button>\n      {isOpen && (\n        <div style={{position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.5)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 1000}} role=\"dialog\" aria-label=\"Feedback form\">\n          <div style={{background: 'white', borderRadius: 12, padding: 24, width: 400, maxWidth: '90vw'}}>\n            <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 16}}>\n              <h2 style={{margin: 0, fontSize: 18}}>Feedback</h2>\n              <button onClick={() => setIsOpen(false)} style={{background: 'none', border: 'none', fontSize: 20, cursor: 'pointer'}} aria-label=\"Close\">&times;</button>\n            </div>\n            {isSubmitted ? (\n              <div style={{textAlign: 'center', padding: 24}}>\n                <p style={{color: '#16a34a', fontWeight: 600, fontSize: 16}}>Thank you for your feedback!</p>\n                <p style={{color: '#6b7280', fontSize: 14, marginTop: 8}}>Your response has been recorded.</p>\n                <button onClick={handleReset} style={{marginTop: 16, padding: '8px 16px', background: '#0066cc', color: 'white', border: 'none', borderRadius: 6, cursor: 'pointer'}}>Close</button>\n              </div>\n            ) : (\n              <>\n                <div style={{marginBottom: 12}}>\n                  <label style={{display: 'block', fontSize: 14, fontWeight: 500, marginBottom: 4}}>Title</label>\n                  <input value={title} onChange={e => setTitle(e.target.value)} placeholder=\"Brief summary\" style={{width: '100%', padding: 8, border: '1px solid #d1d5db', borderRadius: 6, fontSize: 14}} />\n                </div>\n                <div style={{marginBottom: 16}}>\n                  <label style={{display: 'block', fontSize: 14, fontWeight: 500, marginBottom: 4}}>Comments</label>\n                  <textarea value={comments} onChange={e => setComments(e.target.value)} placeholder=\"Tell us more...\" rows={5} style={{width: '100%', padding: 8, border: '1px solid #d1d5db', borderRadius: 6, fontSize: 14, resize: 'vertical'}} />\n                </div>\n                <div style={{display: 'flex', justifyContent: 'flex-end', gap: 8}}>\n                  <button onClick={() => setIsOpen(false)} style={{padding: '8px 16px', background: 'transparent', border: '1px solid #d1d5db', borderRadius: 6, cursor: 'pointer'}}>Cancel</button>\n                  <button onClick={handleSubmit} disabled={!title || !comments} style={{padding: '8px 16px', background: !title || !comments ? '#93c5fd' : '#0066cc', color: 'white', border: 'none', borderRadius: 6, cursor: 'pointer'}}>Submit</button>\n                </div>\n              </>\n            )}\n          </div>\n        </div>\n      )}\n    </>\n  );\n}\n"},"astryxTailwindSourceCode":{"cwm-2":"import {useState} from 'react';\nimport {Popover} from '@astryxdesign/core/Popover';\nimport {Button} from '@astryxdesign/core/Button';\nimport {TextInput} from '@astryxdesign/core/TextInput';\n\ntype Label = {\n  id: string;\n  name: string;\n  color: string;\n};\n\nconst labels: Label[] = [\n  {id: '1', name: 'bug', color: '#d73a4a'},\n  {id: '2', name: 'enhancement', color: '#a2eeef'},\n  {id: '3', name: 'documentation', color: '#0075ca'},\n  {id: '4', name: 'good first issue', color: '#7057ff'},\n  {id: '5', name: 'help wanted', color: '#008672'},\n  {id: '6', name: 'question', color: '#d876e3'},\n  {id: '7', name: 'wontfix', color: '#e4e669'},\n  {id: '8', name: 'priority: high', color: '#b60205'},\n];\n\nexport default function LabelPicker() {\n  const [search, setSearch] = useState('');\n  const [selected, setSelected] = useState<Set<string>>(new Set());\n\n  const filtered = labels.filter(l =>\n    l.name.toLowerCase().includes(search.toLowerCase())\n  );\n\n  const toggleLabel = (id: string) => {\n    setSelected(prev => {\n      const next = new Set(prev);\n      if (next.has(id)) next.delete(id);\n      else next.add(id);\n      return next;\n    });\n  };\n\n  return (\n    <Popover\n      trigger={<Button label=\"Labels\" variant=\"secondary\" />}\n      title=\"Apply labels\"\n    >\n      <div className=\"flex flex-col gap-2 p-2\">\n        <TextInput\n          label=\"Filter labels\"\n          isLabelHidden\n          value={search}\n          onChange={setSearch}\n          placeholder=\"Filter labels\"\n        />\n        <div className=\"flex flex-col gap-1\">\n          {filtered.map(label => (\n            <label\n              key={label.id}\n              className=\"flex items-center gap-2 px-2 py-1 rounded hover:bg-gray-100 cursor-pointer\"\n            >\n              <input\n                type=\"checkbox\"\n                checked={selected.has(label.id)}\n                onChange={() => toggleLabel(label.id)}\n                className=\"rounded border-gray-300\"\n              />\n              <span\n                className=\"w-3 h-3 rounded-full flex-shrink-0\"\n                style={{backgroundColor: label.color}}\n              />\n              <span className=\"text-sm\">{label.name}</span>\n            </label>\n          ))}\n        </div>\n      </div>\n    </Popover>\n  );\n}\n","dd-8":"import {Table, proportional, pixel} from '@astryxdesign/core/Table';\nimport {Badge} from '@astryxdesign/core/Badge';\n\ntype ContentItem = {\n  id: string;\n  title: string;\n  type: 'Article' | 'Video' | 'Podcast' | 'Newsletter' | 'Course';\n  author: string;\n  date: string;\n};\n\nconst typeVariants: Record<ContentItem['type'], 'blue' | 'purple' | 'orange' | 'teal' | 'green'> = {\n  Article: 'blue',\n  Video: 'purple',\n  Podcast: 'orange',\n  Newsletter: 'teal',\n  Course: 'green',\n};\n\nconst data: ContentItem[] = [\n  {id: '1', title: 'Getting Started with React 19', type: 'Article', author: 'Sarah Chen', date: '2026-07-01'},\n  {id: '2', title: 'Advanced TypeScript Patterns', type: 'Video', author: 'Mike Johnson', date: '2026-06-28'},\n  {id: '3', title: 'Design Systems Weekly', type: 'Podcast', author: 'Lisa Park', date: '2026-07-10'},\n  {id: '4', title: 'Monthly Product Update', type: 'Newsletter', author: 'Team', date: '2026-07-15'},\n  {id: '5', title: 'Accessibility Fundamentals', type: 'Course', author: 'Alex Rivera', date: '2026-06-15'},\n  {id: '6', title: 'CSS Grid Deep Dive', type: 'Article', author: 'Emily Wong', date: '2026-07-05'},\n  {id: '7', title: 'Component Architecture', type: 'Video', author: 'David Kim', date: '2026-07-12'},\n];\n\nexport default function ContentLibrary() {\n  return (\n    <div className=\"w-full\">\n      <Table\n        data={data}\n        idKey=\"id\"\n        hasHover\n        columns={[\n          {\n            key: 'type',\n            header: 'Type',\n            width: pixel(120),\n            renderCell: (item) => (\n              <Badge variant={typeVariants[item.type]} label={item.type} />\n            ),\n          },\n          {key: 'title', header: 'Title', width: proportional(2)},\n          {key: 'author', header: 'Author', width: proportional(1)},\n          {key: 'date', header: 'Date', width: pixel(120)},\n        ]}\n      />\n    </div>\n  );\n}\n","fwc-14":"import {useState} from 'react';\nimport {Lightbox} from '@astryxdesign/core/Lightbox';\nimport stylex from '@stylexjs/stylex';\n\ntype MediaItem = {\n  type: 'image' | 'video';\n  src: string;\n  alt: string;\n  poster?: string;\n};\n\nconst sampleMedia: MediaItem[] = [\n  {type: 'image', src: '/images/photo-1.jpg', alt: 'Mountain landscape'},\n  {type: 'video', src: '/videos/clip-1.mp4', alt: 'Time lapse video', poster: '/images/poster-1.jpg'},\n  {type: 'image', src: '/images/photo-2.jpg', alt: 'Ocean sunset'},\n  {type: 'image', src: '/images/photo-3.jpg', alt: 'City skyline'},\n  {type: 'video', src: '/videos/clip-2.mp4', alt: 'Nature documentary', poster: '/images/poster-2.jpg'},\n  {type: 'image', src: '/images/photo-4.jpg', alt: 'Forest trail'},\n];\n\nexport default function MediaGallery() {\n  const [isOpen, setIsOpen] = useState(false);\n  const [index, setIndex] = useState(0);\n\n  const lightboxMedia = sampleMedia.map(item =>\n    item.type === 'video'\n      ? {type: 'video' as const, src: item.src, alt: item.alt}\n      : {type: 'image' as const, src: item.src, alt: item.alt}\n  );\n\n  return (\n    <>\n      <div className=\"grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4\">\n        {sampleMedia.map((item, i) => (\n          <button\n            key={i}\n            className=\"relative aspect-video overflow-hidden rounded-lg cursor-pointer focus:ring-2 focus:ring-blue-500 focus:outline-none\"\n            onClick={() => {\n              setIndex(i);\n              setIsOpen(true);\n            }}\n            aria-label={`Open ${item.alt}`}\n          >\n            <img\n              src={item.type === 'video' ? item.poster : item.src}\n              alt={item.alt}\n              className=\"w-full h-full object-cover\"\n            />\n            {item.type === 'video' && (\n              <div className=\"absolute inset-0 flex items-center justify-center bg-black/30\">\n                <svg className=\"w-12 h-12 text-white\" fill=\"currentColor\" viewBox=\"0 0 24 24\">\n                  <path d=\"M8 5v14l11-7z\" />\n                </svg>\n              </div>\n            )}\n          </button>\n        ))}\n      </div>\n      <Lightbox\n        isOpen={isOpen}\n        onOpenChange={setIsOpen}\n        media={lightboxMedia}\n        index={index}\n        onIndexChange={setIndex}\n        hasZoom\n      />\n    </>\n  );\n}\n","io-3":"import {useState, useRef} from 'react';\nimport {Button} from '@astryxdesign/core/Button';\nimport {ProgressBar} from '@astryxdesign/core/ProgressBar';\nimport {Text} from '@astryxdesign/core/Text';\n\nexport default function FileUploadButton() {\n  const [progress, setProgress] = useState(0);\n  const [isUploading, setIsUploading] = useState(false);\n  const [fileName, setFileName] = useState('');\n  const inputRef = useRef<HTMLInputElement>(null);\n\n  const handleFileSelect = async (e: React.ChangeEvent<HTMLInputElement>) => {\n    const file = e.target.files?.[0];\n    if (!file) return;\n\n    setFileName(file.name);\n    setIsUploading(true);\n    setProgress(0);\n\n    const formData = new FormData();\n    formData.append('file', file);\n\n    try {\n      const xhr = new XMLHttpRequest();\n      xhr.upload.addEventListener('progress', (event) => {\n        if (event.lengthComputable) {\n          setProgress(Math.round((event.loaded / event.total) * 100));\n        }\n      });\n      xhr.addEventListener('load', () => {\n        setProgress(100);\n        setIsUploading(false);\n      });\n      xhr.addEventListener('error', () => {\n        setIsUploading(false);\n      });\n      xhr.open('POST', '/api/upload');\n      xhr.send(formData);\n    } catch {\n      setIsUploading(false);\n    }\n  };\n\n  return (\n    <div className=\"flex flex-col gap-3 max-w-xs\">\n      <input\n        ref={inputRef}\n        type=\"file\"\n        onChange={handleFileSelect}\n        className=\"hidden\"\n        aria-label=\"Select file to upload\"\n      />\n      <Button\n        label=\"Choose File\"\n        variant=\"primary\"\n        onClick={() => inputRef.current?.click()}\n        isLoading={isUploading}\n      />\n      {fileName && (\n        <>\n          <Text type=\"supporting\">{fileName}</Text>\n          <ProgressBar\n            label={`Uploading ${fileName}`}\n            value={progress}\n            max={100}\n            hasValueLabel\n            variant={progress === 100 ? 'success' : 'accent'}\n          />\n        </>\n      )}\n    </div>\n  );\n}\n","ps-2":"import {Theme} from '@astryxdesign/core';\nimport {neutralTheme} from '@astryxdesign/theme-neutral';\nimport {AppShell} from '@astryxdesign/core/AppShell';\nimport {TopNav} from '@astryxdesign/core/TopNav';\nimport {Heading} from '@astryxdesign/core/Heading';\nimport {Text} from '@astryxdesign/core/Text';\n\nexport default function RootLayout({children}: {children?: React.ReactNode}) {\n  return (\n    <Theme theme={neutralTheme} mode=\"system\">\n      <AppShell\n        header={\n          <TopNav\n            logo={<span className=\"font-semibold text-lg\">Internal Tool</span>}\n          />\n        }\n      >\n        <main className=\"p-6\">\n          <Heading level={1}>Welcome</Heading>\n          <div className=\"mt-4\">\n            {children}\n          </div>\n        </main>\n      </AppShell>\n    </Theme>\n  );\n}\n","rc-3":"import {Card} from '@astryxdesign/core/Card';\nimport {Heading} from '@astryxdesign/core/Heading';\nimport {Text} from '@astryxdesign/core/Text';\nimport {VStack} from '@astryxdesign/core/VStack';\n\ntype CardData = {\n  title: string;\n  description: string;\n};\n\nconst cards: CardData[] = [\n  {title: 'Design System', description: 'A collection of reusable components and guidelines for building consistent UIs.'},\n  {title: 'Component Library', description: 'Pre-built React components that follow accessibility and theming best practices.'},\n  {title: 'Theme Engine', description: 'Customize colors, typography, and spacing to match your brand identity.'},\n  {title: 'CLI Tools', description: 'Command-line utilities for scaffolding projects and generating component docs.'},\n  {title: 'Documentation', description: 'Comprehensive guides and API references for every component.'},\n  {title: 'Accessibility', description: 'Built-in ARIA support, keyboard navigation, and screen reader compatibility.'},\n];\n\nexport default function ResponsiveCards() {\n  return (\n    <div className=\"grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 p-4\">\n      {cards.map(card => (\n        <Card key={card.title} padding={4}>\n          <VStack gap={2}>\n            <Heading level={3}>{card.title}</Heading>\n            <Text type=\"supporting\">{card.description}</Text>\n          </VStack>\n        </Card>\n      ))}\n    </div>\n  );\n}\n","sd-7":"import {useState, useEffect} from 'react';\nimport {Button} from '@astryxdesign/core/Button';\nimport {ProgressBar} from '@astryxdesign/core/ProgressBar';\nimport {Card} from '@astryxdesign/core/Card';\nimport {VStack} from '@astryxdesign/core/VStack';\nimport {Text} from '@astryxdesign/core/Text';\n\nfunction formatFileSize(bytes: number): string {\n  if (bytes < 1024) return bytes + ' B';\n  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';\n  return (bytes / (1024 * 1024)).toFixed(1) + ' MB';\n}\n\nexport default function FileUpload() {\n  const [file, setFile] = useState<{name: string; size: number} | null>(null);\n  const [progress, setProgress] = useState(0);\n  const [isUploading, setIsUploading] = useState(false);\n  const [isDone, setIsDone] = useState(false);\n\n  useEffect(() => {\n    if (!isUploading) return;\n    const interval = setInterval(() => {\n      setProgress(prev => {\n        if (prev >= 100) {\n          clearInterval(interval);\n          setIsUploading(false);\n          setIsDone(true);\n          return 100;\n        }\n        return prev + 10;\n      });\n    }, 300);\n    return () => clearInterval(interval);\n  }, [isUploading]);\n\n  const handleUpload = () => {\n    setFile({name: 'presentation.pdf', size: 2457600});\n    setProgress(0);\n    setIsUploading(true);\n    setIsDone(false);\n  };\n\n  return (\n    <div className=\"max-w-md\">\n      <VStack gap={4}>\n        <Button label=\"Upload File\" variant=\"primary\" onClick={handleUpload} />\n        {file && (\n          <Card padding={4}>\n            <VStack gap={3}>\n              <div className=\"flex items-center justify-between\">\n                <Text type=\"label\">{file.name}</Text>\n                <Text type=\"supporting\">{formatFileSize(file.size)}</Text>\n              </div>\n              <ProgressBar\n                label=\"Upload progress\"\n                value={progress}\n                max={100}\n                hasValueLabel\n                variant={isDone ? 'success' : 'accent'}\n              />\n              {isDone && (\n                <p className=\"text-sm text-green-600 font-medium\">Upload complete</p>\n              )}\n            </VStack>\n          </Card>\n        )}\n      </VStack>\n    </div>\n  );\n}\n","tc-5":"import {defineTheme} from '@astryxdesign/core';\nimport {Theme} from '@astryxdesign/core';\nimport {Card} from '@astryxdesign/core/Card';\nimport {Heading} from '@astryxdesign/core/Heading';\nimport {Text} from '@astryxdesign/core/Text';\n\nconst customTheme = defineTheme({\n  components: {\n    card: {\n      base: {\n        borderRadius: 16,\n        borderWidth: 2,\n        borderStyle: 'solid',\n        borderImage: 'linear-gradient(135deg, #667eea 0%, #764ba2 100%) 1',\n      },\n    },\n  },\n});\n\nexport default function CustomCardTheme() {\n  return (\n    <Theme theme={customTheme}>\n      <div className=\"p-6 space-y-4\">\n        <Card padding={4}>\n          <div className=\"space-y-2\">\n            <Heading level={3}>Gradient Border Card</Heading>\n            <Text>\n              This card uses component-level style overrides in the theme to apply\n              a gradient border and increased border radius.\n            </Text>\n          </div>\n        </Card>\n      </div>\n    </Theme>\n  );\n}\n","ty-3":"import {Card} from '@astryxdesign/core/Card';\nimport {VStack} from '@astryxdesign/core/VStack';\n\nexport default function MetricsDashboardCard() {\n  return (\n    <Card padding={4}>\n      <VStack gap={1}>\n        <span className=\"text-sm text-gray-500\">Total Revenue</span>\n        <span className=\"text-3xl font-bold tracking-tight\">$12,340.56</span>\n        <span className=\"text-sm text-green-600\">+12% from last month</span>\n      </VStack>\n    </Card>\n  );\n}\n","wd-5":"import {useState} from 'react';\nimport {Dialog} from '@astryxdesign/core/Dialog';\nimport {DialogHeader} from '@astryxdesign/core/Dialog';\nimport {Button} from '@astryxdesign/core/Button';\nimport {TextInput} from '@astryxdesign/core/TextInput';\nimport {TextArea} from '@astryxdesign/core/TextArea';\n\nexport default function FeedbackDialog() {\n  const [isOpen, setIsOpen] = useState(false);\n  const [title, setTitle] = useState('');\n  const [comments, setComments] = useState('');\n  const [isSubmitted, setIsSubmitted] = useState(false);\n\n  const handleSubmit = () => {\n    setIsSubmitted(true);\n  };\n\n  const handleReset = () => {\n    setTitle('');\n    setComments('');\n    setIsSubmitted(false);\n    setIsOpen(false);\n  };\n\n  return (\n    <>\n      <Button label=\"Give Feedback\" variant=\"primary\" onClick={() => setIsOpen(true)} />\n      <Dialog isOpen={isOpen} onOpenChange={setIsOpen} purpose=\"form\">\n        <DialogHeader title=\"Feedback\" onOpenChange={setIsOpen} />\n        {isSubmitted ? (\n          <div className=\"flex flex-col items-center gap-4 p-6\">\n            <p className=\"text-lg font-medium text-green-600\">Thank you for your feedback!</p>\n            <p className=\"text-sm text-gray-500\">Your response has been recorded.</p>\n            <Button label=\"Close\" onClick={handleReset} />\n          </div>\n        ) : (\n          <div className=\"flex flex-col gap-4 p-6\">\n            <TextInput\n              label=\"Title\"\n              value={title}\n              onChange={setTitle}\n              placeholder=\"Brief summary of your feedback\"\n            />\n            <TextArea\n              label=\"Comments\"\n              value={comments}\n              onChange={setComments}\n              placeholder=\"Tell us more about your experience...\"\n            />\n            <div className=\"flex justify-end gap-2\">\n              <Button label=\"Cancel\" variant=\"ghost\" onClick={() => setIsOpen(false)} />\n              <Button\n                label=\"Submit\"\n                variant=\"primary\"\n                onClick={handleSubmit}\n                isDisabled={!title || !comments}\n              />\n            </div>\n          </div>\n        )}\n      </Dialog>\n    </>\n  );\n}\n"},"previews":{"cwm-2":{"astryx":"previews/cwm-2/astryx.html","baseline":"previews/cwm-2/baseline.html","html":"previews/cwm-2/html.html","astryx-tailwind":"previews/cwm-2/astryx-tailwind.html"},"dd-8":{"astryx":"previews/dd-8/astryx.html","baseline":"previews/dd-8/baseline.html","html":"previews/dd-8/html.html","astryx-tailwind":"previews/dd-8/astryx-tailwind.html"},"fwc-14":{"astryx":"previews/fwc-14/astryx.html","baseline":"previews/fwc-14/baseline.html","html":"previews/fwc-14/html.html","astryx-tailwind":"previews/fwc-14/astryx-tailwind.html"},"io-3":{"astryx":"previews/io-3/astryx.html","baseline":"previews/io-3/baseline.html","html":"previews/io-3/html.html","astryx-tailwind":"previews/io-3/astryx-tailwind.html"},"rc-3":{"astryx":"previews/rc-3/astryx.html","baseline":"previews/rc-3/baseline.html","html":"previews/rc-3/html.html","astryx-tailwind":"previews/rc-3/astryx-tailwind.html"},"sd-7":{"astryx":"previews/sd-7/astryx.html","baseline":"previews/sd-7/baseline.html","html":"previews/sd-7/html.html","astryx-tailwind":"previews/sd-7/astryx-tailwind.html"},"tc-5":{"astryx":"previews/tc-5/astryx.html","baseline":"previews/tc-5/baseline.html","html":"previews/tc-5/html.html","astryx-tailwind":"previews/tc-5/astryx-tailwind.html"},"ty-3":{"astryx":"previews/ty-3/astryx.html","baseline":"previews/ty-3/baseline.html","html":"previews/ty-3/html.html","astryx-tailwind":"previews/ty-3/astryx-tailwind.html"},"wd-5":{"astryx":"previews/wd-5/astryx.html","baseline":"previews/wd-5/baseline.html","html":"previews/wd-5/html.html","astryx-tailwind":"previews/wd-5/astryx-tailwind.html"},"ps-2":{"html":"previews/ps-2/html.html"}},"prompts":{"fwc-14":"Build a media gallery that mixes images and videos. Clicking any item opens a lightbox viewer. Videos should show native playback controls. Images should support zoom on double-click.","wd-5":"Build a feedback form that opens in a dialog. It should have a title field, a long-form text area for comments, and a submit button. Show a success state after submission.","cwm-2":"A GitHub-style issue label picker with color dots and search","sd-7":"Build a file upload component that shows a progress bar during upload. Display the filename, file size, and percentage complete. Show a success state when done.","dd-8":"Show a content library table where each row has a small colored pill for its type — Article, Video, Podcast, Newsletter, and Course each need their own distinct color so they're easy to tell apart at a glance. The colors should stay consistent everywhere a type appears.","rc-3":"Cards that stack vertically on mobile but show in a grid on desktop","io-3":"A file upload button that shows progress and calls an upload endpoint","ps-2":"Set up the root layout for a new internal tool. Include proper body styling, theme provider with neutralTheme, and a layout with header and main content area.","ty-3":"Build a metrics dashboard card that shows a label like 'Total Revenue', a large numeric value like '$12,340.56', and a small supporting line that says '+12% from last month'","tc-5":"I want to customize the card component's appearance in my theme — add a gradient border and increase the border radius. How do I do component-level style overrides in the Astryx theme?"}};</script>

  }

  }

  }

    padding: 0;
  }

  }

@layer reset {
  @scope ([data-astryx-theme="neutral"]) to ([data-astryx-theme]) {
    :where(h1, h2, h3, h4, h5, h6) {
      font-family: var(--font-family-heading);
      color: var(--color-text-primary);
    }

    :where(h1) {
      font-size: var(--font-size-2xl);
      font-weight: var(--font-weight-semibold);
      line-height: 1.3333;
    }

    :where(h2) {
      font-size: var(--font-size-xl);
      font-weight: var(--font-weight-semibold);
      line-height: 1.4;
    }

    :where(h3) {
      font-size: var(--font-size-lg);
      font-weight: var(--font-weight-bold);
      line-height: 1.4118;
    }

    :where(h4) {
      font-size: var(--font-size-base);
      font-weight: var(--font-weight-bold);
      line-height: 1.4286;
    }

    :where(h5) {
      font-size: var(--font-size-sm);
      font-weight: var(--font-weight-semibold);
      line-height: 1.6667;
    }

    :where(h6) {
      font-size: var(--font-size-xs);
      font-weight: var(--font-weight-semibold);
      line-height: 1.6;
    }

    :where(p) {
      font-family: var(--font-family-body);
      font-size: var(--font-size-base);
      font-weight: var(--font-weight-normal);
      color: var(--color-text-primary);
      line-height: 1.4286;
    }

    :where(small) {
      font-size: var(--font-size-sm);
      font-weight: var(--font-weight-normal);
      color: var(--color-text-secondary);
      line-height: 1.6667;
    }

    :where(code, pre) {
      font-family: var(--font-family-code);
      font-size: var(--font-size-base);
      line-height: 1.4286;
    }

    :where(hr) {
      border: none;
      border-top: 1px solid var(--color-border);
    }
  }
}

.report-codeModal-header {
  padding: var(--spacing-4);
  justify-content: space-between;

  display: flex;
}

  padding: var(--spacing-4);
  padding-block-start: 0;
}

.report-codeModal-codeBlock {
  background-color: var(--color-background-body);
  padding: var(--spacing-3);
  white-space: pre;
  tab-size: 2;
  border-radius: 6px;
  max-height: 70vh;

  font-size: 13px;
  line-height: 1.5;
  overflow: auto;
}

}

  grid-template-columns: repeat(4, 1fr);

}

.report-compare-summaryGrid5 {

  display: grid;
}

}

.report-color-positive {

}

.report-color-negative {

}

.report-color-neutral {
  color: var(--color-text-secondary);
}

.report-color-warning {

}

.report-color-info {

}

}

.report-promptDetail-promptText {

}

}

.report-header {

  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));

}

.report-gallery-grid {
  gap: var(--spacing-4);
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  display: grid;
}

.report-gallery-cardContent {
  padding: var(--spacing-3);
}

.report-gallery-image {
  cursor: pointer;
  border-radius: var(--spacing-1);
  width: 100%;
  height: auto;
  display: block;
}

.report-gallery-overlay {
  background-color: var(--color-overlay);
  z-index: 9999;
  cursor: pointer;
  justify-content: center;
  align-items: center;
  display: flex;
  position: fixed;
  inset: 0;
}

.report-gallery-overlayImage {
  object-fit: contain;
  max-width: 90vw;
  max-height: 90vh;
}

.report-gallery-meta {
  gap: var(--spacing-2);
  flex-wrap: wrap;
  display: flex;
}
