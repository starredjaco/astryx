xdesign/core/Card';\nimport {Button} from '@astryxdesign/core/Button';\nimport {Heading} from '@astryxdesign/core/Heading';\nimport {Text} from '@astryxdesign/core/Text';\nimport {HStack} from '@astryxdesign/core/HStack';\nimport {VStack} from '@astryxdesign/core/VStack';\nimport stylex from '@stylexjs/stylex';\n\nconst styles = stylex.create({\n  cover: {\n    width: '100%',\n    height: 280,\n    objectFit: 'cover',\n    borderRadius: 8,\n    cursor: 'pointer',\n  },\n  coverPlaceholder: {\n    width: '100%',\n    height: 280,\n    backgroundColor: '#f0f0f0',\n    borderRadius: 8,\n    display: 'flex',\n    alignItems: 'center',\n    justifyContent: 'center',\n    cursor: 'pointer',\n  },\n  iconPicker: {\n    display: 'grid',\n    gridTemplateColumns: 'repeat(6, 1fr)',\n    gap: 8,\n    padding: 16,\n  },\n  iconButton: {\n    fontSize: 24,\n    cursor: 'pointer',\n    padding: 8,\n    borderRadius: 8,\n    border: 'none',\n    backgroundColor: 'transparent',\n  },\n  selectedIcon: {\n    fontSize: 48,\n    cursor: 'pointer',\n  },\n});\n\nconst icons = ['📄', '🎯', '📊', '🚀', '💡', '📝', '🎨', '🔧', '📦', '🌟', '🏠', '📋'];\nconst covers = [\n  'https://picsum.photos/1200/400?random=1',\n  'https://picsum.photos/1200/400?random=2',\n  'https://picsum.photos/1200/400?random=3',\n];\n\nexport default function NotionPageHeader() {\n  const [selectedIcon, setSelectedIcon] = useState('📄');\n  const [showIconPicker, setShowIconPicker] = useState(false);\n  const [coverImage, setCoverImage] = useState<string | null>(null);\n  const [title, setTitle] = useState('Untitled');\n  const [isEditing, setIsEditing] = useState(false);\n\n  return (\n    <VStack gap={3}>\n      {coverImage ? (\n        <img\n          {...stylex.props(styles.cover)}\n          src={coverImage}\n          alt=\"Page cover\"\n          onClick={() => setCoverImage(covers[Math.floor(Math.random() * covers.length)])}\n        />\n      ) : (\n        <div {...stylex.props(styles.coverPlaceholder)} onClick={() => setCoverImage(covers[0])}>\n          <Text color=\"secondary\">Click to add cover</Text>\n        </div>\n      )}\n      <VStack gap={2} padding={4}>\n        <HStack gap={2} vAlign=\"center\">\n          <span\n            {...stylex.props(styles.selectedIcon)}\n            onClick={() => setShowIconPicker(!showIconPicker)}\n            role=\"button\"\n            tabIndex={0}\n            aria-label=\"Change page icon\">\n            {selectedIcon}\n          </span>\n          {isEditing ? (\n            <input\n              value={title}\n              onChange={e => setTitle(e.target.value)}\n              onBlur={() => setIsEditing(false)}\n              autoFocus\n              style={{fontSize: 32, fontWeight: 700, border: 'none', outline: 'none', width: '100%'}}\n            />\n          ) : (\n            <Heading level={1}>\n              <span onClick={() => setIsEditing(true)} role=\"button\" tabIndex={0}>\n                {title}\n              </span>\n            </Heading>\n          )}\n        </HStack>\n        {showIconPicker && (\n          <Card padding={2}>\n            <div {...stylex.props(styles.iconPicker)}>\n              {icons.map(icon => (\n                <button\n                  key={icon}\n                  {...stylex.props(styles.iconButton)}\n                  onClick={() => {\n                    setSelectedIcon(icon);\n                    setShowIconPicker(false);\n                  }}\n                  aria-label={`Select ${icon} icon`}>\n                  {icon}\n                </button>\n              ))}\n            </div>\n          </Card>\n        )}\n        <HStack gap={2}>\n          <Button label=\"Add cover\" variant=\"ghost\" size=\"sm\" onClick={() => setCoverImage(covers[0])} />\n          <Button label=\"Change icon\" variant=\"ghost\" size=\"sm\" onClick={() => setShowIconPicker(true)} />\n        </HStack>\n      </VStack>\n    </VStack>\n  );\n}\n","dd-1":"import {useState, useMemo} from 'react';\nimport {Table} from '@astryxdesign/core/Table';\nimport {TextInput} from '@astryxdesign/core/TextInput';\nimport {VStack} from '@astryxdesign/core/VStack';\nimport {Heading} from '@astryxdesign/core/Heading';\nimport {useTableSortable} from '@astryxdesign/core/Table';\n\ninterface User extends Record<string, unknown> {\n  id: number;\n  name: string;\n  email: string;\n  role: string;\n  department: string;\n  joinDate: string;\n}\n\nconst users: User[] = [\n  {id: 1, name: 'Alice Johnson', email: 'alice@example.com', role: 'Engineer', department: 'Engineering', joinDate: '2022-03-15'},\n  {id: 2, name: 'Bob Smith', email: 'bob@example.com', role: 'Designer', department: 'Design', joinDate: '2021-07-20'},\n  {id: 3, name: 'Carol Williams', email: 'carol@example.com', role: 'Manager', department: 'Engineering', joinDate: '2020-01-10'},\n  {id: 4, name: 'David Brown', email: 'david@example.com', role: 'Engineer', department: 'Engineering', joinDate: '2023-02-28'},\n  {id: 5, name: 'Eva Martinez', email: 'eva@example.com', role: 'Designer', department: 'Design', joinDate: '2022-11-05'},\n  {id: 6, name: 'Frank Lee', email: 'frank@example.com', role: 'PM', department: 'Product', joinDate: '2021-09-14'},\n  {id: 7, name: 'Grace Kim', email: 'grace@example.com', role: 'Engineer', department: 'Engineering', joinDate: '2023-06-01'},\n  {id: 8, name: 'Henry Chen', email: 'henry@example.com', role: 'Manager', department: 'Product', joinDate: '2019-04-22'},\n];\n\nexport default function UserTable() {\n  const [search, setSearch] = useState('');\n  const sortable = useTableSortable<User>();\n\n  const filteredUsers = useMemo(\n    () =>\n      users.filter(\n        user =>\n          user.name.toLowerCase().includes(search.toLowerCase()) ||\n          user.email.toLowerCase().includes(search.toLowerCase()) ||\n          user.role.toLowerCase().includes(search.toLowerCase()) ||\n          user.department.toLowerCase().includes(search.toLowerCase()),\n      ),\n    [search],\n  );\n\n  return (\n    <VStack gap={4} padding={4}>\n      <Heading level={2}>Users</Heading>\n      <TextInput\n        label=\"Search users\"\n        value={search}\n        onChange={setSearch}\n        placeholder=\"Search by name, email, role, or department...\"\n        hasClear\n        isLabelHidden\n      />\n      <Table\n        data={filteredUsers}\n        idKey=\"id\"\n        columns={[\n          {key: 'name', header: 'Name'},\n          {key: 'email', header: 'Email'},\n          {key: 'role', header: 'Role'},\n          {key: 'department', header: 'Department'},\n          {key: 'joinDate', header: 'Joined'},\n        ]}\n        hasHover\n        plugins={{sortable}}\n      />\n    </VStack>\n  );\n}\n","fwc-14":"import {useState} from 'react';\nimport {Lightbox} from '@astryxdesign/core/Lightbox';\nimport {Card} from '@astryxdesign/core/Card';\nimport {Heading} from '@astryxdesign/core/Heading';\nimport stylex from '@stylexjs/stylex';\n\nconst styles = stylex.create({\n  gallery: {\n    display: 'grid',\n    gridTemplateColumns: 'repeat(auto-fill, minmax(200px, 1fr))',\n    gap: 16,\n    padding: 24,\n  },\n  thumbnail: {\n    cursor: 'pointer',\n    borderRadius: 8,\n    overflow: 'hidden',\n    aspectRatio: '1',\n  },\n  img: {\n    width: '100%',\n    height: '100%',\n    objectFit: 'cover',\n  },\n  video: {\n    width: '100%',\n    height: '100%',\n    objectFit: 'cover',\n  },\n});\n\ntype MediaItem = {\n  type: 'image' | 'video';\n  src: string;\n  alt: string;\n};\n\nconst mediaItems: MediaItem[] = [\n  {type: 'image', src: 'https://picsum.photos/800/600?random=1', alt: 'Landscape photo'},\n  {type: 'video', src: 'https://www.w3schools.com/html/mov_bbb.mp4', alt: 'Sample video'},\n  {type: 'image', src: 'https://picsum.photos/800/600?random=2', alt: 'City skyline'},\n  {type: 'image', src: 'https://picsum.photos/800/600?random=3', alt: 'Mountain view'},\n  {type: 'video', src: 'https://www.w3schools.com/html/movie.mp4', alt: 'Another video'},\n  {type: 'image', src: 'https://picsum.photos/800/600?random=4', alt: 'Ocean sunset'},\n];\n\nexport default function MediaGallery() {\n  const [isOpen, setIsOpen] = useState(false);\n  const [currentIndex, setCurrentIndex] = useState(0);\n\n  const lightboxMedia = mediaItems.map(item => ({\n    src: item.src,\n    alt: item.alt,\n    type: item.type as 'image' | 'video',\n  }));\n\n  return (\n    <div>\n      <Heading level={2}>Media Gallery</Heading>\n      <div {...stylex.props(styles.gallery)}>\n        {mediaItems.map((item, index) => (\n          <Card key={index} padding={0}>\n            <div\n              {...stylex.props(styles.thumbnail)}\n              onClick={() => {\n                setCurrentIndex(index);\n                setIsOpen(true);\n              }}\n              role=\"button\"\n              tabIndex={0}\n              aria-label={`Open ${item.alt}`}\n              onKeyDown={e => {\n                if (e.key === 'Enter' || e.key === ' ') {\n                  setCurrentIndex(index);\n                  setIsOpen(true);\n                }\n              }}>\n              {item.type === 'image' ? (\n                <img {...stylex.props(styles.img)} src={item.src} alt={item.alt} />\n              ) : (\n                <video {...stylex.props(styles.video)} src={item.src} muted />\n              )}\n            </div>\n          </Card>\n        ))}\n      </div>\n      <Lightbox\n        isOpen={isOpen}\n        onOpenChange={setIsOpen}\n        media={lightboxMedia}\n        index={currentIndex}\n        onIndexChange={setCurrentIndex}\n        hasZoom\n      />\n    </div>\n  );\n}\n","io-2":"import {useState, useCallback} from 'react';\nimport {Typeahead} from '@astryxdesign/core/Typeahead';\nimport {VStack} from '@astryxdesign/core/VStack';\nimport {Heading} from '@astryxdesign/core/Heading';\nimport {Text} from '@astryxdesign/core/Text';\nimport {Card} from '@astryxdesign/core/Card';\n\ninterface Suggestion {\n  id: number;\n  name: string;\n  category: string;\n}\n\nconst allSuggestions: Suggestion[] = [\n  {id: 1, name: 'React', category: 'Framework'},\n  {id: 2, name: 'TypeScript', category: 'Language'},\n  {id: 3, name: 'Next.js', category: 'Framework'},\n  {id: 4, name: 'Tailwind CSS', category: 'Styling'},\n  {id: 5, name: 'Vite', category: 'Build Tool'},\n  {id: 6, name: 'ESLint', category: 'Linting'},\n  {id: 7, name: 'Prettier', category: 'Formatting'},\n  {id: 8, name: 'Jest', category: 'Testing'},\n  {id: 9, name: 'Playwright', category: 'Testing'},\n  {id: 10, name: 'GraphQL', category: 'API'},\n];\n\nfunction createSearchSource() {\n  return {\n    search: async (query: string) => {\n      await new Promise(resolve => setTimeout(resolve, 200));\n      return allSuggestions.filter(s => s.name.toLowerCase().includes(query.toLowerCase()));\n    },\n    bootstrap: async () => allSuggestions.slice(0, 5),\n  };\n}\n\nexport default function AutocompleteInput() {\n  const [selected, setSelected] = useState<Suggestion | null>(null);\n  const searchSource = createSearchSource();\n\n  return (\n    <VStack gap={4} padding={4}>\n      <Heading level={2}>Technology Search</Heading>\n      <Text color=\"secondary\">Start typing to search for technologies</Text>\n      <Typeahead\n        label=\"Search technologies\"\n        searchSource={searchSource}\n        value={selected}\n        onChange={setSelected}\n        placeholder=\"Type to search...\"\n        hasEntriesOnFocus\n        renderItem={(item: Suggestion) => (\n          <div>\n            <Text type=\"label\">{item.name}</Text>\n            <Text type=\"supporting\" color=\"secondary\">\n              {' '}{item.category}\n            </Text>\n          </div>\n        )}\n      />\n      {selected && (\n        <Card padding={3}>\n          <VStack gap={1}>\n            <Text type=\"label\">Selected: {selected.name}</Text>\n            <Text type=\"supporting\" color=\"secondary\">Category: {selected.category}</Text>\n          </VStack>\n        </Card>\n      )}\n    </VStack>\n  );\n}\n","ps-1":"import {useState} from 'react';\nimport {Layout} from '@astryxdesign/core/Layout';\nimport {LayoutHeader} from '@astryxdesign/core/Layout';\nimport {LayoutContent} from '@astryxdesign/core/Layout';\nimport {LayoutPanel} from '@astryxdesign/core/Layout';\nimport {Heading} from '@astryxdesign/core/Heading';\nimport {Text} from '@astryxdesign/core/Text';\nimport {Button} from '@astryxdesign/core/Button';\nimport {VStack} from '@astryxdesign/core/VStack';\nimport {HStack} from '@astryxdesign/core/HStack';\nimport {Card} from '@astryxdesign/core/Card';\nimport {TextInput} from '@astryxdesign/core/TextInput';\nimport {CheckboxInput} from '@astryxdesign/core/CheckboxInput';\n\nconst navItems = ['General', 'Notifications', 'Security', 'Appearance', 'Integrations'];\n\nexport default function SettingsDashboard() {\n  const [activeSection, setActiveSection] = useState('General');\n  const [username, setUsername] = useState('johndoe');\n  const [email, setEmail] = useState('john@example.com');\n  const [emailNotifs, setEmailNotifs] = useState(true);\n  const [pushNotifs, setPushNotifs] = useState(false);\n\n  const renderContent = () => {\n    switch (activeSection) {\n      case 'General':\n        return (\n          <VStack gap={4}>\n            <Heading level={3}>General Settings</Heading>\n            <TextInput label=\"Username\" value={username} onChange={setUsername} />\n            <TextInput label=\"Email\" value={email} onChange={setEmail} type=\"email\" />\n            <Button label=\"Save Changes\" variant=\"primary\" />\n          </VStack>\n        );\n      case 'Notifications':\n        return (\n          <VStack gap={4}>\n            <Heading level={3}>Notification Preferences</Heading>\n            <CheckboxInput\n              label=\"Email notifications\"\n              value={emailNotifs}\n              onChange={checked => setEmailNotifs(checked)}\n            />\n            <CheckboxInput\n              label=\"Push notifications\"\n              value={pushNotifs}\n              onChange={checked => setPushNotifs(checked)}\n            />\n            <Button label=\"Save Preferences\" variant=\"primary\" />\n          </VStack>\n        );\n      default:\n        return (\n          <VStack gap={4}>\n            <Heading level={3}>{activeSection}</Heading>\n            <Text color=\"secondary\">Settings for {activeSection} will appear here.</Text>\n          </VStack>\n        );\n    }\n  };\n\n  return (\n    <Layout\n      header={\n        <LayoutHeader hasDivider>\n          <HStack padding={3} vAlign=\"center\">\n            <Heading level={1}>Settings</Heading>\n          </HStack>\n        </LayoutHeader>\n      }\n      start={\n        <LayoutPanel hasDivider label=\"Settings navigation\">\n          <VStack gap={1} padding={2}>\n            {navItems.map(item => (\n              <Button\n                key={item}\n                label={item}\n                variant={activeSection === item ? 'secondary' : 'ghost'}\n                onClick={() => setActiveSection(item)}\n              />\n            ))}\n          </VStack>\n        </LayoutPanel>\n      }\n      content={\n        <LayoutContent padding={4}>\n          {renderContent()}\n        </LayoutContent>\n      }\n    />\n  );\n}\n","rc-1":"import {useState} from 'react';\nimport {Button} from '@astryxdesign/core/Button';\nimport {HStack} from '@astryxdesign/core/HStack';\nimport {VStack} from '@astryxdesign/core/VStack';\nimport {Text} from '@astryxdesign/core/Text';\nimport {IconButton} from '@astryxdesign/core/IconButton';\nimport stylex from '@stylexjs/stylex';\n\nconst styles = stylex.create({\n  nav: {\n    padding: 16,\n    borderBottom: '1px solid #e0e0e0',\n  },\n  mobileMenu: {\n    position: 'fixed',\n    top: 0,\n    left: 0,\n    right: 0,\n    bottom: 0,\n    backgroundColor: 'white',\n    zIndex: 1000,\n    padding: 24,\n  },\n  desktopLinks: {\n    display: 'flex',\n    gap: 8,\n    '@media (max-width: 768px)': {\n      display: 'none',\n    },\n  },\n  hamburger: {\n    display: 'none',\n    '@media (max-width: 768px)': {\n      display: 'flex',\n    },\n  },\n  logo: {\n    fontWeight: 700,\n    fontSize: 20,\n  },\n});\n\nconst navLinks = ['Home', 'Products', 'About', 'Contact', 'Blog'];\n\nexport default function ResponsiveNav() {\n  const [isMobileOpen, setIsMobileOpen] = useState(false);\n\n  return (\n    <>\n      <nav {...stylex.props(styles.nav)}>\n        <HStack hAlign=\"between\" vAlign=\"center\">\n          <Text type=\"label\" {...stylex.props(styles.logo)}>\n            MyApp\n          </Text>\n          <div {...stylex.props(styles.desktopLinks)}>\n            <HStack gap={1}>\n              {navLinks.map(link => (\n                <Button key={link} label={link} variant=\"ghost\" size=\"sm\" />\n              ))}\n            </HStack>\n          </div>\n          <div {...stylex.props(styles.hamburger)}>\n            <IconButton\n              label=\"Open menu\"\n              icon={<span>&#9776;</span>}\n              variant=\"ghost\"\n              onClick={() => setIsMobileOpen(true)}\n            />\n          </div>\n        </HStack>\n      </nav>\n      {isMobileOpen && (\n        <div {...stylex.props(styles.mobileMenu)}>\n          <VStack gap={3}>\n            <HStack hAlign=\"between\" vAlign=\"center\">\n              <Text type=\"label\" {...stylex.props(styles.logo)}>\n                MyApp\n              </Text>\n              <IconButton\n                label=\"Close menu\"\n                icon={<span>&times;</span>}\n                variant=\"ghost\"\n                onClick={() => setIsMobileOpen(false)}\n              />\n            </HStack>\n            {navLinks.map(link => (\n              <Button\n                key={link}\n                label={link}\n                variant=\"ghost\"\n                onClick={() => setIsMobileOpen(false)}\n              />\n            ))}\n          </VStack>\n        </div>\n      )}\n    </>\n  );\n}\n","sd-4":"import {useState, useRef, useEffect} from 'react';\nimport {CheckboxInput} from '@astryxdesign/core/CheckboxInput';\nimport {Button} from '@astryxdesign/core/Button';\nimport {TextArea} from '@astryxdesign/core/TextArea';\nimport {VStack} from '@astryxdesign/core/VStack';\nimport {Heading} from '@astryxdesign/core/Heading';\nimport {Text} from '@astryxdesign/core/Text';\n\nconst TERMS_TEXT = `Terms and Conditions\n\n1. Acceptance of Terms\nBy accessing and using this service, you accept and agree to be bound by the terms and provision of this agreement.\n\n2. Use License\nPermission is granted to temporarily use this service for personal, non-commercial transitory viewing only.\n\n3. Disclaimer\nThe materials on this service are provided on an 'as is' basis. We make no warranties, expressed or implied, and hereby disclaim and negate all other warranties including, without limitation, implied warranties or conditions of merchantability, fitness for a particular purpose, or non-infringement of intellectual property or other violation of rights.\n\n4. Limitations\nIn no event shall we or our suppliers be liable for any damages (including, without limitation, damages for loss of data or profit, or due to business interruption) arising out of the use or inability to use this service.\n\n5. Accuracy of Materials\nThe materials appearing on this service could include technical, typographical, or photographic errors. We do not warrant that any of the materials on its website are accurate, complete or current.\n\n6. Links\nWe have not reviewed all of the sites linked to our service and are not responsible for the contents of any such linked site.\n\n7. Modifications\nWe may revise these terms of service at any time without notice. By using this service you are agreeing to be bound by the then current version of these terms of service.\n\n8. Governing Law\nThese terms and conditions are governed by and construed in accordance with the laws and you irrevocably submit to the exclusive jurisdiction of the courts in that location.`;\n\nexport default function TermsAcceptanceForm() {\n  const [hasScrolledToBottom, setHasScrolledToBottom] = useState(false);\n  const [isAccepted, setIsAccepted] = useState(false);\n  const [isSubmitted, setIsSubmitted] = useState(false);\n  const scrollRef = useRef<HTMLDivElement>(null);\n\n  useEffect(() => {\n    const el = scrollRef.current;\n    if (!el) return;\n    const handleScroll = () => {\n      const atBottom = el.scrollHeight - el.scrollTop <= el.clientHeight + 20;\n      if (atBottom) setHasScrolledToBottom(true);\n    };\n    el.addEventListener('scroll', handleScroll);\n    return () => el.removeEventListener('scroll', handleScroll);\n  }, []);\n\n  if (isSubmitted) {\n    return (\n      <VStack gap={4} padding={4}>\n        <Heading level={2}>Terms Accepted</Heading>\n        <Text>Thank you for accepting the terms and conditions.</Text>\n      </VStack>\n    );\n  }\n\n  return (\n    <VStack gap={4} padding={4}>\n      <Heading level={2}>Terms and Conditions</Heading>\n      <Text color=\"secondary\">Please read and scroll through the entire document before accepting.</Text>\n      <div\n        ref={scrollRef}\n        style={{maxHeight: 300, overflow: 'auto', border: '1px solid #e0e0e0', borderRadius: 8, padding: 16}}>\n        <Text as=\"div\" style={{whiteSpace: 'pre-wrap'}}>\n          {TERMS_TEXT}\n        </Text>\n      </div>\n      {!hasScrolledToBottom && (\n        <Text color=\"secondary\" type=\"supporting\">\n          Scroll to the bottom to enable acceptance\n        </Text>\n      )}\n      <CheckboxInput\n        label=\"I have read and agree to the Terms and Conditions\"\n        value={isAccepted}\n        onChange={checked => setIsAccepted(checked)}\n        isDisabled={!hasScrolledToBottom}\n      />\n      <Button\n        label=\"Accept and Continue\"\n        variant=\"primary\"\n        isDisabled={!isAccepted}\n        onClick={() => setIsSubmitted(true)}\n      />\n    </VStack>\n  );\n}\n","tc-4":"import {useState} from 'react';\nimport {Theme} from '@astryxdesign/core/theme';\nimport {Card} from '@astryxdesign/core/Card';\nimport {Button} from '@astryxdesign/core/Button';\nimport {Heading} from '@astryxdesign/core/Heading';\nimport {Text} from '@astryxdesign/core/Text';\nimport {VStack} from '@astryxdesign/core/VStack';\nimport {HStack} from '@astryxdesign/core/HStack';\nimport {defineTheme} from '@astryxdesign/core/theme';\n\nconst defaultTheme = defineTheme({\n  name: 'default',\n  color: {accent: '#2563eb'},\n});\n\nconst midnightTheme = defineTheme({\n  name: 'midnight',\n  color: {accent: '#7c3aed'},\n});\n\nconst sunriseTheme = defineTheme({\n  name: 'sunrise',\n  color: {accent: '#ea580c'},\n});\n\nconst themes = [\n  {name: 'Default', theme: defaultTheme, description: 'Clean blue accent with neutral tones'},\n  {name: 'Midnight', theme: midnightTheme, description: 'Dark purple accent for a nighttime feel'},\n  {name: 'Sunrise', theme: sunriseTheme, description: 'Warm orange accent for an energetic look'},\n];\n\nexport default function ThemeSwitcher() {\n  const [activeTheme, setActiveTheme] = useState(themes[0]);\n\n  return (\n    <Theme theme={activeTheme.theme} mode=\"light\">\n      <VStack gap={4} padding={4}>\n        <Heading level={2}>Theme Switcher</Heading>\n        <Text color=\"secondary\">Pick a theme to preview how components look with different color systems.</Text>\n        <HStack gap={2} wrap=\"wrap\">\n          {themes.map(t => (\n            <Card key={t.name} padding={3}>\n              <VStack gap={2}>\n                <Text type=\"label\">{t.name}</Text>\n                <Text type=\"supporting\" color=\"secondary\">{t.description}</Text>\n                <Button\n                  label={activeTheme.name === t.name ? 'Active' : 'Apply'}\n                  variant={activeTheme.name === t.name ? 'primary' : 'secondary'}\n                  onClick={() => setActiveTheme(t)}\n                  isDisabled={activeTheme.name === t.name}\n                />\n              </VStack>\n            </Card>\n          ))}\n        </HStack>\n        <Card padding={4}>\n          <VStack gap={3}>\n            <Heading level={3}>Preview</Heading>\n            <Text>This card demonstrates the current theme. Buttons and accents reflect the selected palette.</Text>\n            <HStack gap={2}>\n              <Button label=\"Primary Action\" variant=\"primary\" />\n              <Button label=\"Secondary\" variant=\"secondary\" />\n              <Button label=\"Ghost\" variant=\"ghost\" />\n            </HStack>\n          </VStack>\n        </Card>\n      </VStack>\n    </Theme>\n  );\n}\n","ty-10":"import {Heading} from '@astryxdesign/core/Heading';\nimport {Text} from '@astryxdesign/core/Text';\nimport {VStack} from '@astryxdesign/core/VStack';\nimport {HStack} from '@astryxdesign/core/HStack';\nimport {Avatar} from '@astryxdesign/core/Avatar';\nimport stylex from '@stylexjs/stylex';\n\nconst styles = stylex.create({\n  article: {\n    maxWidth: 720,\n    margin: '0 auto',\n    padding: 24,\n  },\n  heroImage: {\n    width: '100%',\n    height: 400,\n    objectFit: 'cover',\n    borderRadius: 12,\n  },\n  divider: {\n    height: 1,\n    backgroundColor: '#e0e0e0',\n    width: '100%',\n  },\n  pullQuote: {\n    borderLeft: '4px solid #333',\n    paddingLeft: 24,\n    margin: '32px 0',\n    fontStyle: 'italic',\n  },\n});\n\nexport default function ArticlePage() {\n  return (\n    <div {...stylex.props(styles.article)}>\n      <VStack gap={4}>\n        <Heading level={1} type=\"display-1\">\n          The Future of Design Systems in Modern Web Development\n        </Heading>\n        <Text type=\"large\" color=\"secondary\">\n          How component libraries are reshaping the way teams build consistent, accessible user interfaces at scale.\n        </Text>\n        <HStack gap={2} vAlign=\"center\">\n          <Avatar name=\"Sarah Chen\" size=\"md\" />\n          <VStack gap={0.5}>\n            <Text type=\"label\">Sarah Chen</Text>\n            <Text type=\"supporting\" color=\"secondary\">\n              Published Jan 15, 2024 · 8 min read\n            </Text>\n          </VStack>\n        </HStack>\n        <div {...stylex.props(styles.divider)} />\n        <img\n          {...stylex.props(styles.heroImage)}\n          src=\"https://picsum.photos/1200/600?random=10\"\n          alt=\"Design system components arranged on a canvas\"\n        />\n        <Text as=\"p\">\n          Design systems have become the foundation of modern web development. They provide a shared language between designers and developers, ensuring consistency across products and reducing duplication of effort.\n        </Text>\n        <Text as=\"p\">\n          At their core, design systems are collections of reusable components, guided by clear standards, that can be assembled to build any number of applications. But they are more than just component libraries.\n        </Text>\n        <Heading level={2}>The Evolution of Component Architecture</Heading>\n        <Text as=\"p\">\n          The shift from monolithic CSS frameworks to modular component systems reflects a broader trend in software engineering toward composability and reuse. Modern design systems embrace this philosophy fully.\n        </Text>\n        <div {...stylex.props(styles.pullQuote)}>\n          <Text type=\"large\">\n            A good design system is invisible. It disappears into the product, letting content and functionality take center stage.\n          </Text>\n        </div>\n        <Text as=\"p\">\n          Component-driven development encourages teams to think in terms of building blocks rather than pages. Each component encapsulates its own styles, behavior, and accessibility requirements.\n        </Text>\n        <Heading level={2}>Accessibility as a Foundation</Heading>\n        <Text as=\"p\">\n          When accessibility is built into the design system layer, every product built on top inherits those guarantees. Focus management, ARIA attributes, keyboard navigation, and screen reader support all come for free.\n        </Text>\n        <Heading level={2}>Looking Ahead</Heading>\n        <Text as=\"p\">\n          The next wave of design systems will incorporate AI-assisted development, dynamic theming that responds to user preferences, and cross-platform consistency that spans web, mobile, and spatial computing.\n        </Text>\n      </VStack>\n    </div>\n  );\n}\n","wd-4":"import {useState, useMemo} from 'react';\nimport {Table} from '@astryxdesign/core/Table';\nimport {Button} from '@astryxdesign/core/Button';\nimport {TextInput} from '@astryxdesign/core/TextInput';\nimport {HStack} from '@astryxdesign/core/HStack';\nimport {VStack} from '@astryxdesign/core/VStack';\nimport {Heading} from '@astryxdesign/core/Heading';\nimport {useTablePagination} from '@astryxdesign/core/Table';\nimport {useTableSortable} from '@astryxdesign/core/Table';\n\ninterface Todo extends Record<string, unknown> {\n  id: number;\n  title: string;\n  status: 'pending' | 'in-progress' | 'done';\n  priority: 'low' | 'medium' | 'high';\n  createdAt: string;\n}\n\nconst initialTodos: Todo[] = [\n  {id: 1, title: 'Set up project', status: 'done', priority: 'high', createdAt: '2024-01-10'},\n  {id: 2, title: 'Design database schema', status: 'in-progress', priority: 'high', createdAt: '2024-01-11'},\n  {id: 3, title: 'Build API endpoints', status: 'pending', priority: 'medium', createdAt: '2024-01-12'},\n  {id: 4, title: 'Write unit tests', status: 'pending', priority: 'medium', createdAt: '2024-01-13'},\n  {id: 5, title: 'Deploy to staging', status: 'pending', priority: 'low', createdAt: '2024-01-14'},\n  {id: 6, title: 'User acceptance testing', status: 'pending', priority: 'low', createdAt: '2024-01-15'},\n  {id: 7, title: 'Performance optimization', status: 'pending', priority: 'medium', createdAt: '2024-01-16'},\n  {id: 8, title: 'Documentation', status: 'pending', priority: 'low', createdAt: '2024-01-17'},\n  {id: 9, title: 'Code review', status: 'in-progress', priority: 'high', createdAt: '2024-01-18'},\n  {id: 10, title: 'Release planning', status: 'pending', priority: 'medium', createdAt: '2024-01-19'},\n  {id: 11, title: 'Bug fixes', status: 'in-progress', priority: 'high', createdAt: '2024-01-20'},\n  {id: 12, title: 'Monitoring setup', status: 'pending', priority: 'low', createdAt: '2024-01-21'},\n];\n\nexport default function TodoTracker() {\n  const [search, setSearch] = useState('');\n  const [todos, setTodos] = useState(initialTodos);\n  const [newTitle, setNewTitle] = useState('');\n\n  const filteredTodos = useMemo(\n    () => todos.filter(todo => todo.title.toLowerCase().includes(search.toLowerCase())),\n    [todos, search],\n  );\n\n  const pagination = useTablePagination({pageSize: 5});\n  const sortable = useTableSortable<Todo>();\n\n  const addTodo = () => {\n    if (!newTitle.trim()) return;\n    const newTodo: Todo = {\n      id: Date.now(),\n      title: newTitle.trim(),\n      status: 'pending',\n      priority: 'medium',\n      createdAt: new Date().toISOString().split('T')[0],\n    };\n    setTodos(prev => [...prev, newTodo]);\n    setNewTitle('');\n  };\n\n  return (\n    <VStack gap={4} padding={4}>\n      <Heading level={1}>TodoTracker</Heading>\n      <HStack gap={2} vAlign=\"end\">\n        <TextInput\n          label=\"Search todos\"\n          value={search}\n          onChange={setSearch}\n          placeholder=\"Filter by title...\"\n          hasClear\n        />\n        <TextInput label=\"New todo\" value={newTitle} onChange={setNewTitle} placeholder=\"Add a task...\" />\n        <Button label=\"Add\" variant=\"primary\" onClick={addTodo} />\n      </HStack>\n      <Table\n        data={filteredTodos}\n        idKey=\"id\"\n        columns={[\n          {key: 'title', header: 'Title'},\n          {key: 'status', header: 'Status'},\n          {key: 'priority', header: 'Priority'},\n          {key: 'createdAt', header: 'Created'},\n        ]}\n        hasHover\n        plugins={{pagination, sortable}}\n      />\n    </VStack>\n  );\n}\n"},"baselineSourceCode":{"cwm-3":"import {useState} from 'react';\nimport {Card} from '@/components/ui/card';\nimport {Button} from '@/components/ui/button';\n\nconst icons = ['📄', '🎯', '📊', '🚀', '💡', '📝', '🎨', '🔧', '📦', '🌟', '🏠', '📋'];\nconst covers = ['https://picsum.photos/1200/400?random=1', 'https://picsum.photos/1200/400?random=2', 'https://picsum.photos/1200/400?random=3'];\n\nexport default function NotionPageHeader() {\n  const [selectedIcon, setSelectedIcon] = useState('📄');\n  const [showIconPicker, setShowIconPicker] = useState(false);\n  const [coverImage, setCoverImage] = useState<string | null>(null);\n  const [title, setTitle] = useState('Untitled');\n  const [isEditing, setIsEditing] = useState(false);\n\n  return (\n    <div className=\"space-y-3\">\n      {coverImage ? (\n        <img className=\"w-full h-72 object-cover rounded-lg cursor-pointer\" src={coverImage} alt=\"Cover\" onClick={() => setCoverImage(covers[Math.floor(Math.random() * covers.length)])} />\n      ) : (\n        <div className=\"w-full h-72 bg-gray-100 rounded-lg flex items-center justify-center cursor-pointer\" onClick={() => setCoverImage(covers[0])}>\n          <span className=\"text-gray-500\">Click to add cover</span>\n        </div>\n      )}\n      <div className=\"px-6 space-y-3\">\n        <div className=\"flex items-center gap-3\">\n          <span className=\"text-5xl cursor-pointer\" onClick={() => setShowIconPicker(!showIconPicker)} role=\"button\" tabIndex={0}>{selectedIcon}</span>\n          {isEditing ? (\n            <input value={title} onChange={e => setTitle(e.target.value)} onBlur={() => setIsEditing(false)} autoFocus className=\"text-3xl font-bold border-none outline-none w-full\" />\n          ) : (\n            <h1 className=\"text-3xl font-bold cursor-text\" onClick={() => setIsEditing(true)}>{title}</h1>\n          )}\n        </div>\n        {showIconPicker && (\n          <Card className=\"p-3\">\n            <div className=\"grid grid-cols-6 gap-2\">\n              {icons.map(icon => (\n                <button key={icon} className=\"text-2xl p-2 rounded hover:bg-gray-100 border-0 bg-transparent cursor-pointer\" onClick={() => { setSelectedIcon(icon); setShowIconPicker(false); }}>{icon}</button>\n              ))}\n            </div>\n          </Card>\n        )}\n        <div className=\"flex gap-2\">\n          <Button variant=\"ghost\" size=\"sm\" onClick={() => setCoverImage(covers[0])}>Add cover</Button>\n          <Button variant=\"ghost\" size=\"sm\" onClick={() => setShowIconPicker(true)}>Change icon</Button>\n        </div>\n      </div>\n    </div>\n  );\n}\n","dd-1":"import {useState, useMemo} from 'react';\nimport {Input} from '@/components/ui/input';\nimport {Table, TableBody, TableCell, TableHead, TableHeader, TableRow} from '@/components/ui/table';\n\ninterface User {\n  id: number;\n  name: string;\n  email: string;\n  role: string;\n  department: string;\n  joinDate: string;\n}\n\nconst users: User[] = [\n  {id: 1, name: 'Alice Johnson', email: 'alice@example.com', role: 'Engineer', department: 'Engineering', joinDate: '2022-03-15'},\n  {id: 2, name: 'Bob Smith', email: 'bob@example.com', role: 'Designer', department: 'Design', joinDate: '2021-07-20'},\n  {id: 3, name: 'Carol Williams', email: 'carol@example.com', role: 'Manager', department: 'Engineering', joinDate: '2020-01-10'},\n  {id: 4, name: 'David Brown', email: 'david@example.com', role: 'Engineer', department: 'Engineering', joinDate: '2023-02-28'},\n  {id: 5, name: 'Eva Martinez', email: 'eva@example.com', role: 'Designer', department: 'Design', joinDate: '2022-11-05'},\n  {id: 6, name: 'Frank Lee', email: 'frank@example.com', role: 'PM', department: 'Product', joinDate: '2021-09-14'},\n  {id: 7, name: 'Grace Kim', email: 'grace@example.com', role: 'Engineer', department: 'Engineering', joinDate: '2023-06-01'},\n  {id: 8, name: 'Henry Chen', email: 'henry@example.com', role: 'Manager', department: 'Product', joinDate: '2019-04-22'},\n];\n\nexport default function UserTable() {\n  const [search, setSearch] = useState('');\n  const [sortKey, setSortKey] = useState<keyof User>('name');\n  const [sortDir, setSortDir] = useState<'asc' | 'desc'>('asc');\n\n  const filteredUsers = useMemo(() => {\n    const filtered = users.filter(u => u.name.toLowerCase().includes(search.toLowerCase()) || u.email.toLowerCase().includes(search.toLowerCase()));\n    filtered.sort((a, b) => {\n      const cmp = String(a[sortKey]).localeCompare(String(b[sortKey]));\n      return sortDir === 'asc' ? cmp : -cmp;\n    });\n    return filtered;\n  }, [search, sortKey, sortDir]);\n\n  const toggleSort = (key: keyof User) => {\n    if (sortKey === key) setSortDir(d => d === 'asc' ? 'desc' : 'asc');\n    else { setSortKey(key); setSortDir('asc'); }\n  };\n\n  return (\n    <div className=\"p-6 space-y-4\">\n      <h2 className=\"text-2xl font-bold\">Users</h2>\n      <Input placeholder=\"Search by name or email...\" value={search} onChange={e => setSearch(e.target.value)} />\n      <Table>\n        <TableHeader>\n          <TableRow>\n            {(['name', 'email', 'role', 'department', 'joinDate'] as const).map(key => (\n              <TableHead key={key} className=\"cursor-pointer\" onClick={() => toggleSort(key)}>{key} {sortKey === key && (sortDir === 'asc' ? '↑' : '↓')}</TableHead>\n            ))}\n          </TableRow>\n        </TableHeader>\n        <TableBody>\n          {filteredUsers.map(user => (\n            <TableRow key={user.id}>\n              <TableCell>{user.name}</TableCell>\n              <TableCell>{user.email}</TableCell>\n              <TableCell>{user.role}</TableCell>\n              <TableCell>{user.department}</TableCell>\n              <TableCell>{user.joinDate}</TableCell>\n            </TableRow>\n          ))}\n        </TableBody>\n      </Table>\n    </div>\n  );\n}\n","fwc-14":"import {useState} from 'react';\nimport {Dialog, DialogContent} from '@/components/ui/dialog';\nimport {Card} from '@/components/ui/card';\n\ntype MediaItem = {\n  type: 'image' | 'video';\n  src: string;\n  alt: string;\n};\n\nconst mediaItems: MediaItem[] = [\n  {type: 'image', src: 'https://picsum.photos/800/600?random=1', alt: 'Landscape photo'},\n  {type: 'video', src: 'https://www.w3schools.com/html/mov_bbb.mp4', alt: 'Sample video'},\n  {type: 'image', src: 'https://picsum.photos/800/600?random=2', alt: 'City skyline'},\n  {type: 'image', src: 'https://picsum.photos/800/600?random=3', alt: 'Mountain view'},\n  {type: 'video', src: 'https://www.w3schools.com/html/movie.mp4', alt: 'Another video'},\n  {type: 'image', src: 'https://picsum.photos/800/600?random=4', alt: 'Ocean sunset'},\n];\n\nexport default function MediaGallery() {\n  const [selectedIndex, setSelectedIndex] = useState<number | null>(null);\n\n  const selectedItem = selectedIndex !== null ? mediaItems[selectedIndex] : null;\n\n  return (\n    <div className=\"p-6\">\n      <h2 className=\"text-2xl font-bold mb-4\">Media Gallery</h2>\n      <div className=\"grid grid-cols-2 md:grid-cols-3 gap-4\">\n        {mediaItems.map((item, index) => (\n          <Card key={index} className=\"cursor-pointer overflow-hidden\" onClick={() => setSelectedIndex(index)}>\n            {item.type === 'image' ? (\n              <img className=\"w-full aspect-square object-cover\" src={item.src} alt={item.alt} />\n            ) : (\n              <video className=\"w-full aspect-square object-cover\" src={item.src} muted />\n            )}\n          </Card>\n        ))}\n      </div>\n      <Dialog open={selectedIndex !== null} onOpenChange={() => setSelectedIndex(null)}>\n        <DialogContent className=\"max-w-4xl\">\n          {selectedItem && (\n            <>\n              {selectedItem.type === 'image' ? (\n                <img className=\"w-full rounded-lg\" src={selectedItem.src} alt={selectedItem.alt} onDoubleClick={e => {\n                  const img = e.currentTarget;\n                  img.style.transform = img.style.transform === 'scale(2)' ? 'scale(1)' : 'scale(2)';\n                }} />\n              ) : (\n                <video className=\"w-full rounded-lg\" src={selectedItem.src} controls />\n              )}\n              <div className=\"flex justify-between mt-2\">\n                <button className=\"px-3 py-1 border rounded\" onClick={() => setSelectedIndex(Math.max(0, (selectedIndex ?? 0) - 1))} disabled={selectedIndex === 0}>Prev</button>\n                <button className=\"px-3 py-1 border rounded\" onClick={() => setSelectedIndex(Math.min(mediaItems.length - 1, (selectedIndex ?? 0) + 1))} disabled={selectedIndex === mediaItems.length - 1}>Next</button>\n              </div>\n            </>\n          )}\n        </DialogContent>\n      </Dialog>\n    </div>\n  );\n}\n","io-2":"import {useState, useEffect, useRef} from 'react';\nimport {Input} from '@/components/ui/input';\nimport {Card} from '@/components/ui/card';\n\ninterface Suggestion {\n  id: number;\n  name: string;\n  category: string;\n}\n\nconst allSuggestions: Suggestion[] = [\n  {id: 1, name: 'React', category: 'Framework'},\n  {id: 2, name: 'TypeScript', category: 'Language'},\n  {id: 3, name: 'Next.js', category: 'Framework'},\n  {id: 4, name: 'Tailwind CSS', category: 'Styling'},\n  {id: 5, name: 'Vite', category: 'Build Tool'},\n  {id: 6, name: 'ESLint', category: 'Linting'},\n  {id: 7, name: 'Prettier', category: 'Formatting'},\n  {id: 8, name: 'Jest', category: 'Testing'},\n  {id: 9, name: 'Playwright', category: 'Testing'},\n  {id: 10, name: 'GraphQL', category: 'API'},\n];\n\nexport default function AutocompleteInput() {\n  const [query, setQuery] = useState('');\n  const [results, setResults] = useState<Suggestion[]>([]);\n  const [selected, setSelected] = useState<Suggestion | null>(null);\n  const [isOpen, setIsOpen] = useState(false);\n  const timeoutRef = useRef<NodeJS.Timeout>();\n\n  useEffect(() => {\n    if (!query) { setResults([]); return; }\n    clearTimeout(timeoutRef.current);\n    timeoutRef.current = setTimeout(() => {\n      const filtered = allSuggestions.filter(s => s.name.toLowerCase().includes(query.toLowerCase()));\n      setResults(filtered);\n      setIsOpen(true);\n    }, 200);\n    return () => clearTimeout(timeoutRef.current);\n  }, [query]);\n\n  return (\n    <div className=\"p-6 space-y-4\">\n      <h2 className=\"text-2xl font-bold\">Technology Search</h2>\n      <p className=\"text-gray-600\">Start typing to search</p>\n      <div className=\"relative\">\n        <Input placeholder=\"Type to search...\" value={query} onChange={e => { setQuery(e.target.value); setSelected(null); }} onFocus={() => query && setIsOpen(true)} />\n        {isOpen && results.length > 0 && (\n          <Card className=\"absolute top-full left-0 right-0 mt-1 z-10 max-h-60 overflow-auto\">\n            {results.map(item => (\n              <div key={item.id} className=\"px-3 py-2 hover:bg-gray-100 cursor-pointer\" onClick={() => { setSelected(item); setQuery(item.name); setIsOpen(false); }}>\n                <span className=\"font-medium\">{item.name}</span>\n                <span className=\"text-sm text-gray-500 ml-2\">{item.category}</span>\n              </div>\n            ))}\n          </Card>\n        )}\n      </div>\n      {selected && (\n        <Card className=\"p-3\">\n          <p className=\"font-medium\">Selected: {selected.name}</p>\n          <p className=\"text-sm text-gray-500\">Category: {selected.category}</p>\n        </Card>\n      )}\n    </div>\n  );\n}\n","ps-1":"import {useState} from 'react';\nimport {Button} from '@/components/ui/button';\nimport {Input} from '@/components/ui/input';\nimport {Checkbox} from '@/components/ui/checkbox';\nimport {Label} from '@/components/ui/label';\n\nconst navItems = ['General', 'Notifications', 'Security', 'Appearance', 'Integrations'];\n\nexport default function SettingsDashboard() {\n  const [activeSection, setActiveSection] = useState('General');\n  const [username, setUsername] = useState('johndoe');\n  const [email, setEmail] = useState('john@example.com');\n  const [emailNotifs, setEmailNotifs] = useState(true);\n  const [pushNotifs, setPushNotifs] = useState(false);\n\n  const renderContent = () => {\n    switch (activeSection) {\n      case 'General':\n        return (\n          <div className=\"space-y-4\">\n            <h3 className=\"text-xl font-semibold\">General Settings</h3>\n            <div><Label>Username</Label><Input value={username} onChange={e => setUsername(e.target.value)} /></div>\n            <div><Label>Email</Label><Input type=\"email\" value={email} onChange={e => setEmail(e.target.value)} /></div>\n            <Button>Save Changes</Button>\n          </div>\n        );\n      case 'Notifications':\n        return (\n          <div className=\"space-y-4\">\n            <h3 className=\"text-xl font-semibold\">Notifications</h3>\n            <div className=\"flex items-center gap-2\"><Checkbox id=\"email\" checked={emailNotifs} onCheckedChange={v => setEmailNotifs(!!v)} /><Label htmlFor=\"email\">Email notifications</Label></div>\n            <div className=\"flex items-center gap-2\"><Checkbox id=\"push\" checked={pushNotifs} onCheckedChange={v => setPushNotifs(!!v)} /><Label htmlFor=\"push\">Push notifications</Label></div>\n            <Button>Save Preferences</Button>\n          </div>\n        );\n      default:\n        return <div><h3 className=\"text-xl font-semibold\">{activeSection}</h3><p className=\"text-gray-600 mt-2\">Settings for {activeSection}.</p></div>;\n    }\n  };\n\n  return (\n    <div className=\"h-screen flex flex-col\">\n      <header className=\"border-b px-6 py-4\"><h1 className=\"text-2xl font-bold\">Settings</h1></header>\n      <div className=\"flex flex-1\">\n        <aside className=\"w-56 border-r p-4 space-y-1\">\n          {navItems.map(item => (\n            <Button key={item} variant={activeSection === item ? 'secondary' : 'ghost'} className=\"w-full justify-start\" onClick={() => setActiveSection(item)}>{item}</Button>\n          ))}\n        </aside>\n        <main className=\"flex-1 p-6\">{renderContent()}</main>\n      </div>\n    </div>\n  );\n}\n","rc-1":"import {useState} from 'react';\nimport {Button} from '@/components/ui/button';\n\nconst navLinks = ['Home', 'Products', 'About', 'Contact', 'Blog'];\n\nexport default function ResponsiveNav() {\n  const [isMobileOpen, setIsMobileOpen] = useState(false);\n\n  return (\n    <>\n      <nav className=\"border-b px-4 py-3\">\n        <div className=\"flex justify-between items-center\">\n          <span className=\"font-bold text-xl\">MyApp</span>\n          <div className=\"hidden md:flex gap-2\">\n            {navLinks.map(link => (<Button key={link} variant=\"ghost\" size=\"sm\">{link}</Button>))}\n          </div>\n          <Button variant=\"ghost\" className=\"md:hidden\" onClick={() => setIsMobileOpen(true)} aria-label=\"Open menu\">&#9776;</Button>\n        </div>\n      </nav>\n      {isMobileOpen && (\n        <div className=\"fixed inset-0 bg-white z-50 p-6\">\n          <div className=\"flex justify-between items-center mb-6\">\n            <span className=\"font-bold text-xl\">MyApp</span>\n            <Button variant=\"ghost\" onClick={() => setIsMobileOpen(false)} aria-label=\"Close menu\">&times;</Button>\n          </div>\n          <div className=\"flex flex-col gap-2\">\n            {navLinks.map(link => (<Button key={link} variant=\"ghost\" onClick={() => setIsMobileOpen(false)}>{link}</Button>))}\n          </div>\n        </div>\n      )}\n    </>\n  );\n}\n","sd-4":"import {useState, useRef, useEffect} from 'react';\nimport {Button} from '@/components/ui/button';\nimport {Checkbox} from '@/components/ui/checkbox';\nimport {Label} from '@/components/ui/label';\n\nconst TERMS_TEXT = `Terms and Conditions\\n\\n1. Acceptance of Terms...\\n2. Use License...\\n3. Disclaimer...\\n4. Limitations...\\n5. Accuracy...\\n6. Links...\\n7. Modifications...\\n8. Governing Law...\\n\\nPlease read through these terms carefully before accepting.\\nBy accepting, you agree to all terms described above.\\nThis agreement is binding.\\nThank you for your understanding.`;\n\nexport default function TermsAcceptanceForm() {\n  const [hasScrolledToBottom, setHasScrolledToBottom] = useState(false);\n  const [isAccepted, setIsAccepted] = useState(false);\n  const [isSubmitted, setIsSubmitted] = useState(false);\n  const scrollRef = useRef<HTMLDivElement>(null);\n\n  useEffect(() => {\n    const el = scrollRef.current;\n    if (!el) return;\n    const handleScroll = () => {\n      if (el.scrollHeight - el.scrollTop <= el.clientHeight + 20) setHasScrolledToBottom(true);\n    };\n    el.addEventListener('scroll', handleScroll);\n    return () => el.removeEventListener('scroll', handleScroll);\n  }, []);\n\n  if (isSubmitted) {\n    return <div className=\"p-6\"><h2 className=\"text-2xl font-bold\">Terms Accepted</h2><p className=\"mt-2\">Thank you.</p></div>;\n  }\n\n  return (\n    <div className=\"p-6 space-y-4\">\n      <h2 className=\"text-2xl font-bold\">Terms and Conditions</h2>\n      <p className=\"text-gray-600\">Scroll through the document before accepting.</p>\n      <div ref={scrollRef} className=\"max-h-72 overflow-auto border rounded-lg p-4 whitespace-pre-wrap\">{TERMS_TEXT}</div>\n      {!hasScrolledToBottom && <p className=\"text-sm text-gray-500\">Scroll to bottom to enable acceptance</p>}\n      <div className=\"flex items-center gap-2\">\n        <Checkbox id=\"terms\" checked={isAccepted} onCheckedChange={v => setIsAccepted(!!v)} disabled={!hasScrolledToBottom} />\n        <Label htmlFor=\"terms\">I have read and agree to the Terms and Conditions</Label>\n      </div>\n      <Button disabled={!isAccepted} onClick={() => setIsSubmitted(true)}>Accept and Continue</Button>\n    </div>\n  );\n}\n","tc-4":"import {useState} from 'react';\nimport {Card} from '@/components/ui/card';\nimport {Button} from '@/components/ui/button';\n\nconst themes = [\n  {name: 'Default', accent: '#2563eb', description: 'Clean blue accent with neutral tones'},\n  {name: 'Midnight', accent: '#7c3aed', description: 'Dark purple for a nighttime feel'},\n  {name: 'Sunrise', accent: '#ea580c', description: 'Warm orange for an energetic look'},\n];\n\nexport default function ThemeSwitcher() {\n  const [activeTheme, setActiveTheme] = useState(themes[0]);\n\n  return (\n    <div className=\"p-6 space-y-4\" style={{'--accent': activeTheme.accent} as React.CSSProperties}>\n      <h2 className=\"text-2xl font-bold\">Theme Switcher</h2>\n      <p className=\"text-gray-600\">Pick a theme to preview.</p>\n      <div className=\"flex flex-wrap gap-3\">\n        {themes.map(t => (\n          <Card key={t.name} className=\"p-4 space-y-2\">\n            <p className=\"font-medium\">{t.name}</p>\n            <p className=\"text-sm text-gray-500\">{t.description}</p>\n            <Button\n              variant={activeTheme.name === t.name ? 'default' : 'outline'}\n              onClick={() => setActiveTheme(t)}\n              disabled={activeTheme.name === t.name}>\n              {activeTheme.name === t.name ? 'Active' : 'Apply'}\n            </Button>\n          </Card>\n        ))}\n      </div>\n      <Card className=\"p-4 space-y-3\" style={{borderColor: activeTheme.accent}}>\n        <h3 className=\"text-xl font-semibold\">Preview</h3>\n        <p>This card demonstrates the current theme.</p>\n        <div className=\"flex gap-2\">\n          <Button style={{backgroundColor: activeTheme.accent, color: 'white'}}>Primary Action</Button>\n          <Button variant=\"outline\">Secondary</Button>\n          <Button variant=\"ghost\">Ghost</Button>\n        </div>\n      </Card>\n    </div>\n  );\n}\n","ty-10":"export default function ArticlePage() {\n  return (\n    <article className=\"max-w-3xl mx-auto py-8 px-6 space-y-6\">\n      <h1 className=\"text-5xl font-bold leading-tight\">The Future of Design Systems in Modern Web Development</h1>\n      <p className=\"text-xl text-gray-600\">How component libraries are reshaping the way teams build consistent, accessible UIs at scale.</p>\n      <div className=\"flex items-center gap-3\">\n        <div className=\"w-10 h-10 rounded-full bg-gray-300 flex items-center justify-center font-medium\">SC</div>\n        <div>\n          <p className=\"font-medium\">Sarah Chen</p>\n          <p className=\"text-sm text-gray-500\">Published Jan 15, 2024 · 8 min read</p>\n        </div>\n      </div>\n      <hr />\n      <img className=\"w-full h-96 object-cover rounded-xl\" src=\"https://picsum.photos/1200/600?random=10\" alt=\"Design system components\" />\n      <p>Design systems have become the foundation of modern web development. They provide a shared language between designers and developers.</p>\n      <p>At their core, design systems are collections of reusable components guided by clear standards.</p>\n      <h2 className=\"text-3xl font-bold mt-8\">The Evolution of Component Architecture</h2>\n      <p>The shift from monolithic CSS to modular component systems reflects a broader trend toward composability.</p>\n      <blockquote className=\"border-l-4 border-gray-800 pl-6 my-8 italic text-lg\">A good design system is invisible. It disappears into the product.</blockquote>\n      <p>Component-driven development encourages teams to think in building blocks.</p>\n      <h2 className=\"text-3xl font-bold mt-8\">Accessibility as a Foundation</h2>\n      <p>When accessibility is built into the design system, every product inherits those guarantees.</p>\n      <h2 className=\"text-3xl font-bold mt-8\">Looking Ahead</h2>\n      <p>The next wave of design systems will incorporate AI-assisted development and dynamic theming.</p>\n    </article>\n  );\n}\n","wd-4":"import {useState, useMemo} from 'react';\nimport {Input} from '@/components/ui/input';\nimport {Button} from '@/components/ui/button';\nimport {Table, TableBody, TableCell, TableHead, TableHeader, TableRow} from '@/components/ui/table';\n\ninterface Todo {\n  id: number;\n  title: string;\n  status: 'pending' | 'in-progress' | 'done';\n  priority: 'low' | 'medium' | 'high';\n  createdAt: string;\n}\n\nconst initialTodos: Todo[] = [\n  {id: 1, title: 'Set up project', status: 'done', priority: 'high', createdAt: '2024-01-10'},\n  {id: 2, title: 'Design database schema', status: 'in-progress', priority: 'high', createdAt: '2024-01-11'},\n  {id: 3, title: 'Build API endpoints', status: 'pending', priority: 'medium', createdAt: '2024-01-12'},\n  {id: 4, title: 'Write unit tests', status: 'pending', priority: 'medium', createdAt: '2024-01-13'},\n  {id: 5, title: 'Deploy to staging', status: 'pending', priority: 'low', createdAt: '2024-01-14'},\n  {id: 6, title: 'Documentation', status: 'pending', priority: 'low', createdAt: '2024-01-17'},\n  {id: 7, title: 'Code review', status: 'in-progress', priority: 'high', createdAt: '2024-01-18'},\n  {id: 8, title: 'Release planning', status: 'pending', priority: 'medium', createdAt: '2024-01-19'},\n];\n\nexport default function TodoTracker() {\n  const [search, setSearch] = useState('');\n  const [todos, setTodos] = useState(initialTodos);\n  const [newTitle, setNewTitle] = useState('');\n  const [sortKey, setSortKey] = useState<keyof Todo>('createdAt');\n  const [sortDir, setSortDir] = useState<'asc' | 'desc'>('desc');\n  const [page, setPage] = useState(0);\n  const pageSize = 5;\n\n  const filteredTodos = useMemo(() => {\n    const filtered = todos.filter(t => t.title.toLowerCase().includes(search.toLowerCase()));\n    filtered.sort((a, b) => {\n      const aVal = String(a[sortKey]);\n      const bVal = String(b[sortKey]);\n      return sortDir === 'asc' ? aVal.localeCompare(bVal) : bVal.localeCompare(aVal);\n    });\n    return filtered;\n  }, [todos, search, sortKey, sortDir]);\n\n  const pagedTodos = filteredTodos.slice(page * pageSize, (page + 1) * pageSize);\n  const totalPages = Math.ceil(filteredTodos.length / pageSize);\n\n  const addTodo = () => {\n    if (!newTitle.trim()) return;\n    setTodos(prev => [...prev, {id: Date.now(), title: newTitle.trim(), status: 'pending', priority: 'medium', createdAt: new Date().toISOString().split('T')[0]}]);\n    setNewTitle('');\n  };\n\n  const toggleSort = (key: keyof Todo) => {\n    if (sortKey === key) setSortDir(d => d === 'asc' ? 'desc' : 'asc');\n    else { setSortKey(key); setSortDir('asc'); }\n  };\n\n  return (\n    <div className=\"p-6 space-y-4\">\n      <h1 className=\"text-3xl font-bold\">TodoTracker</h1>\n      <div className=\"flex gap-2\">\n        <Input placeholder=\"Search...\" value={search} onChange={e => setSearch(e.target.value)} />\n        <Input placeholder=\"New todo...\" value={newTitle} onChange={e => setNewTitle(e.target.value)} />\n        <Button onClick={addTodo}>Add</Button>\n      </div>\n      <Table>\n        <TableHeader>\n          <TableRow>\n            {(['title', 'status', 'priority', 'createdAt'] as const).map(key => (\n              <TableHead key={key} className=\"cursor-pointer\" onClick={() => toggleSort(key)}>\n                {key} {sortKey === key && (sortDir === 'asc' ? '↑' : '↓')}\n              </TableHead>\n            ))}\n          </TableRow>\n        </TableHeader>\n        <TableBody>\n          {pagedTodos.map(todo => (\n            <TableRow key={todo.id}>\n              <TableCell>{todo.title}</TableCell>\n              <TableCell>{todo.status}</TableCell>\n              <TableCell>{todo.priority}</TableCell>\n              <TableCell>{todo.createdAt}</TableCell>\n            </TableRow>\n          ))}\n        </TableBody>\n      </Table>\n      <div className=\"flex gap-2\">\n        <Button variant=\"outline\" disabled={page === 0} onClick={() => setPage(p => p - 1)}>Prev</Button>\n        <span className=\"py-2 px-3\">{page + 1} / {totalPages}</span>\n        <Button variant=\"outline\" disabled={page >= totalPages - 1} onClick={() => setPage(p => p + 1)}>Next</Button>\n      </div>\n    </div>\n  );\n}\n"},"htmlSourceCode":{"cwm-3":"import {useState} from 'react';\n\nconst icons = ['📄', '🎯', '📊', '🚀', '💡', '📝', '🎨', '🔧', '📦', '🌟', '🏠', '📋'];\nconst covers = ['https://picsum.photos/1200/400?random=1', 'https://picsum.photos/1200/400?random=2'];\n\nexport default function NotionPageHeader() {\n  const [icon, setIcon] = useState('📄');\n  const [showPicker, setShowPicker] = useState(false);\n  const [cover, setCover] = useState<string | null>(null);\n  const [title, setTitle] = useState('Untitled');\n  const [editing, setEditing] = useState(false);\n\n  return (\n    <div>\n      {cover ? <img src={cover} alt=\"Cover\" onClick={() => setCover(covers[Math.floor(Math.random() * covers.length)])} style={{width: '100%', height: 280, objectFit: 'cover', cursor: 'pointer'}} /> : <div onClick={() => setCover(covers[0])} style={{width: '100%', height: 280, background: '#f0f0f0', display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer'}}>Click to add cover</div>}\n      <div style={{padding: 24}}>\n        <div style={{display: 'flex', alignItems: 'center', gap: 12}}>\n          <span onClick={() => setShowPicker(!showPicker)} style={{fontSize: 48, cursor: 'pointer'}} role=\"button\">{icon}</span>\n          {editing ? <input value={title} onChange={e => setTitle(e.target.value)} onBlur={() => setEditing(false)} autoFocus style={{fontSize: 32, fontWeight: 700, border: 'none', outline: 'none', width: '100%'}} /> : <h1 onClick={() => setEditing(true)} style={{fontSize: 32, fontWeight: 700, cursor: 'text'}}>{title}</h1>}\n        </div>\n        {showPicker && (\n          <div style={{marginTop: 8, padding: 12, border: '1px solid #e0e0e0', borderRadius: 8, display: 'grid', gridTemplateColumns: 'repeat(6, 1fr)', gap: 8}}>\n            {icons.map(i => <button key={i} onClick={() => { setIcon(i); setShowPicker(false); }} style={{fontSize: 24, padding: 8, border: 'none', background: 'none', cursor: 'pointer', borderRadius: 4}}>{i}</button>)}\n          </div>\n        )}\n        <div style={{display: 'flex', gap: 8, marginTop: 12}}>\n          <button onClick={() => setCover(covers[0])} style={{padding: '6px 12px', background: 'none', border: '1px solid #ccc', borderRadius: 4, cursor: 'pointer'}}>Add cover</button>\n          <button onClick={() => setShowPicker(true)} style={{padding: '6px 12px', background: 'none', border: '1px solid #ccc', borderRadius: 4, cursor: 'pointer'}}>Change icon</button>\n        </div>\n      </div>\n    </div>\n  );\n}\n","dd-1":"import {useState, useMemo} from 'react';\n\ninterface User {id: number; name: string; email: string; role: string; department: string; joinDate: string}\n\nconst users: User[] = [\n  {id: 1, name: 'Alice Johnson', email: 'alice@example.com', role: 'Engineer', department: 'Engineering', joinDate: '2022-03-15'},\n  {id: 2, name: 'Bob Smith', email: 'bob@example.com', role: 'Designer', department: 'Design', joinDate: '2021-07-20'},\n  {id: 3, name: 'Carol Williams', email: 'carol@example.com', role: 'Manager', department: 'Engineering', joinDate: '2020-01-10'},\n  {id: 4, name: 'David Brown', email: 'david@example.com', role: 'Engineer', department: 'Engineering', joinDate: '2023-02-28'},\n  {id: 5, name: 'Eva Martinez', email: 'eva@example.com', role: 'Designer', department: 'Design', joinDate: '2022-11-05'},\n  {id: 6, name: 'Frank Lee', email: 'frank@example.com', role: 'PM', department: 'Product', joinDate: '2021-09-14'},\n  {id: 7, name: 'Grace Kim', email: 'grace@example.com', role: 'Engineer', department: 'Engineering', joinDate: '2023-06-01'},\n  {id: 8, name: 'Henry Chen', email: 'henry@example.com', role: 'Manager', department: 'Product', joinDate: '2019-04-22'},\n];\n\nexport default function UserTable() {\n  const [search, setSearch] = useState('');\n  const [sortKey, setSortKey] = useState<keyof User>('name');\n  const [sortDir, setSortDir] = useState<'asc' | 'desc'>('asc');\n\n  const filtered = useMemo(() => {\n    const f = users.filter(u => u.name.toLowerCase().includes(search.toLowerCase()) || u.email.toLowerCase().includes(search.toLowerCase()));\n    f.sort((a, b) => sortDir === 'asc' ? String(a[sortKey]).localeCompare(String(b[sortKey])) : String(b[sortKey]).localeCompare(String(a[sortKey])));\n    return f;\n  }, [search, sortKey, sortDir]);\n\n  return (\n    <div style={{padding: 24}}>\n      <h2 style={{fontSize: 24, fontWeight: 700, marginBottom: 12}}>Users</h2>\n      <input placeholder=\"Search...\" value={search} onChange={e => setSearch(e.target.value)} style={{width: '100%', padding: '8px 12px', border: '1px solid #ccc', borderRadius: 4, marginBottom: 12}} />\n      <table style={{width: '100%', borderCollapse: 'collapse'}}>\n        <thead><tr>{(['name', 'email', 'role', 'department', 'joinDate'] as const).map(k => <th key={k} onClick={() => { if (sortKey === k) setSortDir(d => d === 'asc' ? 'desc' : 'asc'); else { setSortKey(k); setSortDir('asc'); }}} style={{padding: 8, borderBottom: '2px solid #e0e0e0', textAlign: 'left', cursor: 'pointer'}}>{k} {sortKey === k && (sortDir === 'asc' ? '↑' : '↓')}</th>)}</tr></thead>\n        <tbody>{filtered.map(u => <tr key={u.id}><td style={{padding: 8, borderBottom: '1px solid #f0f0f0'}}>{u.name}</td><td style={{padding: 8, borderBottom: '1px solid #f0f0f0'}}>{u.email}</td><td style={{padding: 8, borderBottom: '1px solid #f0f0f0'}}>{u.role}</td><td style={{padding: 8, borderBottom: '1px solid #f0f0f0'}}>{u.department}</td><td style={{padding: 8, borderBottom: '1px solid #f0f0f0'}}>{u.joinDate}</td></tr>)}</tbody>\n      </table>\n    </div>\n  );\n}\n","fwc-14":"import {useState} from 'react';\n\ntype MediaItem = {type: 'image' | 'video'; src: string; alt: string};\n\nconst mediaItems: MediaItem[] = [\n  {type: 'image', src: 'https://picsum.photos/800/600?random=1', alt: 'Landscape'},\n  {type: 'video', src: 'https://www.w3schools.com/html/mov_bbb.mp4', alt: 'Video'},\n  {type: 'image', src: 'https://picsum.photos/800/600?random=2', alt: 'City'},\n  {type: 'image', src: 'https://picsum.photos/800/600?random=3', alt: 'Mountain'},\n  {type: 'video', src: 'https://www.w3schools.com/html/movie.mp4', alt: 'Video 2'},\n  {type: 'image', src: 'https://picsum.photos/800/600?random=4', alt: 'Ocean'},\n];\n\nexport default function MediaGallery() {\n  const [selectedIndex, setSelectedIndex] = useState<number | null>(null);\n  const [zoom, setZoom] = useState(false);\n  const selected = selectedIndex !== null ? mediaItems[selectedIndex] : null;\n\n  return (\n    <div style={{padding: 24}}>\n      <h2 style={{fontSize: 24, fontWeight: 700, marginBottom: 16}}>Media Gallery</h2>\n      <div style={{display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 12}}>\n        {mediaItems.map((item, i) => (\n          <div key={i} onClick={() => { setSelectedIndex(i); setZoom(false); }} style={{cursor: 'pointer', borderRadius: 8, overflow: 'hidden', aspectRatio: '1', border: '1px solid #e0e0e0'}}>\n            {item.type === 'image' ? <img src={item.src} alt={item.alt} style={{width: '100%', height: '100%', objectFit: 'cover'}} /> : <video src={item.src} muted style={{width: '100%', height: '100%', objectFit: 'cover'}} />}\n          </div>\n        ))}\n      </div>\n      {selected && (\n        <div style={{position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.9)', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', zIndex: 1000}}>\n          <button onClick={() => setSelectedIndex(null)} style={{position: 'absolute', top: 16, right: 16, background: 'none', border: 'none', color: 'white', fontSize: 32, cursor: 'pointer'}}>&times;</button>\n          {selected.type === 'image' ? (\n            <img src={selected.src} alt={selected.alt} onDoubleClick={() => setZoom(!zoom)} style={{maxWidth: zoom ? '100%' : '80%', maxHeight: '80vh', transition: 'transform 0.3s', transform: zoom ? 'scale(2)' : 'scale(1)', cursor: 'zoom-in'}} />\n          ) : (\n            <video src={selected.src} controls style={{maxWidth: '80%', maxHeight: '80vh'}} />\n          )}\n          <div style={{marginTop: 16, display: 'flex', gap: 16}}>\n            <button onClick={() => setSelectedIndex(Math.max(0, (selectedIndex ?? 0) - 1))} disabled={selectedIndex === 0} style={{padding: '8px 16px', background: 'white', border: 'none', borderRadius: 4, cursor: 'pointer'}}>Prev</button>\n            <button onClick={() => setSelectedIndex(Math.min(mediaItems.length - 1, (selectedIndex ?? 0) + 1))} disabled={selectedIndex === mediaItems.length - 1} style={{padding: '8px 16px', background: 'white', border: 'none', borderRadius: 4, cursor: 'pointer'}}>Next</button>\n          </div>\n        </div>\n      )}\n    </div>\n  );\n}\n","io-2":"import {useState, useEffect, useRef} from 'react';\n\ninterface Suggestion {id: number; name: string; category: string}\n\nconst all: Suggestion[] = [\n  {id: 1, name: 'React', category: 'Framework'}, {id: 2, name: 'TypeScript', category: 'Language'},\n  {id: 3, name: 'Next.js', category: 'Framework'}, {id: 4, name: 'Tailwind', category: 'Styling'},\n  {id: 5, name: 'Vite', category: 'Build Tool'}, {id: 6, name: 'ESLint', category: 'Linting'},\n  {id: 7, name: 'Prettier', category: 'Formatting'}, {id: 8, name: 'Jest', category: 'Testing'},\n  {id: 9, name: 'Playwright', category: 'Testing'}, {id: 10, name: 'GraphQL', category: 'API'},\n];\n\nexport default function AutocompleteInput() {\n  const [query, setQuery] = useState('');\n  const [results, setResults] = useState<Suggestion[]>([]);\n  const [selected, setSelected] = useState<Suggestion | null>(null);\n  const [open, setOpen] = useState(false);\n  const timer = useRef<NodeJS.Timeout>();\n\n  useEffect(() => {\n    if (!query) { setResults([]); setOpen(false); return; }\n    clearTimeout(timer.current);\n    timer.current = setTimeout(() => { setResults(all.filter(s => s.name.toLowerCase().includes(query.toLowerCase()))); setOpen(true); }, 200);\n    return () => clearTimeout(timer.current);\n  }, [query]);\n\n  return (\n    <div style={{padding: 24}}>\n      <h2 style={{fontSize: 24, fontWeight: 700, marginBottom: 8}}>Technology Search</h2>\n      <p style={{color: '#666', marginBottom: 12}}>Start typing to search</p>\n      <div style={{position: 'relative'}}>\n        <input placeholder=\"Type to search...\" value={query} onChange={e => { setQuery(e.target.value); setSelected(null); }} onFocus={() => query && setOpen(true)} style={{width: '100%', padding: '8px 12px', border: '1px solid #ccc', borderRadius: 4}} />\n        {open && results.length > 0 && (\n          <div style={{position: 'absolute', top: '100%', left: 0, right: 0, marginTop: 4, border: '1px solid #e0e0e0', borderRadius: 4, background: 'white', maxHeight: 240, overflow: 'auto', zIndex: 10}}>\n            {results.map(r => <div key={r.id} onClick={() => { setSelected(r); setQuery(r.name); setOpen(false); }} style={{padding: '8px 12px', cursor: 'pointer', borderBottom: '1px solid #f0f0f0'}}><span style={{fontWeight: 500}}>{r.name}</span><span style={{marginLeft: 8, fontSize: 12, color: '#999'}}>{r.category}</span></div>)}\n          </div>\n        )}\n      </div>\n      {selected && <div style={{marginTop: 12, padding: 12, border: '1px solid #e0e0e0', borderRadius: 4}}><p style={{fontWeight: 500}}>Selected: {selected.name}</p><p style={{fontSize: 12, color: '#666'}}>Category: {selected.category}</p></div>}\n    </div>\n  );\n}\n","ps-1":"import {useState} from 'react';\n\nconst navItems = ['General', 'Notifications', 'Security', 'Appearance', 'Integrations'];\n\nexport default function SettingsDashboard() {\n  const [active, setActive] = useState('General');\n  const [username, setUsername] = useState('johndoe');\n  const [email, setEmail] = useState('john@example.com');\n  const [emailNotifs, setEmailNotifs] = useState(true);\n  const [pushNotifs, setPushNotifs] = useState(false);\n\n  const content = () => {\n    switch (active) {\n      case 'General': return (<div><h3 style={{fontSize: 20, fontWeight: 600, marginBottom: 12}}>General Settings</h3><label style={{display: 'block', marginBottom: 12}}>Username<input value={username} onChange={e => setUsername(e.target.value)} style={{display: 'block', width: '100%', padding: '8px 12px', border: '1px solid #ccc', borderRadius: 4, marginTop: 4}} /></label><label style={{display: 'block', marginBottom: 12}}>Email<input type=\"email\" value={email} onChange={e => setEmail(e.target.value)} style={{display: 'block', width: '100%', padding: '8px 12px', border: '1px solid #ccc', borderRadius: 4, marginTop: 4}} /></label><button style={{padding: '8px 16px', background: '#2563eb', color: 'white', border: 'none', borderRadius: 4, cursor: 'pointer'}}>Save</button></div>);\n      case 'Notifications': return (<div><h3 style={{fontSize: 20, fontWeight: 600, marginBottom: 12}}>Notifications</h3><label style={{display: 'flex', alignItems: 'center', gap: 8, marginBottom: 8}}><input type=\"checkbox\" checked={emailNotifs} onChange={e => setEmailNotifs(e.target.checked)} />Email notifications</label><label style={{display: 'flex', alignItems: 'center', gap: 8}}><input type=\"checkbox\" checked={pushNotifs} onChange={e => setPushNotifs(e.target.checked)} />Push notifications</label><button style={{marginTop: 12, padding: '8px 16px', background: '#2563eb', color: 'white', border: 'none', borderRadius: 4, cursor: 'pointer'}}>Save</button></div>);\n      default: return <div><h3 style={{fontSize: 20, fontWeight: 600}}>{active}</h3><p style={{color: '#666'}}>Settings for {active}.</p></div>;\n    }\n  };\n\n  return (\n    <div style={{height: '100vh', display: 'flex', flexDirection: 'column'}}>\n      <header style={{borderBottom: '1px solid #e0e0e0', padding: '16px 24px'}}><h1 style={{fontSize: 24, fontWeight: 700}}>Settings</h1></header>\n      <div style={{display: 'flex', flex: 1}}>\n        <aside style={{width: 220, borderRight: '1px solid #e0e0e0', padding: 16}}>{navItems.map(item => <button key={item} onClick={() => setActive(item)} style={{display: 'block', width: '100%', textAlign: 'left', padding: '8px 12px', border: 'none', borderRadius: 4, background: active === item ? '#f0f0f0' : 'none', cursor: 'pointer', marginBottom: 4}}>{item}</button>)}</aside>\n        <main style={{flex: 1, padding: 24}}>{content()}</main>\n      </div>\n    </div>\n  );\n}\n","rc-1":"import {useState} from 'react';\n\nconst navLinks = ['Home', 'Products', 'About', 'Contact', 'Blog'];\n\nexport default function ResponsiveNav() {\n  const [isOpen, setIsOpen] = useState(false);\n\n  return (\n    <>\n      <nav style={{borderBottom: '1px solid #e0e0e0', padding: '12px 16px', display: 'flex', justifyContent: 'space-between', alignItems: 'center'}}>\n        <span style={{fontWeight: 700, fontSize: 20}}>MyApp</span>\n        <div style={{display: 'flex', gap: 8}} className=\"desktop-only\">\n          {navLinks.map(l => <button key={l} style={{padding: '6px 12px', background: 'none', border: 'none', cursor: 'pointer'}}>{l}</button>)}\n        </div>\n        <button onClick={() => setIsOpen(true)} style={{display: 'none', background: 'none', border: 'none', fontSize: 24, cursor: 'pointer'}} className=\"mobile-only\" aria-label=\"Menu\">&#9776;</button>\n      </nav>\n      {isOpen && (\n        <div style={{position: 'fixed', inset: 0, background: 'white', zIndex: 1000, padding: 24, display: 'flex', flexDirection: 'column', gap: 12}}>\n          <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center'}}>\n            <span style={{fontWeight: 700, fontSize: 20}}>MyApp</span>\n            <button onClick={() => setIsOpen(false)} style={{background: 'none', border: 'none', fontSize: 24, cursor: 'pointer'}} aria-label=\"Close\">&times;</button>\n          </div>\n          {navLinks.map(l => <button key={l} onClick={() => setIsOpen(false)} style={{padding: '12px 16px', background: 'none', border: 'none', textAlign: 'left', fontSize: 16, cursor: 'pointer'}}>{l}</button>)}\n        </div>\n      )}\n      <style>{`@media (max-width: 768px) { .desktop-only { display: none !important; } .mobile-only { display: block !important; } } @media (min-width: 769px) { .mobile-only { display: none !important; } }`}</style>\n    </>\n  );\n}\n","sd-4":"import {useState, useRef, useEffect} from 'react';\n\nconst TERMS = `Terms and Conditions\\n\\n1. Acceptance...\\n2. Use License...\\n3. Disclaimer...\\n4. Limitations...\\n5. Accuracy...\\n6. Links...\\n7. Modifications...\\n8. Governing Law...\\n\\nPlease read carefully.\\nBy accepting you agree to all terms.\\nThis is a binding agreement.\\nThank you.`;\n\nexport default function TermsAcceptanceForm() {\n  const [scrolled, setScrolled] = useState(false);\n  const [accepted, setAccepted] = useState(false);\n  const [submitted, setSubmitted] = useState(false);\n  const ref = useRef<HTMLDivElement>(null);\n\n  useEffect(() => {\n    const el = ref.current;\n    if (!el) return;\n    const h = () => { if (el.scrollHeight - el.scrollTop <= el.clientHeight + 20) setScrolled(true); };\n    el.addEventListener('scroll', h);\n    return () => el.removeEventListener('scroll', h);\n  }, []);\n\n  if (submitted) return <div style={{padding: 24}}><h2 style={{fontSize: 24, fontWeight: 700}}>Terms Accepted</h2><p>Thank you.</p></div>;\n\n  return (\n    <div style={{padding: 24}}>\n      <h2 style={{fontSize: 24, fontWeight: 700}}>Terms and Conditions</h2>\n      <p style={{color: '#666', marginBottom: 12}}>Scroll through the document before accepting.</p>\n      <div ref={ref} style={{maxHeight: 300, overflow: 'auto', border: '1px solid #e0e0e0', borderRadius: 8, padding: 16, whiteSpace: 'pre-wrap'}}>{TERMS}</div>\n      {!scrolled && <p style={{fontSize: 12, color: '#999'}}>Scroll to bottom to enable</p>}\n      <label style={{display: 'flex', alignItems: 'center', gap: 8, marginTop: 12}}>\n        <input type=\"checkbox\" checked={accepted} onChange={e => setAccepted(e.target.checked)} disabled={!scrolled} />\n        I have read and agree to the Terms\n      </label>\n      <button onClick={() => setSubmitted(true)} disabled={!accepted} style={{marginTop: 12, padding: '10px 20px', background: accepted ? '#2563eb' : '#ccc', color: 'white', border: 'none', borderRadius: 4, cursor: accepted ? 'pointer' : 'not-allowed'}}>Accept and Continue</button>\n    </div>\n  );\n}\n","tc-4":"import {useState} from 'react';\n\nconst themes = [\n  {name: 'Default', accent: '#2563eb', bg: '#ffffff', desc: 'Clean blue'},\n  {name: 'Midnight', accent: '#7c3aed', bg: '#1a1a2e', desc: 'Dark purple'},\n  {name: 'Sunrise', accent: '#ea580c', bg: '#fff7ed', desc: 'Warm orange'},\n];\n\nexport default function ThemeSwitcher() {\n  const [active, setActive] = useState(themes[0]);\n\n  return (\n    <div style={{padding: 24, background: active.bg, minHeight: '100vh', color: active.bg === '#1a1a2e' ? '#fff' : '#000'}}>\n      <h2 style={{fontSize: 24, fontWeight: 700, marginBottom: 8}}>Theme Switcher</h2>\n      <p style={{color: '#888', marginBottom: 16}}>Pick a theme to preview.</p>\n      <div style={{display: 'flex', flexWrap: 'wrap', gap: 12, marginBottom: 24}}>\n        {themes.map(t => (\n          <div key={t.name} style={{border: `1px solid ${t.accent}`, borderRadius: 8, padding: 16, minWidth: 180}}>\n            <p style={{fontWeight: 600}}>{t.name}</p>\n            <p style={{fontSize: 14, color: '#888'}}>{t.desc}</p>\n            <button onClick={() => setActive(t)} disabled={active.name === t.name} style={{marginTop: 8, padding: '6px 12px', background: active.name === t.name ? t.accent : 'transparent', color: active.name === t.name ? 'white' : t.accent, border: `1px solid ${t.accent}`, borderRadius: 4, cursor: active.name === t.name ? 'default' : 'pointer'}}>{active.name === t.name ? 'Active' : 'Apply'}</button>\n          </div>\n        ))}\n      </div>\n      <div style={{border: `1px solid ${active.accent}`, borderRadius: 8, padding: 16}}>\n        <h3 style={{fontSize: 18, fontWeight: 600, marginBottom: 8}}>Preview</h3>\n        <p>This shows the current theme colors.</p>\n        <div style={{display: 'flex', gap: 8, marginTop: 12}}>\n          <button style={{padding: '8px 16px', background: active.accent, color: 'white', border: 'none', borderRadius: 4}}>Primary</button>\n          <button style={{padding: '8px 16px', background: 'transparent', border: `1px solid ${active.accent}`, color: active.accent, borderRadius: 4}}>Secondary</button>\n          <button style={{padding: '8px 16px', background: 'transparent', border: 'none', color: active.accent}}>Ghost</button>\n        </div>\n      </div>\n    </div>\n  );\n}\n","ty-10":"export default function ArticlePage() {\n  return (\n    <article style={{maxWidth: 720, margin: '0 auto', padding: 24}}>\n      <h1 style={{fontSize: 48, fontWeight: 700, lineHeight: 1.1, marginBottom: 16}}>The Future of Design Systems in Modern Web Development</h1>\n      <p style={{fontSize: 20, color: '#666', marginBottom: 16}}>How component libraries are reshaping the way teams build consistent, accessible UIs at scale.</p>\n      <div style={{display: 'flex', alignItems: 'center', gap: 12, marginBottom: 24}}>\n        <div style={{width: 40, height: 40, borderRadius: '50%', background: '#ddd', display: 'flex', alignItems: 'center', justifyContent: 'center', fontWeight: 500}}>SC</div>\n        <div><p style={{fontWeight: 500}}>Sarah Chen</p><p style={{fontSize: 14, color: '#999'}}>Jan 15, 2024 · 8 min read</p></div>\n      </div>\n      <hr style={{border: 'none', borderTop: '1px solid #e0e0e0', marginBottom: 24}} />\n      <img src=\"https://picsum.photos/1200/600?random=10\" alt=\"Design system\" style={{width: '100%', height
