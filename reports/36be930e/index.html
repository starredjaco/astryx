: 400, objectFit: 'cover', borderRadius: 12, marginBottom: 24}} />\n      <p style={{marginBottom: 16, lineHeight: 1.6}}>Design systems have become the foundation of modern web development.</p>\n      <p style={{marginBottom: 16, lineHeight: 1.6}}>At their core, they are collections of reusable components.</p>\n      <h2 style={{fontSize: 28, fontWeight: 700, marginTop: 32, marginBottom: 12}}>The Evolution of Component Architecture</h2>\n      <p style={{marginBottom: 16, lineHeight: 1.6}}>The shift toward modular systems reflects a broader trend.</p>\n      <blockquote style={{borderLeft: '4px solid #333', paddingLeft: 24, margin: '32px 0', fontStyle: 'italic', fontSize: 18}}>A good design system is invisible.</blockquote>\n      <p style={{marginBottom: 16, lineHeight: 1.6}}>Component-driven development encourages thinking in building blocks.</p>\n      <h2 style={{fontSize: 28, fontWeight: 700, marginTop: 32, marginBottom: 12}}>Accessibility as a Foundation</h2>\n      <p style={{marginBottom: 16, lineHeight: 1.6}}>When built into the system, every product inherits guarantees.</p>\n      <h2 style={{fontSize: 28, fontWeight: 700, marginTop: 32, marginBottom: 12}}>Looking Ahead</h2>\n      <p style={{lineHeight: 1.6}}>The next wave will incorporate AI, dynamic theming, and cross-platform consistency.</p>\n    </article>\n  );\n}\n","wd-4":"import {useState, useMemo} from 'react';\n\ninterface Todo {id: number; title: string; status: string; priority: string; createdAt: string}\n\nconst initialTodos: Todo[] = [\n  {id: 1, title: 'Set up project', status: 'done', priority: 'high', createdAt: '2024-01-10'},\n  {id: 2, title: 'Design schema', status: 'in-progress', priority: 'high', createdAt: '2024-01-11'},\n  {id: 3, title: 'Build API', status: 'pending', priority: 'medium', createdAt: '2024-01-12'},\n  {id: 4, title: 'Write tests', status: 'pending', priority: 'medium', createdAt: '2024-01-13'},\n  {id: 5, title: 'Deploy', status: 'pending', priority: 'low', createdAt: '2024-01-14'},\n  {id: 6, title: 'Docs', status: 'pending', priority: 'low', createdAt: '2024-01-17'},\n  {id: 7, title: 'Code review', status: 'in-progress', priority: 'high', createdAt: '2024-01-18'},\n  {id: 8, title: 'Release', status: 'pending', priority: 'medium', createdAt: '2024-01-19'},\n];\n\nexport default function TodoTracker() {\n  const [search, setSearch] = useState('');\n  const [todos, setTodos] = useState(initialTodos);\n  const [newTitle, setNewTitle] = useState('');\n  const [sortKey, setSortKey] = useState<keyof Todo>('createdAt');\n  const [sortDir, setSortDir] = useState<'asc' | 'desc'>('desc');\n  const [page, setPage] = useState(0);\n  const pageSize = 5;\n\n  const filtered = useMemo(() => {\n    const f = todos.filter(t => t.title.toLowerCase().includes(search.toLowerCase()));\n    f.sort((a, b) => sortDir === 'asc' ? String(a[sortKey]).localeCompare(String(b[sortKey])) : String(b[sortKey]).localeCompare(String(a[sortKey])));\n    return f;\n  }, [todos, search, sortKey, sortDir]);\n\n  const paged = filtered.slice(page * pageSize, (page + 1) * pageSize);\n  const totalPages = Math.ceil(filtered.length / pageSize);\n\n  return (\n    <div style={{padding: 24}}>\n      <h1 style={{fontSize: 28, fontWeight: 700, marginBottom: 16}}>TodoTracker</h1>\n      <div style={{display: 'flex', gap: 8, marginBottom: 16}}>\n        <input placeholder=\"Search...\" value={search} onChange={e => setSearch(e.target.value)} style={{padding: '8px 12px', border: '1px solid #ccc', borderRadius: 4, flex: 1}} />\n        <input placeholder=\"New todo...\" value={newTitle} onChange={e => setNewTitle(e.target.value)} style={{padding: '8px 12px', border: '1px solid #ccc', borderRadius: 4, flex: 1}} />\n        <button onClick={() => { if (newTitle.trim()) { setTodos(p => [...p, {id: Date.now(), title: newTitle.trim(), status: 'pending', priority: 'medium', createdAt: new Date().toISOString().split('T')[0]}]); setNewTitle(''); }}} style={{padding: '8px 16px', background: '#2563eb', color: 'white', border: 'none', borderRadius: 4, cursor: 'pointer'}}>Add</button>\n      </div>\n      <table style={{width: '100%', borderCollapse: 'collapse'}}>\n        <thead><tr>\n          {(['title', 'status', 'priority', 'createdAt'] as const).map(k => (\n            <th key={k} onClick={() => { if (sortKey === k) setSortDir(d => d === 'asc' ? 'desc' : 'asc'); else { setSortKey(k); setSortDir('asc'); }}} style={{padding: 8, borderBottom: '2px solid #e0e0e0', textAlign: 'left', cursor: 'pointer'}}>{k} {sortKey === k && (sortDir === 'asc' ? '↑' : '↓')}</th>\n          ))}\n        </tr></thead>\n        <tbody>{paged.map(t => (<tr key={t.id}><td style={{padding: 8, borderBottom: '1px solid #f0f0f0'}}>{t.title}</td><td style={{padding: 8, borderBottom: '1px solid #f0f0f0'}}>{t.status}</td><td style={{padding: 8, borderBottom: '1px solid #f0f0f0'}}>{t.priority}</td><td style={{padding: 8, borderBottom: '1px solid #f0f0f0'}}>{t.createdAt}</td></tr>))}</tbody>\n      </table>\n      <div style={{display: 'flex', gap: 8, marginTop: 12}}>\n        <button disabled={page === 0} onClick={() => setPage(p => p - 1)} style={{padding: '6px 12px', border: '1px solid #ccc', borderRadius: 4, cursor: 'pointer'}}>Prev</button>\n        <span style={{padding: '6px 12px'}}>{page + 1}/{totalPages}</span>\n        <button disabled={page >= totalPages - 1} onClick={() => setPage(p => p + 1)} style={{padding: '6px 12px', border: '1px solid #ccc', borderRadius: 4, cursor: 'pointer'}}>Next</button>\n      </div>\n    </div>\n  );\n}\n"},"astryxTailwindSourceCode":{"cwm-3":"import {useState} from 'react';\nimport {Card} from '@astryxdesign/core/Card';\nimport {Button} from '@astryxdesign/core/Button';\nimport {Heading} from '@astryxdesign/core/Heading';\nimport {Text} from '@astryxdesign/core/Text';\n\nconst icons = ['📄', '🎯', '📊', '🚀', '💡', '📝', '🎨', '🔧', '📦', '🌟', '🏠', '📋'];\nconst covers = [\n  'https://picsum.photos/1200/400?random=1',\n  'https://picsum.photos/1200/400?random=2',\n  'https://picsum.photos/1200/400?random=3',\n];\n\nexport default function NotionPageHeader() {\n  const [selectedIcon, setSelectedIcon] = useState('📄');\n  const [showIconPicker, setShowIconPicker] = useState(false);\n  const [coverImage, setCoverImage] = useState<string | null>(null);\n  const [title, setTitle] = useState('Untitled');\n  const [isEditing, setIsEditing] = useState(false);\n\n  return (\n    <div className=\"space-y-3\">\n      {coverImage ? (\n        <img\n          className=\"w-full h-72 object-cover rounded-lg cursor-pointer\"\n          src={coverImage}\n          alt=\"Page cover\"\n          onClick={() => setCoverImage(covers[Math.floor(Math.random() * covers.length)])}\n        />\n      ) : (\n        <div\n          className=\"w-full h-72 bg-gray-100 rounded-lg flex items-center justify-center cursor-pointer\"\n          onClick={() => setCoverImage(covers[0])}>\n          <Text color=\"secondary\">Click to add cover</Text>\n        </div>\n      )}\n      <div className=\"px-6 space-y-3\">\n        <div className=\"flex items-center gap-3\">\n          <span\n            className=\"text-5xl cursor-pointer\"\n            onClick={() => setShowIconPicker(!showIconPicker)}\n            role=\"button\"\n            tabIndex={0}\n            aria-label=\"Change page icon\">\n            {selectedIcon}\n          </span>\n          {isEditing ? (\n            <input\n              value={title}\n              onChange={e => setTitle(e.target.value)}\n              onBlur={() => setIsEditing(false)}\n              autoFocus\n              className=\"text-3xl font-bold border-none outline-none w-full\"\n            />\n          ) : (\n            <Heading level={1}>\n              <span onClick={() => setIsEditing(true)} role=\"button\" tabIndex={0}>{title}</span>\n            </Heading>\n          )}\n        </div>\n        {showIconPicker && (\n          <Card padding={2}>\n            <div className=\"grid grid-cols-6 gap-2 p-2\">\n              {icons.map(icon => (\n                <button\n                  key={icon}\n                  className=\"text-2xl p-2 rounded-lg border-0 bg-transparent cursor-pointer hover:bg-gray-100\"\n                  onClick={() => { setSelectedIcon(icon); setShowIconPicker(false); }}\n                  aria-label={`Select ${icon} icon`}>\n                  {icon}\n                </button>\n              ))}\n            </div>\n          </Card>\n        )}\n        <div className=\"flex gap-2\">\n          <Button label=\"Add cover\" variant=\"ghost\" size=\"sm\" onClick={() => setCoverImage(covers[0])} />\n          <Button label=\"Change icon\" variant=\"ghost\" size=\"sm\" onClick={() => setShowIconPicker(true)} />\n        </div>\n      </div>\n    </div>\n  );\n}\n","dd-1":"import {useState, useMemo} from 'react';\nimport {Table} from '@astryxdesign/core/Table';\nimport {TextInput} from '@astryxdesign/core/TextInput';\nimport {Heading} from '@astryxdesign/core/Heading';\nimport {useTableSortable} from '@astryxdesign/core/Table';\n\ninterface User extends Record<string, unknown> {\n  id: number;\n  name: string;\n  email: string;\n  role: string;\n  department: string;\n  joinDate: string;\n}\n\nconst users: User[] = [\n  {id: 1, name: 'Alice Johnson', email: 'alice@example.com', role: 'Engineer', department: 'Engineering', joinDate: '2022-03-15'},\n  {id: 2, name: 'Bob Smith', email: 'bob@example.com', role: 'Designer', department: 'Design', joinDate: '2021-07-20'},\n  {id: 3, name: 'Carol Williams', email: 'carol@example.com', role: 'Manager', department: 'Engineering', joinDate: '2020-01-10'},\n  {id: 4, name: 'David Brown', email: 'david@example.com', role: 'Engineer', department: 'Engineering', joinDate: '2023-02-28'},\n  {id: 5, name: 'Eva Martinez', email: 'eva@example.com', role: 'Designer', department: 'Design', joinDate: '2022-11-05'},\n  {id: 6, name: 'Frank Lee', email: 'frank@example.com', role: 'PM', department: 'Product', joinDate: '2021-09-14'},\n  {id: 7, name: 'Grace Kim', email: 'grace@example.com', role: 'Engineer', department: 'Engineering', joinDate: '2023-06-01'},\n  {id: 8, name: 'Henry Chen', email: 'henry@example.com', role: 'Manager', department: 'Product', joinDate: '2019-04-22'},\n];\n\nexport default function UserTable() {\n  const [search, setSearch] = useState('');\n  const sortable = useTableSortable<User>();\n\n  const filteredUsers = useMemo(\n    () => users.filter(u => u.name.toLowerCase().includes(search.toLowerCase()) || u.email.toLowerCase().includes(search.toLowerCase())),\n    [search],\n  );\n\n  return (\n    <div className=\"p-6 space-y-4\">\n      <Heading level={2}>Users</Heading>\n      <TextInput label=\"Search users\" value={search} onChange={setSearch} placeholder=\"Search...\" hasClear isLabelHidden />\n      <Table data={filteredUsers} idKey=\"id\" columns={[{key: 'name', header: 'Name'},{key: 'email', header: 'Email'},{key: 'role', header: 'Role'},{key: 'department', header: 'Dept'},{key: 'joinDate', header: 'Joined'}]} hasHover plugins={{sortable}} />\n    </div>\n  );\n}\n","fwc-14":"import {useState} from 'react';\nimport {Lightbox} from '@astryxdesign/core/Lightbox';\nimport {Card} from '@astryxdesign/core/Card';\nimport {Heading} from '@astryxdesign/core/Heading';\n\ntype MediaItem = {\n  type: 'image' | 'video';\n  src: string;\n  alt: string;\n};\n\nconst mediaItems: MediaItem[] = [\n  {type: 'image', src: 'https://picsum.photos/800/600?random=1', alt: 'Landscape photo'},\n  {type: 'video', src: 'https://www.w3schools.com/html/mov_bbb.mp4', alt: 'Sample video'},\n  {type: 'image', src: 'https://picsum.photos/800/600?random=2', alt: 'City skyline'},\n  {type: 'image', src: 'https://picsum.photos/800/600?random=3', alt: 'Mountain view'},\n  {type: 'video', src: 'https://www.w3schools.com/html/movie.mp4', alt: 'Another video'},\n  {type: 'image', src: 'https://picsum.photos/800/600?random=4', alt: 'Ocean sunset'},\n];\n\nexport default function MediaGallery() {\n  const [isOpen, setIsOpen] = useState(false);\n  const [currentIndex, setCurrentIndex] = useState(0);\n\n  const lightboxMedia = mediaItems.map(item => ({\n    src: item.src,\n    alt: item.alt,\n    type: item.type as 'image' | 'video',\n  }));\n\n  return (\n    <div className=\"p-6\">\n      <Heading level={2}>Media Gallery</Heading>\n      <div className=\"grid grid-cols-2 md:grid-cols-3 gap-4 mt-4\">\n        {mediaItems.map((item, index) => (\n          <Card key={index} padding={0}>\n            <button\n              className=\"w-full aspect-square overflow-hidden rounded-lg cursor-pointer border-0 p-0\"\n              onClick={() => {\n                setCurrentIndex(index);\n                setIsOpen(true);\n              }}\n              aria-label={`Open ${item.alt}`}>\n              {item.type === 'image' ? (\n                <img className=\"w-full h-full object-cover\" src={item.src} alt={item.alt} />\n              ) : (\n                <video className=\"w-full h-full object-cover\" src={item.src} muted />\n              )}\n            </button>\n          </Card>\n        ))}\n      </div>\n      <Lightbox\n        isOpen={isOpen}\n        onOpenChange={setIsOpen}\n        media={lightboxMedia}\n        index={currentIndex}\n        onIndexChange={setCurrentIndex}\n        hasZoom\n      />\n    </div>\n  );\n}\n","io-2":"import {useState} from 'react';\nimport {Typeahead} from '@astryxdesign/core/Typeahead';\nimport {Heading} from '@astryxdesign/core/Heading';\nimport {Text} from '@astryxdesign/core/Text';\nimport {Card} from '@astryxdesign/core/Card';\n\ninterface Suggestion {\n  id: number;\n  name: string;\n  category: string;\n}\n\nconst allSuggestions: Suggestion[] = [\n  {id: 1, name: 'React', category: 'Framework'},\n  {id: 2, name: 'TypeScript', category: 'Language'},\n  {id: 3, name: 'Next.js', category: 'Framework'},\n  {id: 4, name: 'Tailwind CSS', category: 'Styling'},\n  {id: 5, name: 'Vite', category: 'Build Tool'},\n  {id: 6, name: 'ESLint', category: 'Linting'},\n  {id: 7, name: 'Prettier', category: 'Formatting'},\n  {id: 8, name: 'Jest', category: 'Testing'},\n  {id: 9, name: 'Playwright', category: 'Testing'},\n  {id: 10, name: 'GraphQL', category: 'API'},\n];\n\nfunction createSearchSource() {\n  return {\n    search: async (query: string) => {\n      await new Promise(resolve => setTimeout(resolve, 200));\n      return allSuggestions.filter(s => s.name.toLowerCase().includes(query.toLowerCase()));\n    },\n    bootstrap: async () => allSuggestions.slice(0, 5),\n  };\n}\n\nexport default function AutocompleteInput() {\n  const [selected, setSelected] = useState<Suggestion | null>(null);\n  const searchSource = createSearchSource();\n\n  return (\n    <div className=\"p-6 space-y-4\">\n      <Heading level={2}>Technology Search</Heading>\n      <Text color=\"secondary\">Start typing to search for technologies</Text>\n      <Typeahead\n        label=\"Search technologies\"\n        searchSource={searchSource}\n        value={selected}\n        onChange={setSelected}\n        placeholder=\"Type to search...\"\n        hasEntriesOnFocus\n        renderItem={(item: Suggestion) => (\n          <div className=\"flex gap-2 items-center\">\n            <Text type=\"label\">{item.name}</Text>\n            <Text type=\"supporting\" color=\"secondary\">{item.category}</Text>\n          </div>\n        )}\n      />\n      {selected && (\n        <Card padding={3}>\n          <div className=\"space-y-1\">\n            <Text type=\"label\">Selected: {selected.name}</Text>\n            <Text type=\"supporting\" color=\"secondary\">Category: {selected.category}</Text>\n          </div>\n        </Card>\n      )}\n    </div>\n  );\n}\n","ps-1":"import {useState} from 'react';\nimport {Layout} from '@astryxdesign/core/Layout';\nimport {LayoutHeader} from '@astryxdesign/core/Layout';\nimport {LayoutContent} from '@astryxdesign/core/Layout';\nimport {LayoutPanel} from '@astryxdesign/core/Layout';\nimport {Heading} from '@astryxdesign/core/Heading';\nimport {Text} from '@astryxdesign/core/Text';\nimport {Button} from '@astryxdesign/core/Button';\nimport {TextInput} from '@astryxdesign/core/TextInput';\nimport {CheckboxInput} from '@astryxdesign/core/CheckboxInput';\n\nconst navItems = ['General', 'Notifications', 'Security', 'Appearance', 'Integrations'];\n\nexport default function SettingsDashboard() {\n  const [activeSection, setActiveSection] = useState('General');\n  const [username, setUsername] = useState('johndoe');\n  const [email, setEmail] = useState('john@example.com');\n  const [emailNotifs, setEmailNotifs] = useState(true);\n  const [pushNotifs, setPushNotifs] = useState(false);\n\n  const renderContent = () => {\n    switch (activeSection) {\n      case 'General':\n        return (\n          <div className=\"space-y-4\">\n            <Heading level={3}>General Settings</Heading>\n            <TextInput label=\"Username\" value={username} onChange={setUsername} />\n            <TextInput label=\"Email\" value={email} onChange={setEmail} type=\"email\" />\n            <Button label=\"Save Changes\" variant=\"primary\" />\n          </div>\n        );\n      case 'Notifications':\n        return (\n          <div className=\"space-y-4\">\n            <Heading level={3}>Notification Preferences</Heading>\n            <CheckboxInput label=\"Email notifications\" value={emailNotifs} onChange={checked => setEmailNotifs(checked)} />\n            <CheckboxInput label=\"Push notifications\" value={pushNotifs} onChange={checked => setPushNotifs(checked)} />\n            <Button label=\"Save Preferences\" variant=\"primary\" />\n          </div>\n        );\n      default:\n        return (\n          <div className=\"space-y-4\">\n            <Heading level={3}>{activeSection}</Heading>\n            <Text color=\"secondary\">Settings for {activeSection} will appear here.</Text>\n          </div>\n        );\n    }\n  };\n\n  return (\n    <Layout\n      header={<LayoutHeader hasDivider><div className=\"p-3\"><Heading level={1}>Settings</Heading></div></LayoutHeader>}\n      start={<LayoutPanel hasDivider label=\"Settings navigation\"><div className=\"p-2 space-y-1\">{navItems.map(item => (<Button key={item} label={item} variant={activeSection === item ? 'secondary' : 'ghost'} onClick={() => setActiveSection(item)} />))}</div></LayoutPanel>}\n      content={<LayoutContent padding={4}>{renderContent()}</LayoutContent>}\n    />\n  );\n}\n","rc-1":"import {useState} from 'react';\nimport {Button} from '@astryxdesign/core/Button';\nimport {Text} from '@astryxdesign/core/Text';\nimport {IconButton} from '@astryxdesign/core/IconButton';\n\nconst navLinks = ['Home', 'Products', 'About', 'Contact', 'Blog'];\n\nexport default function ResponsiveNav() {\n  const [isMobileOpen, setIsMobileOpen] = useState(false);\n\n  return (\n    <>\n      <nav className=\"border-b px-4 py-3\">\n        <div className=\"flex justify-between items-center\">\n          <Text type=\"label\">MyApp</Text>\n          <div className=\"hidden md:flex gap-2\">\n            {navLinks.map(link => (\n              <Button key={link} label={link} variant=\"ghost\" size=\"sm\" />\n            ))}\n          </div>\n          <div className=\"md:hidden\">\n            <IconButton label=\"Open menu\" icon={<span>&#9776;</span>} variant=\"ghost\" onClick={() => setIsMobileOpen(true)} />\n          </div>\n        </div>\n      </nav>\n      {isMobileOpen && (\n        <div className=\"fixed inset-0 bg-white z-50 p-6\">\n          <div className=\"flex justify-between items-center mb-6\">\n            <Text type=\"label\">MyApp</Text>\n            <IconButton label=\"Close menu\" icon={<span>&times;</span>} variant=\"ghost\" onClick={() => setIsMobileOpen(false)} />\n          </div>\n          <div className=\"flex flex-col gap-2\">\n            {navLinks.map(link => (\n              <Button key={link} label={link} variant=\"ghost\" onClick={() => setIsMobileOpen(false)} />\n            ))}\n          </div>\n        </div>\n      )}\n    </>\n  );\n}\n","sd-4":"import {useState, useRef, useEffect} from 'react';\nimport {CheckboxInput} from '@astryxdesign/core/CheckboxInput';\nimport {Button} from '@astryxdesign/core/Button';\nimport {Heading} from '@astryxdesign/core/Heading';\nimport {Text} from '@astryxdesign/core/Text';\n\nconst TERMS_TEXT = `Terms and Conditions\\n\\n1. Acceptance of Terms\\nBy accessing and using this service, you accept and agree to be bound by the terms.\\n\\n2. Use License\\nPermission is granted to temporarily use this service for personal use.\\n\\n3. Disclaimer\\nThe materials are provided on an 'as is' basis with no warranties.\\n\\n4. Limitations\\nIn no event shall we be liable for any damages.\\n\\n5. Accuracy\\nThe materials could include technical errors.\\n\\n6. Links\\nWe have not reviewed all linked sites.\\n\\n7. Modifications\\nWe may revise these terms at any time.\\n\\n8. Governing Law\\nThese terms are governed by applicable law.`;\n\nexport default function TermsAcceptanceForm() {\n  const [hasScrolledToBottom, setHasScrolledToBottom] = useState(false);\n  const [isAccepted, setIsAccepted] = useState(false);\n  const [isSubmitted, setIsSubmitted] = useState(false);\n  const scrollRef = useRef<HTMLDivElement>(null);\n\n  useEffect(() => {\n    const el = scrollRef.current;\n    if (!el) return;\n    const handleScroll = () => {\n      if (el.scrollHeight - el.scrollTop <= el.clientHeight + 20) setHasScrolledToBottom(true);\n    };\n    el.addEventListener('scroll', handleScroll);\n    return () => el.removeEventListener('scroll', handleScroll);\n  }, []);\n\n  if (isSubmitted) {\n    return (\n      <div className=\"p-6 space-y-4\">\n        <Heading level={2}>Terms Accepted</Heading>\n        <Text>Thank you for accepting the terms and conditions.</Text>\n      </div>\n    );\n  }\n\n  return (\n    <div className=\"p-6 space-y-4\">\n      <Heading level={2}>Terms and Conditions</Heading>\n      <Text color=\"secondary\">Please read and scroll through the entire document.</Text>\n      <div ref={scrollRef} className=\"max-h-72 overflow-auto border rounded-lg p-4\">\n        <Text as=\"div\">{TERMS_TEXT}</Text>\n      </div>\n      {!hasScrolledToBottom && <Text type=\"supporting\" color=\"secondary\">Scroll to the bottom to enable acceptance</Text>}\n      <CheckboxInput\n        label=\"I have read and agree to the Terms and Conditions\"\n        value={isAccepted}\n        onChange={checked => setIsAccepted(checked)}\n        isDisabled={!hasScrolledToBottom}\n      />\n      <Button label=\"Accept and Continue\" variant=\"primary\" isDisabled={!isAccepted} onClick={() => setIsSubmitted(true)} />\n    </div>\n  );\n}\n","tc-4":"import {useState} from 'react';\nimport {Theme} from '@astryxdesign/core/theme';\nimport {Card} from '@astryxdesign/core/Card';\nimport {Button} from '@astryxdesign/core/Button';\nimport {Heading} from '@astryxdesign/core/Heading';\nimport {Text} from '@astryxdesign/core/Text';\nimport {defineTheme} from '@astryxdesign/core/theme';\n\nconst defaultTheme = defineTheme({name: 'default', color: {accent: '#2563eb'}});\nconst midnightTheme = defineTheme({name: 'midnight', color: {accent: '#7c3aed'}});\nconst sunriseTheme = defineTheme({name: 'sunrise', color: {accent: '#ea580c'}});\n\nconst themes = [\n  {name: 'Default', theme: defaultTheme, description: 'Clean blue accent with neutral tones'},\n  {name: 'Midnight', theme: midnightTheme, description: 'Dark purple for a nighttime feel'},\n  {name: 'Sunrise', theme: sunriseTheme, description: 'Warm orange for an energetic look'},\n];\n\nexport default function ThemeSwitcher() {\n  const [activeTheme, setActiveTheme] = useState(themes[0]);\n\n  return (\n    <Theme theme={activeTheme.theme} mode=\"light\">\n      <div className=\"p-6 space-y-4\">\n        <Heading level={2}>Theme Switcher</Heading>\n        <Text color=\"secondary\">Pick a theme to preview how components look.</Text>\n        <div className=\"flex flex-wrap gap-3\">\n          {themes.map(t => (\n            <Card key={t.name} padding={3}>\n              <div className=\"space-y-2\">\n                <Text type=\"label\">{t.name}</Text>\n                <Text type=\"supporting\" color=\"secondary\">{t.description}</Text>\n                <Button\n                  label={activeTheme.name === t.name ? 'Active' : 'Apply'}\n                  variant={activeTheme.name === t.name ? 'primary' : 'secondary'}\n                  onClick={() => setActiveTheme(t)}\n                  isDisabled={activeTheme.name === t.name}\n                />\n              </div>\n            </Card>\n          ))}\n        </div>\n        <Card padding={4}>\n          <div className=\"space-y-3\">\n            <Heading level={3}>Preview</Heading>\n            <Text>This card shows the current theme. Buttons reflect the selected palette.</Text>\n            <div className=\"flex gap-2\">\n              <Button label=\"Primary Action\" variant=\"primary\" />\n              <Button label=\"Secondary\" variant=\"secondary\" />\n              <Button label=\"Ghost\" variant=\"ghost\" />\n            </div>\n          </div>\n        </Card>\n      </div>\n    </Theme>\n  );\n}\n","ty-10":"import {Heading} from '@astryxdesign/core/Heading';\nimport {Text} from '@astryxdesign/core/Text';\nimport {Avatar} from '@astryxdesign/core/Avatar';\n\nexport default function ArticlePage() {\n  return (\n    <article className=\"max-w-3xl mx-auto py-8 px-6 space-y-6\">\n      <Heading level={1} type=\"display-1\">\n        The Future of Design Systems in Modern Web Development\n      </Heading>\n      <Text type=\"large\" color=\"secondary\">\n        How component libraries are reshaping the way teams build consistent, accessible user interfaces at scale.\n      </Text>\n      <div className=\"flex items-center gap-3\">\n        <Avatar name=\"Sarah Chen\" size=\"md\" />\n        <div>\n          <Text type=\"label\">Sarah Chen</Text>\n          <Text type=\"supporting\" color=\"secondary\" display=\"block\">Published Jan 15, 2024 · 8 min read</Text>\n        </div>\n      </div>\n      <hr className=\"border-gray-200\" />\n      <img className=\"w-full h-96 object-cover rounded-xl\" src=\"https://picsum.photos/1200/600?random=10\" alt=\"Design system components\" />\n      <Text as=\"p\">Design systems have become the foundation of modern web development. They provide a shared language between designers and developers, ensuring consistency across products.</Text>\n      <Text as=\"p\">At their core, design systems are collections of reusable components, guided by clear standards, that can be assembled to build applications.</Text>\n      <Heading level={2}>The Evolution of Component Architecture</Heading>\n      <Text as=\"p\">The shift from monolithic CSS frameworks to modular component systems reflects a broader trend toward composability and reuse.</Text>\n      <blockquote className=\"border-l-4 border-gray-800 pl-6 my-8 italic\">\n        <Text type=\"large\">A good design system is invisible. It disappears into the product, letting content take center stage.</Text>\n      </blockquote>\n      <Text as=\"p\">Component-driven development encourages teams to think in terms of building blocks rather than pages.</Text>\n      <Heading level={2}>Accessibility as a Foundation</Heading>\n      <Text as=\"p\">When accessibility is built into the design system, every product inherits those guarantees. Focus management, ARIA attributes, and keyboard navigation come for free.</Text>\n      <Heading level={2}>Looking Ahead</Heading>\n      <Text as=\"p\">The next wave of design systems will incorporate AI-assisted development, dynamic theming, and cross-platform consistency.</Text>\n    </article>\n  );\n}\n","wd-4":"import {useState, useMemo} from 'react';\nimport {Table} from '@astryxdesign/core/Table';\nimport {Button} from '@astryxdesign/core/Button';\nimport {TextInput} from '@astryxdesign/core/TextInput';\nimport {Heading} from '@astryxdesign/core/Heading';\nimport {useTablePagination} from '@astryxdesign/core/Table';\nimport {useTableSortable} from '@astryxdesign/core/Table';\n\ninterface Todo extends Record<string, unknown> {\n  id: number;\n  title: string;\n  status: 'pending' | 'in-progress' | 'done';\n  priority: 'low' | 'medium' | 'high';\n  createdAt: string;\n}\n\nconst initialTodos: Todo[] = [\n  {id: 1, title: 'Set up project', status: 'done', priority: 'high', createdAt: '2024-01-10'},\n  {id: 2, title: 'Design database schema', status: 'in-progress', priority: 'high', createdAt: '2024-01-11'},\n  {id: 3, title: 'Build API endpoints', status: 'pending', priority: 'medium', createdAt: '2024-01-12'},\n  {id: 4, title: 'Write unit tests', status: 'pending', priority: 'medium', createdAt: '2024-01-13'},\n  {id: 5, title: 'Deploy to staging', status: 'pending', priority: 'low', createdAt: '2024-01-14'},\n  {id: 6, title: 'User acceptance testing', status: 'pending', priority: 'low', createdAt: '2024-01-15'},\n  {id: 7, title: 'Performance optimization', status: 'pending', priority: 'medium', createdAt: '2024-01-16'},\n  {id: 8, title: 'Documentation', status: 'pending', priority: 'low', createdAt: '2024-01-17'},\n  {id: 9, title: 'Code review', status: 'in-progress', priority: 'high', createdAt: '2024-01-18'},\n  {id: 10, title: 'Release planning', status: 'pending', priority: 'medium', createdAt: '2024-01-19'},\n  {id: 11, title: 'Bug fixes', status: 'in-progress', priority: 'high', createdAt: '2024-01-20'},\n  {id: 12, title: 'Monitoring setup', status: 'pending', priority: 'low', createdAt: '2024-01-21'},\n];\n\nexport default function TodoTracker() {\n  const [search, setSearch] = useState('');\n  const [todos, setTodos] = useState(initialTodos);\n  const [newTitle, setNewTitle] = useState('');\n\n  const filteredTodos = useMemo(\n    () => todos.filter(todo => todo.title.toLowerCase().includes(search.toLowerCase())),\n    [todos, search],\n  );\n\n  const pagination = useTablePagination({pageSize: 5});\n  const sortable = useTableSortable<Todo>();\n\n  const addTodo = () => {\n    if (!newTitle.trim()) return;\n    setTodos(prev => [...prev, {id: Date.now(), title: newTitle.trim(), status: 'pending', priority: 'medium', createdAt: new Date().toISOString().split('T')[0]}]);\n    setNewTitle('');\n  };\n\n  return (\n    <div className=\"p-6 space-y-4\">\n      <Heading level={1}>TodoTracker</Heading>\n      <div className=\"flex gap-3 items-end\">\n        <TextInput label=\"Search todos\" value={search} onChange={setSearch} placeholder=\"Filter...\" hasClear />\n        <TextInput label=\"New todo\" value={newTitle} onChange={setNewTitle} placeholder=\"Add a task...\" />\n        <Button label=\"Add\" variant=\"primary\" onClick={addTodo} />\n      </div>\n      <Table\n        data={filteredTodos}\n        idKey=\"id\"\n        columns={[\n          {key: 'title', header: 'Title'},\n          {key: 'status', header: 'Status'},\n          {key: 'priority', header: 'Priority'},\n          {key: 'createdAt', header: 'Created'},\n        ]}\n        hasHover\n        plugins={{pagination, sortable}}\n      />\n    </div>\n  );\n}\n"},"previews":{"ty-10":{"baseline":"previews/ty-10/baseline.html","html":"previews/ty-10/html.html"}},"prompts":{"fwc-14":"Build a media gallery that mixes images and videos. Clicking any item opens a lightbox viewer. Videos should show native playback controls. Images should support zoom on double-click.","wd-4":"Create a new internal tool called TodoTracker. UI Requirements: Display todos in a paginated table (default 25 per page). Columns: Title, Status, Created, Updated. Sortable by: Updated date (default desc), Created date, Title. Add a filter bar that filters by title (substring match) and status. Inline editing for todo title (with save/cancel). Status toggle button (Open <-> Closed). 'Create Todo' button that opens a modal with title input. Delete button with confirmation dialog. UI should update optimistically after any modification. Optimistic updates should be marked as 'pending' until the modification is complete.","cwm-3":"Like Notion's page header with icon picker and cover image","sd-4":"Build a terms and conditions acceptance form. Show a scrollable text area with the terms, then checkboxes for \"I agree to the Terms of Service\" and \"I agree to the Privacy Policy\". The continue button should only enable when both are checked.","dd-1":"A table of users with sortable columns and search","rc-1":"Navigation that collapses to hamburger on mobile","io-2":"An autocomplete input that fetches suggestions from an API as you type","ps-1":"Create a new page for a settings dashboard. It should have a header with the app title, a sidebar for navigation, and a main content area. Use the Astryx theme system.","ty-10":"Create an article page with a full editorial-style header (large title, subtitle, author info) and a body section that renders rich text content with proper heading hierarchy, paragraphs, code blocks, and lists","tc-4":"Create a theme switcher that lets users pick between three themes: Default, Midnight (dark purple), and Earth (warm brown tones). Show a preview card for each theme."}};</script>

    font-size: 75%;

    position: relative;
  }

    bottom: -.25em;
  }

  :where(sup) {

  }

  :where(ol, ul, menu) {
    margin: 0;
    padding: 0;
    list-style: none;
  }

  }

  }

  :where(:disabled) {
    cursor: default;
  }

  :where(textarea) {
    resize: vertical;
  }

  :where() {
    opacity: 1;
    color: var(--color-text-secondary, #9ca3af);
    -webkit-appearance: none;
  }

  :where(fieldset) {
    margin: 0;
    padding: 0;
  }

  :where(legend) {
    padding: 0;
  }

  :where(table) {
    text-indent: 0;
    border-color: inherit;
    border-collapse: collapse;
  }

  :where(hr) {
    height: 0;
    color: inherit;
    border-top-width: 1px;
  }

  :where(summary) {
    display: list-item;
  }

  :where(dialog) {

    padding: 0;
  }

  :where([hidden]) {
    display: none;
  }

  :where(html) {

  }

      outline: none;
    }
  }

    color-scheme: light;
  }

  :where(html[data-theme="dark"]) {
    color-scheme: dark;
  }

  :where(html:not([data-theme])) {
    color-scheme: light dark;
  }

  :where([data-astryx-media="dark"]) {
