des(query.toLowerCase()))\n        .filter(l => !selected.some(s => s.name === l.name)),\n    bootstrap: () => LABELS.filter(l => !selected.some(s => s.name === l.name)),\n  };\n\n  return (\n    <Stack gap={3} xstyle={styles.container}>\n      <Typeahead\n        label=\"Add label\"\n        searchSource={searchSource}\n        value={current}\n        onChange={(item) => {\n          if (item) {\n            setSelected(prev => [...prev, item]);\n            setCurrent(null);\n          }\n        }}\n        placeholder=\"Search labels...\"\n        hasEntriesOnFocus\n        renderItem={(item) => (\n          <Stack gap={2} direction=\"horizontal\" align=\"center\">\n            <span {...stylex.props(styles.colorDot)} style={{backgroundColor: item.color}} />\n            {item.name}\n          </Stack>\n        )}\n      />\n      <div {...stylex.props(styles.labelList)}>\n        {selected.map(label => (\n          <Badge key={label.name} color=\"neutral\">\n            <span {...stylex.props(styles.colorDot)} style={{backgroundColor: label.color}} />\n            {label.name}\n          </Badge>\n        ))}\n      </div>\n    </Stack>\n  );\n}","dd-5":"import {useState} from 'react';\nimport {Table} from '@astryxdesign/core/Table';\nimport {CheckboxInput} from '@astryxdesign/core/CheckboxInput';\nimport {Button} from '@astryxdesign/core/Button';\nimport {ButtonGroup} from '@astryxdesign/core/ButtonGroup';\nimport {Stack} from '@astryxdesign/core/Stack';\nimport {Text} from '@astryxdesign/core/Text';\nimport stylex from '@stylexjs/stylex';\n\nconst styles = stylex.create({\n  bulkBar: {\n    padding: 8,\n    backgroundColor: 'var(--color-background-wash)',\n    borderRadius: 8,\n  },\n});\n\ninterface Email {\n  id: string;\n  sender: string;\n  subject: string;\n  date: string;\n  preview: string;\n  [key: string]: unknown;\n}\n\nconst emails: Email[] = [\n  {id: '1', sender: 'Alice Smith', subject: 'Project Update', date: '2024-01-15', preview: 'The latest sprint results are in...'},\n  {id: '2', sender: 'Bob Chen', subject: 'Meeting Tomorrow', date: '2024-01-14', preview: 'Can we reschedule to 3pm?'},\n  {id: '3', sender: 'Carol Davis', subject: 'Design Review', date: '2024-01-13', preview: 'Attached are the mockups for...'},\n  {id: '4', sender: 'Dave Wilson', subject: 'Invoice #4521', date: '2024-01-12', preview: 'Please find attached the invoice...'},\n  {id: '5', sender: 'Eve Taylor', subject: 'Welcome aboard!', date: '2024-01-11', preview: 'We are excited to have you join...'},\n];\n\nexport default function EmailInbox() {\n  const [selectedIds, setSelectedIds] = useState<Set<string>>(new Set());\n\n  const toggleSelection = (id: string) => {\n    setSelectedIds(prev => {\n      const next = new Set(prev);\n      if (next.has(id)) next.delete(id);\n      else next.add(id);\n      return next;\n    });\n  };\n\n  const toggleAll = () => {\n    if (selectedIds.size === emails.length) {\n      setSelectedIds(new Set());\n    } else {\n      setSelectedIds(new Set(emails.map(e => e.id)));\n    }\n  };\n\n  return (\n    <Stack gap={3}>\n      {selectedIds.size > 0 && (\n        <div {...stylex.props(styles.bulkBar)}>\n          <Stack direction=\"horizontal\" gap={2} align=\"center\">\n            <Text>{selectedIds.size} selected</Text>\n            <ButtonGroup>\n              <Button variant=\"outlined\" size=\"sm\" onPress={() => {}}>Archive</Button>\n              <Button variant=\"outlined\" size=\"sm\" onPress={() => {}}>Delete</Button>\n              <Button variant=\"outlined\" size=\"sm\" onPress={() => {}}>Mark Read</Button>\n            </ButtonGroup>\n          </Stack>\n        </div>\n      )}\n      <Table\n        data={emails}\n        idKey=\"id\"\n        hasHover\n        columns={[\n          {\n            key: 'select',\n            header: '',\n            width: {type: 'pixel', value: 40},\n            renderCell: (row) => (\n              <CheckboxInput\n                label=\"Select\"\n                isLabelHidden\n                isChecked={selectedIds.has(row.id)}\n                onChange={() => toggleSelection(row.id)}\n              />\n            ),\n          },\n          {key: 'sender', header: 'Sender'},\n          {key: 'subject', header: 'Subject'},\n          {key: 'date', header: 'Date'},\n          {key: 'preview', header: 'Preview'},\n        ]}\n      />\n    </Stack>\n  );\n}","fwc-8":"import {DateRangeInput} from '@astryxdesign/core/DateRangeInput';\nimport {useState} from 'react';\n\ntype DateRange = {start: string; end: string};\n\nexport default function HotelDatePicker() {\n  const [range, setRange] = useState<DateRange | null>(null);\n  const today = new Date().toISOString().split('T')[0];\n\n  return (\n    <DateRangeInput\n      label=\"Stay dates\"\n      description=\"Select your check-in and check-out dates\"\n      value={range}\n      onChange={setRange}\n      min={today}\n      placeholder=\"Select dates\"\n      size=\"md\"\n    />\n  );\n}","io-2":"import {useState} from 'react';\nimport {Typeahead} from '@astryxdesign/core/Typeahead';\n\ntype Suggestion = {id: string; label: string};\n\nfunction createSearchSource() {\n  return {\n    search: async (query: string): Promise<Suggestion[]> => {\n      const response = await fetch(\n        `https://api.example.com/suggest?q=${encodeURIComponent(query)}`\n      );\n      const data = await response.json();\n      return data.results.map((r: {id: string; name: string}) => ({\n        id: r.id,\n        label: r.name,\n      }));\n    },\n    bootstrap: () => [] as Suggestion[],\n  };\n}\n\nexport default function AutocompleteInput() {\n  const [value, setValue] = useState<Suggestion | null>(null);\n  const searchSource = createSearchSource();\n\n  return (\n    <Typeahead\n      label=\"Search\"\n      searchSource={searchSource}\n      value={value}\n      onChange={setValue}\n      placeholder=\"Type to search...\"\n      debounceMs={300}\n      emptySearchResultsText=\"No results found\"\n      renderItem={(item) => item.label}\n    />\n  );\n}","ps-1":"import {AppShell} from '@astryxdesign/core/AppShell';\nimport {TopNav} from '@astryxdesign/core/TopNav';\nimport {TopNavHeading} from '@astryxdesign/core/TopNav';\nimport {SideNav} from '@astryxdesign/core/SideNav';\nimport {SideNavItem} from '@astryxdesign/core/SideNav';\nimport {SideNavSection} from '@astryxdesign/core/SideNav';\nimport {Text} from '@astryxdesign/core/Text';\nimport {Stack} from '@astryxdesign/core/Stack';\nimport {Card} from '@astryxdesign/core/Card';\nimport {Theme} from '@astryxdesign/core/theme';\n\nexport default function SettingsDashboard() {\n  return (\n    <AppShell\n      topNav={\n        <TopNav>\n          <TopNavHeading>My App</TopNavHeading>\n        </TopNav>\n      }\n      sideNav={\n        <SideNav>\n          <SideNavSection label=\"Settings\">\n            <SideNavItem label=\"General\" isSelected />\n            <SideNavItem label=\"Account\" />\n            <SideNavItem label=\"Notifications\" />\n            <SideNavItem label=\"Security\" />\n            <SideNavItem label=\"Integrations\" />\n          </SideNavSection>\n        </SideNav>\n      }\n      contentPadding={4}\n    >\n      <Stack gap={4}>\n        <Text variant=\"heading\">General Settings</Text>\n        <Card>\n          <Stack gap={2}>\n            <Text weight=\"bold\">Application Name</Text>\n            <Text color=\"secondary\">Configure your application preferences.</Text>\n          </Stack>\n        </Card>\n        <Card>\n          <Stack gap={2}>\n            <Text weight=\"bold\">Language</Text>\n            <Text color=\"secondary\">Choose your preferred language for the interface.</Text>\n          </Stack>\n        </Card>\n      </Stack>\n    </AppShell>\n  );\n}","rc-2":"import {SideNav} from '@astryxdesign/core/SideNav';\nimport {SideNavItem} from '@astryxdesign/core/SideNav';\nimport {SideNavSection} from '@astryxdesign/core/SideNav';\nimport {MobileNav} from '@astryxdesign/core/MobileNav';\nimport {AppShell} from '@astryxdesign/core/AppShell';\nimport {Text} from '@astryxdesign/core/Text';\n\nexport default function ResponsiveNav() {\n  return (\n    <AppShell\n      sideNav={\n        <SideNav>\n          <SideNavSection label=\"Main\">\n            <SideNavItem label=\"Home\" isSelected />\n            <SideNavItem label=\"Dashboard\" />\n            <SideNavItem label=\"Projects\" />\n          </SideNavSection>\n          <SideNavSection label=\"Settings\">\n            <SideNavItem label=\"Account\" />\n            <SideNavItem label=\"Preferences\" />\n          </SideNavSection>\n        </SideNav>\n      }\n      mobileNav={\n        <MobileNav>\n          <SideNavItem label=\"Home\" isSelected />\n          <SideNavItem label=\"Dashboard\" />\n          <SideNavItem label=\"Projects\" />\n          <SideNavItem label=\"Account\" />\n          <SideNavItem label=\"Preferences\" />\n        </MobileNav>\n      }\n    >\n      <Text>Main content area. The sidebar becomes a bottom sheet on mobile.</Text>\n    </AppShell>\n  );\n}","sd-1":"import {useState, useEffect} from 'react';\nimport {Card} from '@astryxdesign/core/Card';\nimport {Spinner} from '@astryxdesign/core/Spinner';\nimport {Text} from '@astryxdesign/core/Text';\nimport {Banner} from '@astryxdesign/core/Banner';\nimport {Stack} from '@astryxdesign/core/Stack';\nimport {Button} from '@astryxdesign/core/Button';\n\ntype State = 'loading' | 'error' | 'success';\ntype Data = {value: number; label: string};\n\nexport default function DashboardWidget() {\n  const [state, setState] = useState<State>('loading');\n  const [data, setData] = useState<Data | null>(null);\n\n  useEffect(() => {\n    const timer = setTimeout(() => {\n      const shouldError = Math.random() > 0.7;\n      if (shouldError) {\n        setState('error');\n      } else {\n        setData({value: 42, label: 'Active Users'});\n        setState('success');\n      }\n    }, 1500);\n    return () => clearTimeout(timer);\n  }, []);\n\n  return (\n    <Card>\n      <Stack gap={3}>\n        {state === 'loading' && <Spinner label=\"Loading dashboard data...\" />}\n        {state === 'error' && (\n          <Stack gap={2}>\n            <Banner variant=\"error\">Failed to load data. Please try again.</Banner>\n            <Button variant=\"outlined\" onPress={() => setState('loading')}>\n              Retry\n            </Button>\n          </Stack>\n        )}\n        {state === 'success' && data && (\n          <Stack gap={1}>\n            <Text variant=\"display\">{data.value}</Text>\n            <Text color=\"secondary\">{data.label}</Text>\n          </Stack>\n        )}\n      </Stack>\n    </Card>\n  );\n}","tc-7":"import {Theme} from '@astryxdesign/core/theme';\nimport {AppShell} from '@astryxdesign/core/AppShell';\nimport {SideNav} from '@astryxdesign/core/SideNav';\nimport {SideNavItem} from '@astryxdesign/core/SideNav';\nimport {SideNavSection} from '@astryxdesign/core/SideNav';\nimport {Text} from '@astryxdesign/core/Text';\nimport {Stack} from '@astryxdesign/core/Stack';\nimport {Card} from '@astryxdesign/core/Card';\nimport {defineTheme} from '@astryxdesign/core/theme';\n\nconst darkSidebarTheme = defineTheme({\n  tokens: {\n    '--color-background-surface': '#1a1a2e',\n    '--color-text-primary': '#ffffff',\n    '--color-text-secondary': '#a0a0b0',\n  },\n});\n\nexport default function NestedThemeLayout() {\n  return (\n    <AppShell\n      sideNav={\n        <Theme theme={darkSidebarTheme} mode=\"dark\">\n          <SideNav>\n            <SideNavSection label=\"Navigation\">\n              <SideNavItem label=\"Dashboard\" isSelected />\n              <SideNavItem label=\"Analytics\" />\n              <SideNavItem label=\"Reports\" />\n            </SideNavSection>\n          </SideNav>\n        </Theme>\n      }\n      contentPadding={4}\n    >\n      <Stack gap={4}>\n        <Text variant=\"heading\">Light Content Area</Text>\n        <Card>\n          <Text>This content uses the default light theme while the sidebar has a dark theme applied via nested Theme provider.</Text>\n        </Card>\n      </Stack>\n    </AppShell>\n  );\n}","ty-9":"import {Text} from '@astryxdesign/core/Text';\nimport {Stack} from '@astryxdesign/core/Stack';\nimport {Grid} from '@astryxdesign/core/Grid';\nimport stylex from '@stylexjs/stylex';\n\nconst styles = stylex.create({\n  columnHeader: {\n    textAlign: 'center',\n    padding: 16,\n  },\n  featured: {\n    borderWidth: 2,\n    borderStyle: 'solid',\n    borderColor: 'var(--color-accent)',\n    borderRadius: 8,\n    padding: 24,\n  },\n  regular: {\n    padding: 24,\n  },\n});\n\ninterface Plan {\n  name: string;\n  price: string;\n  isFeatured?: boolean;\n}\n\nconst plans: Plan[] = [\n  {name: 'Starter', price: '$9/mo'},\n  {name: 'Pro', price: '$29/mo'},\n  {name: 'Enterprise', price: '$99/mo', isFeatured: true},\n];\n\nexport default function ComparisonHeader() {\n  return (\n    <Grid columns={3} gap={4}>\n      {plans.map(plan => (\n        <div key={plan.name} {...stylex.props(plan.isFeatured ? styles.featured : styles.regular)}>\n          <Stack gap={2} align=\"center\">\n            {plan.isFeatured ? (\n              <Text variant=\"display\" size=\"lg\">{plan.name}</Text>\n            ) : (\n              <Text variant=\"heading\" size=\"md\">{plan.name}</Text>\n            )}\n            <Text color=\"secondary\" size={plan.isFeatured ? 'lg' : 'md'}>\n              {plan.price}\n            </Text>\n          </Stack>\n        </div>\n      ))}\n    </Grid>\n  );\n}","wd-1":"import {useState} from 'react';\nimport {Card} from '@astryxdesign/core/Card';\nimport {Button} from '@astryxdesign/core/Button';\nimport {Text} from '@astryxdesign/core/Text';\nimport {Stack} from '@astryxdesign/core/Stack';\nimport {TabList} from '@astryxdesign/core/TabList';\nimport {Tab} from '@astryxdesign/core/TabList';\nimport {Divider} from '@astryxdesign/core/Divider';\nimport {TextInput} from '@astryxdesign/core/TextInput';\nimport {RadioList} from '@astryxdesign/core/RadioList';\nimport {RadioListItem} from '@astryxdesign/core/RadioList';\n\ntype Step = 'cart' | 'shipping' | 'payment' | 'confirmation';\n\nexport default function CheckoutFlow() {\n  const [step, setStep] = useState<Step>('cart');\n  const [shippingMethod, setShippingMethod] = useState('standard');\n\n  return (\n    <Stack gap={4}>\n      <TabList value={step} onChange={(v) => setStep(v as Step)}>\n        <Tab value=\"cart\">Cart</Tab>\n        <Tab value=\"shipping\">Shipping</Tab>\n        <Tab value=\"payment\">Payment</Tab>\n        <Tab value=\"confirmation\">Confirmation</Tab>\n      </TabList>\n      <Card>\n        {step === 'cart' && (\n          <Stack gap={3}>\n            <Text>Your cart items will appear here.</Text>\n            <Divider />\n            <Button variant=\"filled\" onPress={() => setStep('shipping')}>\n              Continue to Shipping\n            </Button>\n          </Stack>\n        )}\n        {step === 'shipping' && (\n          <Stack gap={3}>\n            <TextInput label=\"Address\" value=\"\" onChange={() => {}} />\n            <TextInput label=\"City\" value=\"\" onChange={() => {}} />\n            <RadioList label=\"Shipping method\" value={shippingMethod} onChange={setShippingMethod}>\n              <RadioListItem value=\"standard\">Standard (5-7 days)</RadioListItem>\n              <RadioListItem value=\"express\">Express (2-3 days)</RadioListItem>\n            </RadioList>\n            <Button variant=\"filled\" onPress={() => setStep('payment')}>\n              Continue to Payment\n            </Button>\n          </Stack>\n        )}\n        {step === 'payment' && (\n          <Stack gap={3}>\n            <TextInput label=\"Card number\" value=\"\" onChange={() => {}} />\n            <TextInput label=\"Expiry\" value=\"\" onChange={() => {}} />\n            <Button variant=\"filled\" onPress={() => setStep('confirmation')}>\n              Place Order\n            </Button>\n          </Stack>\n        )}\n        {step === 'confirmation' && (\n          <Stack gap={3}>\n            <Text>Order confirmed! Thank you for your purchase.</Text>\n          </Stack>\n        )}\n      </Card>\n    </Stack>\n  );\n}"},"baselineSourceCode":{"cwm-2":"import {useState} from 'react';\nimport {Command, CommandEmpty, CommandGroup, CommandInput, CommandItem, CommandList} from '@/components/ui/command';\nimport {Popover, PopoverContent, PopoverTrigger} from '@/components/ui/popover';\nimport {Badge} from '@/components/ui/badge';\nimport {Button} from '@/components/ui/button';\n\nconst labels = [\n  {name: 'bug', color: '#d73a4a'},\n  {name: 'enhancement', color: '#a2eeef'},\n  {name: 'documentation', color: '#0075ca'},\n  {name: 'good first issue', color: '#7057ff'},\n  {name: 'help wanted', color: '#008672'},\n];\n\nexport default function LabelPicker() {\n  const [open, setOpen] = useState(false);\n  const [selected, setSelected] = useState<typeof labels>([]);\n\n  return (\n    <div className=\"space-y-4\">\n      <Popover open={open} onOpenChange={setOpen}>\n        <PopoverTrigger asChild>\n          <Button variant=\"outline\">Add labels</Button>\n        </PopoverTrigger>\n        <PopoverContent className=\"w-[200px] p-0\">\n          <Command>\n            <CommandInput placeholder=\"Search labels...\" />\n            <CommandList>\n              <CommandEmpty>No label found.</CommandEmpty>\n              <CommandGroup>\n                {labels.map(label => (\n                  <CommandItem key={label.name} onSelect={() => {\n                    setSelected(prev => prev.some(l => l.name === label.name) ? prev : [...prev, label]);\n                    setOpen(false);\n                  }}>\n                    <span className=\"h-3 w-3 rounded-full mr-2\" style={{backgroundColor: label.color}} />\n                    {label.name}\n                  </CommandItem>\n                ))}\n              </CommandGroup>\n            </CommandList>\n          </Command>\n        </PopoverContent>\n      </Popover>\n      <div className=\"flex flex-wrap gap-2\">\n        {selected.map(label => (\n          <Badge key={label.name} variant=\"secondary\">\n            <span className=\"h-2 w-2 rounded-full mr-1\" style={{backgroundColor: label.color}} />\n            {label.name}\n          </Badge>\n        ))}\n      </div>\n    </div>\n  );\n}","dd-5":"import {useState} from 'react';\nimport {Table, TableBody, TableCell, TableHead, TableHeader, TableRow} from '@/components/ui/table';\nimport {Checkbox} from '@/components/ui/checkbox';\nimport {Button} from '@/components/ui/button';\n\nconst emails = [\n  {id: '1', sender: 'Alice', subject: 'Project Update', date: '2024-01-15', preview: 'Sprint results are in...'},\n  {id: '2', sender: 'Bob', subject: 'Meeting', date: '2024-01-14', preview: 'Reschedule to 3pm?'},\n  {id: '3', sender: 'Carol', subject: 'Design Review', date: '2024-01-13', preview: 'Mockups attached...'},\n  {id: '4', sender: 'Dave', subject: 'Invoice', date: '2024-01-12', preview: 'Please find attached...'},\n];\n\nexport default function EmailInbox() {\n  const [selected, setSelected] = useState<Set<string>>(new Set());\n\n  const toggle = (id: string) => {\n    setSelected(prev => {\n      const next = new Set(prev);\n      next.has(id) ? next.delete(id) : next.add(id);\n      return next;\n    });\n  };\n\n  return (\n    <div className=\"space-y-4\">\n      {selected.size > 0 && (\n        <div className=\"flex items-center gap-2 p-2 bg-muted rounded\">\n          <span>{selected.size} selected</span>\n          <Button size=\"sm\" variant=\"outline\">Archive</Button>\n          <Button size=\"sm\" variant=\"outline\">Delete</Button>\n        </div>\n      )}\n      <Table>\n        <TableHeader>\n          <TableRow>\n            <TableHead className=\"w-[40px]\">\n              <Checkbox onCheckedChange={() => {\n                if (selected.size === emails.length) setSelected(new Set());\n                else setSelected(new Set(emails.map(e => e.id)));\n              }} />\n            </TableHead>\n            <TableHead>Sender</TableHead>\n            <TableHead>Subject</TableHead>\n            <TableHead>Date</TableHead>\n            <TableHead>Preview</TableHead>\n          </TableRow>\n        </TableHeader>\n        <TableBody>\n          {emails.map(email => (\n            <TableRow key={email.id}>\n              <TableCell><Checkbox checked={selected.has(email.id)} onCheckedChange={() => toggle(email.id)} /></TableCell>\n              <TableCell>{email.sender}</TableCell>\n              <TableCell>{email.subject}</TableCell>\n              <TableCell>{email.date}</TableCell>\n              <TableCell className=\"text-muted-foreground\">{email.preview}</TableCell>\n            </TableRow>\n          ))}\n        </TableBody>\n      </Table>\n    </div>\n  );\n}","fwc-8":"import {useState} from 'react';\nimport {Calendar} from '@/components/ui/calendar';\nimport {Popover, PopoverContent, PopoverTrigger} from '@/components/ui/popover';\nimport {Button} from '@/components/ui/button';\nimport {cn} from '@/lib/utils';\nimport {format} from 'date-fns';\nimport {CalendarIcon} from 'lucide-react';\nimport type {DateRange} from 'react-day-picker';\n\nexport default function HotelDatePicker() {\n  const [date, setDate] = useState<DateRange | undefined>();\n\n  return (\n    <div className=\"grid gap-2\">\n      <Popover>\n        <PopoverTrigger asChild>\n          <Button variant=\"outline\" className={cn('w-[300px] justify-start text-left font-normal', !date && 'text-muted-foreground')}>\n            <CalendarIcon className=\"mr-2 h-4 w-4\" />\n            {date?.from ? (\n              date.to ? (\n                <>{format(date.from, 'LLL dd, y')} - {format(date.to, 'LLL dd, y')}</>\n              ) : (\n                format(date.from, 'LLL dd, y')\n              )\n            ) : (\n              <span>Pick check-in and check-out dates</span>\n            )}\n          </Button>\n        </PopoverTrigger>\n        <PopoverContent className=\"w-auto p-0\" align=\"start\">\n          <Calendar\n            initialFocus\n            mode=\"range\"\n            defaultMonth={date?.from}\n            selected={date}\n            onSelect={setDate}\n            numberOfMonths={2}\n            disabled={{before: new Date()}}\n          />\n        </PopoverContent>\n      </Popover>\n    </div>\n  );\n}","io-2":"import {useState, useEffect, useCallback} from 'react';\nimport {Input} from '@/components/ui/input';\nimport {Command, CommandEmpty, CommandGroup, CommandItem, CommandList} from '@/components/ui/command';\nimport {Popover, PopoverContent, PopoverTrigger} from '@/components/ui/popover';\n\nfunction useDebounce(value: string, delay: number) {\n  const [debounced, setDebounced] = useState(value);\n  useEffect(() => {\n    const timer = setTimeout(() => setDebounced(value), delay);\n    return () => clearTimeout(timer);\n  }, [value, delay]);\n  return debounced;\n}\n\nexport default function AutocompleteInput() {\n  const [query, setQuery] = useState('');\n  const [results, setResults] = useState<string[]>([]);\n  const [open, setOpen] = useState(false);\n  const debouncedQuery = useDebounce(query, 300);\n\n  useEffect(() => {\n    if (!debouncedQuery) { setResults([]); return; }\n    fetch(`/api/suggest?q=${encodeURIComponent(debouncedQuery)}`)\n      .then(r => r.json())\n      .then(data => setResults(data.suggestions || []))\n      .catch(() => setResults([]));\n  }, [debouncedQuery]);\n\n  return (\n    <div className=\"relative w-full max-w-sm\">\n      <Popover open={open && results.length > 0} onOpenChange={setOpen}>\n        <PopoverTrigger asChild>\n          <Input\n            placeholder=\"Type to search...\"\n            value={query}\n            onChange={e => { setQuery(e.target.value); setOpen(true); }}\n          />\n        </PopoverTrigger>\n        <PopoverContent className=\"p-0 w-[var(--radix-popover-trigger-width)]\">\n          <Command>\n            <CommandList>\n              <CommandEmpty>No results found.</CommandEmpty>\n              <CommandGroup>\n                {results.map(r => (\n                  <CommandItem key={r} onSelect={() => { setQuery(r); setOpen(false); }}>\n                    {r}\n                  </CommandItem>\n                ))}\n              </CommandGroup>\n            </CommandList>\n          </Command>\n        </PopoverContent>\n      </Popover>\n    </div>\n  );\n}","ps-1":"import {Button} from '@/components/ui/button';\nimport {Card, CardContent, CardHeader, CardTitle} from '@/components/ui/card';\nimport {Separator} from '@/components/ui/separator';\n\nconst navItems = ['General', 'Account', 'Notifications', 'Security', 'Integrations'];\n\nexport default function SettingsDashboard() {\n  return (\n    <div className=\"flex h-screen\">\n      <header className=\"fixed top-0 left-0 right-0 h-14 border-b flex items-center px-4 bg-background z-10\">\n        <h1 className=\"text-lg font-semibold\">My App</h1>\n      </header>\n      <aside className=\"fixed top-14 left-0 bottom-0 w-64 border-r p-4\">\n        <nav className=\"space-y-1\">\n          {navItems.map((item, i) => (\n            <a key={item} href=\"#\" className={`block px-3 py-2 rounded ${i === 0 ? 'bg-muted font-medium' : 'hover:bg-muted'}`}>\n              {item}\n            </a>\n          ))}\n        </nav>\n      </aside>\n      <main className=\"ml-64 mt-14 p-6 space-y-6\">\n        <h2 className=\"text-2xl font-bold\">General Settings</h2>\n        <Card>\n          <CardHeader><CardTitle>Application Name</CardTitle></CardHeader>\n          <CardContent><p className=\"text-muted-foreground\">Configure your application preferences.</p></CardContent>\n        </Card>\n        <Card>\n          <CardHeader><CardTitle>Language</CardTitle></CardHeader>\n          <CardContent><p className=\"text-muted-foreground\">Choose your preferred language.</p></CardContent>\n        </Card>\n      </main>\n    </div>\n  );\n}","rc-2":"import {Sheet, SheetContent, SheetTrigger} from '@/components/ui/sheet';\nimport {Button} from '@/components/ui/button';\nimport {cn} from '@/lib/utils';\n\nconst navItems = ['Home', 'Dashboard', 'Projects', 'Account', 'Settings'];\n\nexport default function ResponsiveNav() {\n  return (\n    <div className=\"flex h-screen\">\n      <aside className=\"hidden md:flex md:w-64 md:flex-col border-r p-4\">\n        <nav className=\"space-y-2\">\n          {navItems.map(item => (\n            <a key={item} href=\"#\" className=\"block px-3 py-2 rounded hover:bg-muted\">{item}</a>\n          ))}\n        </nav>\n      </aside>\n      <main className=\"flex-1 p-6\">\n        <div className=\"md:hidden mb-4\">\n          <Sheet>\n            <SheetTrigger asChild>\n              <Button variant=\"outline\">Menu</Button>\n            </SheetTrigger>\n            <SheetContent side=\"bottom\" className=\"h-[50vh]\">\n              <nav className=\"space-y-2 pt-4\">\n                {navItems.map(item => (\n                  <a key={item} href=\"#\" className=\"block px-3 py-2 rounded hover:bg-muted\">{item}</a>\n                ))}\n              </nav>\n            </SheetContent>\n          </Sheet>\n        </div>\n        <p>Main content. Sidebar on desktop, bottom sheet on mobile.</p>\n      </main>\n    </div>\n  );\n}","sd-1":"import {useState, useEffect} from 'react';\nimport {Card, CardContent, CardHeader, CardTitle} from '@/components/ui/card';\nimport {Skeleton} from '@/components/ui/skeleton';\nimport {Alert, AlertDescription} from '@/components/ui/alert';\nimport {Button} from '@/components/ui/button';\n\nexport default function DashboardWidget() {\n  const [state, setState] = useState<'loading' | 'error' | 'success'>('loading');\n  const [value, setValue] = useState(0);\n\n  useEffect(() => {\n    const timer = setTimeout(() => {\n      if (Math.random() > 0.7) setState('error');\n      else { setValue(42); setState('success'); }\n    }, 1500);\n    return () => clearTimeout(timer);\n  }, []);\n\n  return (\n    <Card>\n      <CardHeader><CardTitle>Active Users</CardTitle></CardHeader>\n      <CardContent>\n        {state === 'loading' && (\n          <div className=\"space-y-2\">\n            <Skeleton className=\"h-8 w-20\" />\n            <Skeleton className=\"h-4 w-32\" />\n          </div>\n        )}\n        {state === 'error' && (\n          <div className=\"space-y-2\">\n            <Alert variant=\"destructive\">\n              <AlertDescription>Failed to load data.</AlertDescription>\n            </Alert>\n            <Button variant=\"outline\" onClick={() => setState('loading')}>Retry</Button>\n          </div>\n        )}\n        {state === 'success' && (\n          <div>\n            <p className=\"text-3xl font-bold\">{value}</p>\n            <p className=\"text-muted-foreground\">Current active users</p>\n          </div>\n        )}\n      </CardContent>\n    </Card>\n  );\n}","tc-7":"import {ThemeProvider} from '@/components/ui/theme-provider';\n\nexport default function NestedThemes() {\n  return (\n    <div className=\"flex h-screen\">\n      <aside className=\"w-64 bg-slate-900 text-white p-4\">\n        <nav className=\"space-y-2\">\n          <a href=\"#\" className=\"block px-3 py-2 rounded bg-slate-800\">Dashboard</a>\n          <a href=\"#\" className=\"block px-3 py-2 rounded hover:bg-slate-800\">Analytics</a>\n          <a href=\"#\" className=\"block px-3 py-2 rounded hover:bg-slate-800\">Reports</a>\n        </nav>\n      </aside>\n      <main className=\"flex-1 p-6 bg-background\">\n        <h1 className=\"text-2xl font-bold mb-4\">Light Content Area</h1>\n        <div className=\"border rounded-lg p-4\">\n          <p className=\"text-muted-foreground\">\n            This area uses the light theme while the sidebar has a dark theme.\n            In shadcn, nested themes require separate ThemeProvider contexts or direct CSS class application.\n          </p>\n        </div>\n      </main>\n    </div>\n  );\n}","ty-9":"export default function ComparisonHeader() {\n  const plans = [\n    {name: 'Starter', price: '$9/mo', featured: false},\n    {name: 'Pro', price: '$29/mo', featured: false},\n    {name: 'Enterprise', price: '$99/mo', featured: true},\n  ];\n\n  return (\n    <div className=\"grid grid-cols-3 gap-4\">\n      {plans.map(plan => (\n        <div key={plan.name} className={`text-center p-6 rounded-lg ${plan.featured ? 'border-2 border-primary' : ''}`}>\n          <h2 className={`font-bold ${plan.featured ? 'text-4xl' : 'text-2xl'}`}>{plan.name}</h2>\n          <p className={`text-muted-foreground ${plan.featured ? 'text-xl mt-2' : 'mt-1'}`}>{plan.price}</p>\n        </div>\n      ))}\n    </div>\n  );\n}","wd-1":"import {useState} from 'react';\nimport {Card, CardContent, CardHeader, CardTitle} from '@/components/ui/card';\nimport {Button} from '@/components/ui/button';\nimport {Input} from '@/components/ui/input';\nimport {Label} from '@/components/ui/label';\nimport {RadioGroup, RadioGroupItem} from '@/components/ui/radio-group';\nimport {Separator} from '@/components/ui/separator';\nimport {Tabs, TabsContent, TabsList, TabsTrigger} from '@/components/ui/tabs';\n\nexport default function CheckoutFlow() {\n  const [step, setStep] = useState('cart');\n\n  return (\n    <Tabs value={step} onValueChange={setStep} className=\"w-full max-w-2xl\">\n      <TabsList className=\"grid w-full grid-cols-4\">\n        <TabsTrigger value=\"cart\">Cart</TabsTrigger>\n        <TabsTrigger value=\"shipping\">Shipping</TabsTrigger>\n        <TabsTrigger value=\"payment\">Payment</TabsTrigger>\n        <TabsTrigger value=\"confirmation\">Confirm</TabsTrigger>\n      </TabsList>\n      <TabsContent value=\"cart\">\n        <Card>\n          <CardHeader><CardTitle>Your Cart</CardTitle></CardHeader>\n          <CardContent className=\"space-y-4\">\n            <p>Cart items here</p>\n            <Separator />\n            <Button onClick={() => setStep('shipping')}>Continue</Button>\n          </CardContent>\n        </Card>\n      </TabsContent>\n      <TabsContent value=\"shipping\">\n        <Card>\n          <CardHeader><CardTitle>Shipping</CardTitle></CardHeader>\n          <CardContent className=\"space-y-4\">\n            <div className=\"space-y-2\">\n              <Label htmlFor=\"address\">Address</Label>\n              <Input id=\"address\" placeholder=\"123 Main St\" />\n            </div>\n            <RadioGroup defaultValue=\"standard\">\n              <div className=\"flex items-center space-x-2\">\n                <RadioGroupItem value=\"standard\" id=\"standard\" />\n                <Label htmlFor=\"standard\">Standard (5-7 days)</Label>\n              </div>\n              <div className=\"flex items-center space-x-2\">\n                <RadioGroupItem value=\"express\" id=\"express\" />\n                <Label htmlFor=\"express\">Express (2-3 days)</Label>\n              </div>\n            </RadioGroup>\n            <Button onClick={() => setStep('payment')}>Continue</Button>\n          </CardContent>\n        </Card>\n      </TabsContent>\n      <TabsContent value=\"payment\">\n        <Card>\n          <CardHeader><CardTitle>Payment</CardTitle></CardHeader>\n          <CardContent className=\"space-y-4\">\n            <div className=\"space-y-2\">\n              <Label htmlFor=\"card\">Card Number</Label>\n              <Input id=\"card\" placeholder=\"4242 4242 4242 4242\" />\n            </div>\n            <Button onClick={() => setStep('confirmation')}>Place Order</Button>\n          </CardContent>\n        </Card>\n      </TabsContent>\n      <TabsContent value=\"confirmation\">\n        <Card>\n          <CardHeader><CardTitle>Order Confirmed!</CardTitle></CardHeader>\n          <CardContent>\n            <p>Thank you for your purchase.</p>\n          </CardContent>\n        </Card>\n      </TabsContent>\n    </Tabs>\n  );\n}"},"htmlSourceCode":{"cwm-2":"import {useState} from 'react';\n\nconst labels = [\n  {name: 'bug', color: '#d73a4a'},\n  {name: 'enhancement', color: '#a2eeef'},\n  {name: 'documentation', color: '#0075ca'},\n  {name: 'good first issue', color: '#7057ff'},\n  {name: 'help wanted', color: '#008672'},\n];\n\nexport default function LabelPicker() {\n  const [query, setQuery] = useState('');\n  const [selected, setSelected] = useState<typeof labels>([]);\n  const [isOpen, setIsOpen] = useState(false);\n\n  const filtered = labels.filter(l => l.name.includes(query.toLowerCase()) && !selected.some(s => s.name === l.name));\n\n  return (\n    <div style={{maxWidth: 400}}>\n      <div style={{position: 'relative'}}>\n        <input\n          value={query}\n          onChange={e => { setQuery(e.target.value); setIsOpen(true); }}\n          onFocus={() => setIsOpen(true)}\n          placeholder=\"Search labels...\"\n          style={{width: '100%', padding: '8px 12px', border: '1px solid #ccc', borderRadius: 6}}\n        />\n        {isOpen && filtered.length > 0 && (\n          <ul style={{position: 'absolute', top: '100%', left: 0, right: 0, background: 'white', border: '1px solid #ccc', borderRadius: 6, listStyle: 'none', padding: 4, margin: 0, zIndex: 10}}>\n            {filtered.map(label => (\n              <li key={label.name} onClick={() => { setSelected(p => [...p, label]); setQuery(''); setIsOpen(false); }}\n                style={{padding: '6px 8px', cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 8, borderRadius: 4}}>\n                <span style={{width: 12, height: 12, borderRadius: '50%', backgroundColor: label.color}} />\n                {label.name}\n              </li>\n            ))}\n          </ul>\n        )}\n      </div>\n      <div style={{display: 'flex', flexWrap: 'wrap', gap: 8, marginTop: 12}}>\n        {selected.map(label => (\n          <span key={label.name} style={{display: 'flex', alignItems: 'center', gap: 4, padding: '2px 8px', borderRadius: 12, background: '#f0f0f0', fontSize: 13}}>\n            <span style={{width: 8, height: 8, borderRadius: '50%', backgroundColor: label.color}} />\n            {label.name}\n          </span>\n        ))}\n      </div>\n    </div>\n  );\n}","dd-5":"import {useState} from 'react';\n\nconst emails = [\n  {id: '1', sender: 'Alice', subject: 'Project Update', date: '2024-01-15', preview: 'Sprint results...'},\n  {id: '2', sender: 'Bob', subject: 'Meeting', date: '2024-01-14', preview: 'Reschedule?'},\n  {id: '3', sender: 'Carol', subject: 'Design Review', date: '2024-01-13', preview: 'Mockups...'},\n  {id: '4', sender: 'Dave', subject: 'Invoice', date: '2024-01-12', preview: 'Attached...'},\n];\n\nexport default function EmailInbox() {\n  const [selected, setSelected] = useState<Set<string>>(new Set());\n  const toggle = (id: string) => setSelected(prev => {\n    const next = new Set(prev);\n    next.has(id) ? next.delete(id) : next.add(id);\n    return next;\n  });\n\n  return (\n    <div>\n      {selected.size > 0 && (\n        <div style={{padding: 8, background: '#f5f5f5', borderRadius: 6, marginBottom: 12, display: 'flex', alignItems: 'center', gap: 12}}>\n          <span>{selected.size} selected</span>\n          <button style={{padding: '4px 8px', border: '1px solid #ccc', borderRadius: 4}}>Archive</button>\n          <button style={{padding: '4px 8px', border: '1px solid #ccc', borderRadius: 4}}>Delete</button>\n        </div>\n      )}\n      <table style={{width: '100%', borderCollapse: 'collapse'}}>\n        <thead>\n          <tr style={{borderBottom: '1px solid #eee'}}>\n            <th style={{width: 40, padding: 8}}><input type=\"checkbox\" onChange={() => {\n              selected.size === emails.length ? setSelected(new Set()) : setSelected(new Set(emails.map(e => e.id)));\n            }} /></th>\n            <th style={{padding: 8, textAlign: 'left'}}>Sender</th>\n            <th style={{padding: 8, textAlign: 'left'}}>Subject</th>\n            <th style={{padding: 8, textAlign: 'left'}}>Date</th>\n            <th style={{padding: 8, textAlign: 'left'}}>Preview</th>\n          </tr>\n        </thead>\n        <tbody>\n          {emails.map(e => (\n            <tr key={e.id} style={{borderBottom: '1px solid #f0f0f0'}}>\n              <td style={{padding: 8}}><input type=\"checkbox\" checked={selected.has(e.id)} onChange={() => toggle(e.id)} /></td>\n              <td style={{padding: 8}}>{e.sender}</td>\n              <td style={{padding: 8}}>{e.subject}</td>\n              <td style={{padding: 8}}>{e.date}</td>\n              <td style={{padding: 8, color: '#888'}}>{e.preview}</td>\n            </tr>\n          ))}\n        </tbody>\n      </table>\n    </div>\n  );\n}","fwc-8":"import {useState} from 'react';\n\nexport default function HotelDatePicker() {\n  const [checkIn, setCheckIn] = useState('');\n  const [checkOut, setCheckOut] = useState('');\n  const today = new Date().toISOString().split('T')[0];\n\n  return (\n    <div style={{display: 'flex', flexDirection: 'column', gap: 16, maxWidth: 400}}>\n      <h2 style={{margin: 0, fontSize: 18, fontWeight: 600}}>Book Your Stay</h2>\n      <div style={{display: 'flex', gap: 12}}>\n        <div style={{flex: 1}}>\n          <label style={{display: 'block', marginBottom: 4, fontSize: 14}}>Check-in</label>\n          <input\n            type=\"date\"\n            value={checkIn}\n            min={today}\n            onChange={e => setCheckIn(e.target.value)}\n            style={{width: '100%', padding: '8px 12px', border: '1px solid #ccc', borderRadius: 6}}\n          />\n        </div>\n        <div style={{flex: 1}}>\n          <label style={{display: 'block', marginBottom: 4, fontSize: 14}}>Check-out</label>\n          <input\n            type=\"date\"\n            value={checkOut}\n            min={checkIn || today}\n            onChange={e => setCheckOut(e.target.value)}\n            style={{width: '100%', padding: '8px 12px', border: '1px solid #ccc', borderRadius: 6}}\n          />\n        </div>\n      </div>\n    </div>\n  );\n}","io-2":"import {useState, useEffect} from 'react';\n\nexport default function AutocompleteInput() {\n  const [query, setQuery] = useState('');\n  const [results, setResults] = useState<string[]>([]);\n  const [isOpen, setIsOpen] = useState(false);\n\n  useEffect(() => {\n    if (!query) { setResults([]); return; }\n    const timer = setTimeout(() => {\n      fetch(`/api/suggest?q=${encodeURIComponent(query)}`)\n        .then(r => r.json())\n        .then(d => setResults(d.suggestions || []))\n        .catch(() => setResults([]));\n    }, 300);\n    return () => clearTimeout(timer);\n  }, [query]);\n\n  return (\n    <div style={{position: 'relative', maxWidth: 400}}>\n      <input\n        value={query}\n        onChange={e => { setQuery(e.target.value); setIsOpen(true); }}\n        placeholder=\"Type to search...\"\n        style={{width: '100%', padding: '8px 12px', border: '1px solid #ccc', borderRadius: 6}}\n      />\n      {isOpen && results.length > 0 && (\n        <ul style={{position: 'absolute', top: '100%', left: 0, right: 0, background: 'white', border: '1px solid #ccc', borderRadius: 6, listStyle: 'none', padding: 4, margin: '4px 0 0', zIndex: 10}}>\n          {results.map(r => (\n            <li key={r} onClick={() => { setQuery(r); setIsOpen(false); }}\n              style={{padding: '6px 8px', cursor: 'pointer', borderRadius: 4}}>{r}</li>\n          ))}\n        </ul>\n      )}\n    </div>\n  );\n}","ps-1":"export default function SettingsDashboard() {\n  const navItems = ['General', 'Account', 'Notifications', 'Security', 'Integrations'];\n\n  return (\n    <div style={{display: 'flex', flexDirection: 'column', height: '100vh'}}>\n      <header style={{height: 56, borderBottom: '1px solid #eee', display: 'flex', alignItems: 'center', padding: '0 16px'}}>\n        <h1 style={{fontSize: 18, fontWeight: 600, margin: 0}}>My App</h1>\n      </header>\n      <div style={{display: 'flex', flex: 1}}>\n        <aside style={{width: 240, borderRight: '1px solid #eee', padding: 16}}>\n          <nav>\n            {navItems.map((item, i) => (\n              <a key={item} href=\"#\" style={{display: 'block', padding: '8px 12px', borderRadius: 6, textDecoration: 'none', color: '#333', background: i === 0 ? '#f0f0f0' : 'transparent', fontWeight: i === 0 ? 600 : 400}}>{item}</a>\n            ))}\n          </nav>\n        </aside>\n        <main style={{flex: 1, padding: 24}}>\n          <h2 style={{fontSize: 24, fontWeight: 700, marginTop: 0}}>General Settings</h2>\n          <div style={{border: '1px solid #eee', borderRadius: 8, padding: 16, marginTop: 16}}>\n            <h3 style={{margin: '0 0 4px'}}>Application Name</h3>\n            <p style={{margin: 0, color: '#666'}}>Configure your preferences.</p>\n          </div>\n          <div style={{border: '1px solid #eee', borderRadius: 8, padding: 16, marginTop: 12}}>\n            <h3 style={{margin: '0 0 4px'}}>Language</h3>\n            <p style={{margin: 0, color: '#666'}}>Choose your preferred language.</p>\n          </div>\n        </main>\n      </div>\n    </div>\n  );\n}","rc-2":"import {useState} from 'react';\n\nconst navItems = ['Home', 'Dashboard', 'Projects', 'Account', 'Settings'];\n\nexport default function ResponsiveNav() {\n  const [isSheetOpen, setIsSheetOpen] = useState(false);\n\n  return (\n    <div style={{display: 'flex', height: '100vh'}}>\n      <aside style={{width: 240, borderRight: '1px solid #eee', padding: 16, display: 'none'}} className=\"desktop-only\">\n        <nav>\n          {navItems.map(item => (\n            <a key={item} href=\"#\" style={{display: 'block', padding: '8px 12px', textDecoration: 'none', color: '#333', borderRadius: 4}}>{item}</a>\n          ))}\n        </nav>\n      </aside>\n      <main style={{flex: 1, padding: 24}}>\n        <button onClick={() => setIsSheetOpen(true)} style={{padding: '8px 16px', border: '1px solid #ccc', borderRadius: 6, marginBottom: 16}}>Menu</button>\n        <p>Main content. Sidebar on desktop, bottom sheet on mobile.</p>\n      </main>\n      {isSheetOpen && (\n        <>\n          <div onClick={() => setIsSheetOpen(false)} style={{position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.3)', zIndex: 100}} />\n          <div style={{position: 'fixed', bottom: 0, left: 0, right: 0, background: 'white', borderTopLeftRadius: 12, borderTopRightRadius: 12, padding: 24, zIndex: 101, maxHeight: '50vh'}}>\n            <nav>\n              {navItems.map(item => (\n                <a key={item} href=\"#\" style={{display: 'block', padding: '12px 16px', textDecoration: 'none', color: '#333'}}>{item}</a>\n              ))}\n            </nav>\n          </div>\n        </>\n      )}\n    </div>\n  );\n}","sd-1":"import {useState, useEffect} from 'react';\n\nexport default function DashboardWidget() {\n  const [state, setState] = useState<'loading' | 'error' | 'success'>('loading');\n\n  useEffect(() => {\n    const timer = setTimeout(() => {\n      Math.random() > 0.7 ? setState('error') : setState('success');\n    }, 1500);\n    return () => clearTimeout(timer);\n  }, []);\n\n  return (\n    <div style={{border: '1px solid #eee', borderRadius: 8, padding: 24, maxWidth: 300}}>\n      <h3 style={{margin: '0 0 12px', fontSize: 14, color: '#666'}}>Active Users</h3>\n      {state === 'loading' && (\n        <div>\n          <div style={{width: 80, height: 32, background: '#f0f0f0', borderRadius: 4, animation: 'pulse 1.5s infinite'}} />\n          <div style={{width: 120, height: 16, background: '#f0f0f0', borderRadius: 4, marginTop: 8}} />\n        </div>\n      )}\n      {state === 'error' && (\n        <div>\n          <p style={{color: '#dc3545', margin: '0 0 8px'}}>Failed to load data.</p>\n          <button onClick={() => setState('loading')} style={{padding: '4px 12px', border: '1px solid #ccc', borderRadius: 4, cursor: 'pointer'}}>Retry</button>\n        </div>\n      )}\n      {state === 'success' && (\n        <div>\n          <p style={{fontSize: 36, fontWeight: 700, margin: 0}}>42</p>\n          <p style={{color: '#666', margin: '4px 0 0'}}>Current active users</p>\n        </div>\n      )}\n    </div>\n  );\n}","tc-7":"export default function NestedThemes() {\n  return (\n    <div style={{display: 'flex', height: '100vh'}}>\n      <aside style={{width: 240, backgroundColor: '#1a1a2e', color: 'white', padding: 16}}>\n        <nav>\n          <a href=\"#\" style={{display: 'block', padding: '8px 12px', borderRadius: 6, color: 'white', textDecoration: 'none', background: 'rgba(255,255,255,0.1)', marginBottom: 4}}>Dashboard</a>\n          <a href=\"#\" style={{display: 'block', padding: '8px 12px', borderRadius: 6, color: '#ccc', textDecoration: 'none', marginBottom: 4}}>Analytics</a>\n          <a href=\"#\" style={{display: 'block', padding: '8px 12px', borderRadius: 6, color: '#ccc', textDecoration: 'none'}}>Reports</a>\n        </nav>\n      </aside>\n      <main style={{flex: 1, padding: 24, backgroundColor: '#fff'}}>\n        <h1 style={{fontSize: 24, fontWeight: 700, marginTop: 0}}>Light Content Area</h1>\n        <div style={{border: '1px solid #eee', borderRadius: 8, padding: 16}}>\n          <p style={{color: '#666', margin: 0}}>This content uses the light theme while the sidebar has a dark theme.</p>\n        </div>\n      </main>\n    </div>\n  );\n}","ty-9":"export default function ComparisonHeader() {\n  const plans = [\n    {name: 'Starter', price: '$9/mo', featured: false},\n    {name: 'Pro', price: '$29/mo', featured: false},\n    {name: 'Enterprise', price: '$99/mo', featured: true},\n  ];\n\n  return (\n    <div style={{display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 16}}>\n      {plans.map(plan => (\n        <div key={plan.name} style={{textAlign: 'center', padding: 24, borderRadius: 8, border: plan.featured ? '2px solid #0066cc' : '1px solid #eee'}}>\n          <h2 style={{margin: 0, fontSize: plan.featured ? 36 : 24, fontWeight: 700}}>{plan.name}</h2>\n          <p style={{margin: '8px 0 0', color: '#666', fontSize: plan.featured ? 20 : 16}}>{plan.price}</p>\n        </div>\n      ))}\n    </div>\n  );\n}","wd-1":"import {useState} from 'react';\n\ntype Step = 'cart' | 'shipping' | 'payment' | 'confirmation';\n\nexport default function CheckoutFlow() {\n  const [step, setStep] = useState<Step>('cart');\n\n  const tabStyle = (s: Step) => ({\n    padding: '8px 16px',\n    border: 'none',\n    borderBottom: step === s ? '2px solid #0066cc' : '2px solid transparent',\n    background: 'none',\n    cursor: 'pointer',\n    fontWeight: step === s ? 600 : 400,\n  });\n\n  return (\n    <div style={{maxWidth: 600}}>\n      <div style={{display: 'flex', borderBottom: '1px solid #eee', marginBottom: 24}}>\n        {(['cart', 'shipping', 'payment', 'confirmation'] as Step[]).map(s => (\n          <button key={s} style={tabStyle(s)} onClick={() => setStep(s)}>\n            {s.charAt(0).toUpperCase() + s.slice(1)}\n          </button>\n        ))}\n      </div>\n      <div style={{padding: 16, border: '1px solid #eee', borderRadius: 8}}>\n        {step === 'cart' && (\n          <div>\n            <p>Your cart items</p>\n            <button onClick={() => setStep('shipping')} style={{marginTop: 16, padding: '8px 16px', background: '#0066cc', color: 'white', border: 'none', borderRadius: 6, cursor: 'pointer'}}>Continue</button>\n          </div>\n        )}\n        {step === 'shipping' && (\n          <div style={{display: 'flex', flexDirection: 'column', gap: 12}}>\n            <input placeholder=\"Address\" style={{padding: 8, border: '1px solid #ccc', borderRadius: 4}} />\n            <input placeholder=\"City\" style={{padding: 8, border: '1px solid #ccc', borderRadius: 4}} />\n            <button onClick={() => setStep('payment')} style={{padding: '8px 16px', background: '#0066cc', color: 'white', border: 'none', borderRadius: 6, cursor: 'pointer'}}>Continue</button>\n          </div>\n        )}\n        {step === 'payment' && (\n          <div style={{display: 'flex', flexDirection: 'column', gap: 12}}>\n            <input placeholder=\"Card number\" style={{padding: 8, border: '1px solid #ccc', borderRadius: 4}} />\n            <button onClick={() => setStep('confirmation')} style={{padding: '8px 16px', background: '#0066cc', color: 'white', border: 'none', borderRadius: 6, cursor: 'pointer'}}>Place Order</button>\n          </div>\n        )}\n        {step === 'confirmation' && <p>Order confirmed! Thank you.</p>}\n      </div>\n    </div>\n  );\n}"},"astryxTailwindSourceCode":{"cwm-2":"import {useState} from 'react';\nimport {Typeahead} from '@astryxdesign/core/Typeahead';\nimport {Badge} from '@astryxdesign/core/Badge';\nimport {Stack} from '@astryxdesign/core/Stack';\nimport stylex from '@stylexjs/stylex';\n// Tailwind available for utility layout\n\nconst styles = stylex.create({\n  container: {\n    maxWidth: 400,\n  },\n  labelList: {\n    display: 'flex',\n    flexWrap: 'wrap',\n    gap: 8,\n  },\n  colorDot: {\n    width: 12,\n    height: 12,\n    borderRadius: '50%',\n    display: 'inline-block',\n  },\n});\n\ntype Label = {name: string; color: string};\n\nconst LABELS: Label[] = [\n  {name: 'bug', color: '#d73a4a'},\n  {name: 'enhancement', color: '#a2eeef'},\n  {name: 'documentation', color: '#0075ca'},\n  {name: 'good first issue', color: '#7057ff'},\n  {name: 'help wanted', color: '#008672'},\n  {name: 'question', color: '#d876e3'},\n];\n\nexport default function LabelPicker() {\n  const [selected, setSelected] = useState<Label[]>([]);\n  const [current, setCurrent] = useState<Label | null>(null);\n\n  const searchSource = {\n    search: (query: string) =>\n      LABELS.filter(l => l.name.toLowerCase().includes(query.toLowerCase()))\n        .filter(l => !selected.some(s => s.name === l.name)),\n    bootstrap: () => LABELS.filter(l => !selected.some(s => s.name === l.name)),\n  };\n\n  return (\n    <Stack gap={3} xstyle={styles.container}>\n      <Typeahead\n        label=\"Add label\"\n        searchSource={searchSource}\n        value={current}\n        onChange={(item) => {\n          if (item) {\n            setSelected(prev => [...prev, item]);\n            setCurrent(null);\n          }\n        }}\n        placeholder=\"Search labels...\"\n        hasEntriesOnFocus\n        renderItem={(item) => (\n          <Stack gap={2} direction=\"horizontal\" align=\"center\">\n            <span {...stylex.props(styles.colorDot)} style={{backgroundColor: item.color}} />\n            {item.name}\n          </Stack>\n        )}\n      />\n      <div {...stylex.props(styles.labelList)}>\n        {selected.map(label => (\n          <Badge key={label.name} color=\"neutral\">\n            <span {...stylex.props(styles.colorDot)} style={{backgroundColor: label.color}} />\n            {label.name}\n          </Badge>\n        ))}\n      </div>\n    </Stack>\n  );\n}","dd-5":"import {useState} from 'react';\nimport {Table} from '@astryxdesign/core/Table';\nimport {CheckboxInput} from '@astryxdesign/core/CheckboxInput';\nimport {Button} from '@astryxdesign/core/Button';\nimport {ButtonGroup} from '@astryxdesign/core/ButtonGroup';\nimport {Stack} from '@astryxdesign/core/Stack';\nimport {Text} from '@astryxdesign/core/Text';\nimport stylex from '@stylexjs/stylex';\n// Tailwind available for utility layout\n\nconst styles = stylex.create({\n  bulkBar: {\n    padding: 8,\n    backgroundColor: 'var(--color-background-wash)',\n    borderRadius: 8,\n  },\n});\n\ninterface Email {\n  id: string;\n  sender: string;\n  subject: string;\n  date: string;\n  preview: string;\n  [key: string]: unknown;\n}\n\nconst emails: Email[] = [\n  {id: '1', sender: 'Alice Smith', subject: 'Project Update', date: '2024-01-15', preview: 'The latest sprint results are in...'},\n  {id: '2', sender: 'Bob Chen', subject: 'Meeting Tomorrow', date: '2024-01-14', preview: 'Can we reschedule to 3pm?'},\n  {id: '3', sender: 'Carol Davis', subject: 'Design Review', date: '2024-01-13', preview: 'Attached are the mockups for...'},\n  {id: '4', sender: 'Dave Wilson', subject: 'Invoice #4521', date: '2024-01-12', preview: 'Please find attached the invoice...'},\n  {id: '5', sender: 'Eve Taylor', subject: 'Welcome aboard!', date: '2024-01-11', preview: 'We are excited to have you join...'},\n];\n\nexport default function EmailInbox() {\n  const [selectedIds, setSelectedIds] = useState<Set<string>>(new Set());\n\n  const toggleSelection = (id: string) => {\n    setSelectedIds(prev => {\n      const next = new Set(prev);\n      if (next.has(id)) next.delete(id);\n      else next.add(id);\n      return next;\n    });\n  };\n\n  const toggleAll = () => {\n    if (selectedIds.size === emails.length) {\n      setSelectedIds(new Set());\n    } else {\n      setSelectedIds(new Set(emails.map(e => e.id)));\n    }\n  };\n\n  return (\n    <Stack gap={3}>\n      {selectedIds.size > 0 && (\n        <div {...stylex.props(styles.bulkBar)}>\n          <Stack direction=\"horizontal\" gap={2} align=\"center\">\n            <Text>{selectedIds.size} selected</Text>\n            <ButtonGroup>\n              <Button variant=\"outlined\" size=\"sm\" onPress={() => {}}>Archive</Button>\n              <Button variant=\"outlined\" size=\"sm\" onPress={() => {}}>Delete</Button>\n              <Button variant=\"outlined\" size=\"sm\" onPress={() => {}}>Mark Read</Button>\n            </ButtonGroup>\n          </Stack>\n        </div>\n      )}\n      <Table\n        data={emails}\n        idKey=\"id\"\n        hasHover\n        columns={[\n          {\n            key: 'select',\n            header: '',\n            width: {type: 'pixel', value: 40},\n            renderCell: (row) => (\n              <CheckboxInput\n                label=\"Select\"\n                isLabelHidden\n                isChecked={selectedIds.has(row.id)}\n                onChange={() => toggleSelection(row.id)}\n              />\n            ),\n          },\n          {key: 'sender', header: 'Sender'},\n          {key: 'subject', header: 'Subject'},\n          {key: 'date', header: 'Date'},\n          {key: 'preview', header: 'Preview'},\n        ]}\n      />\n    </Stack>\n  );\n}","fwc-8":"import {DateRangeInput} from '@astryxdesign/core/DateRangeInput';\nimport {useState} from 'react';\n\ntype DateRange = {start: string; end: string};\n\nexport default function HotelDatePicker() {\n  const [range, setRange] = useState<DateRange | null>(null);\n  const today = new Date().toISOString().split('T')[0];\n\n  return (\n    <DateRangeInput\n      label=\"Stay dates\"\n      description=\"Select your check-in and check-out dates\"\n      value={range}\n      onChange={setRange}\n      min={today}\n      placeholder=\"Select dates\"\n      size=\"md\"\n    />\n  );\n}","io-2":"import {useState} from 'react';\nimport {Typeahead} from '@astryxdesign/core/Typeahead';\n\ntype Suggestion = {id: string; label: string};\n\nfunction createSearchSource() {\n  return {\n    search: async (query: string): Promise<Suggestion[]> => {\n      const response = await fetch(\n        `https://api.example.com/suggest?q=${encodeURIComponent(query)}`\n      );\n      const data = await response.json();\n      return data.results.map((r: {id: string; name: string}) => ({\n        id: r.id,\n        label: r.name,\n      }));\n    },\n    bootstrap: () => [] as Suggestion[],\n  };\n}\n\nexport default function AutocompleteInput() {\n  const [value, setValue] = useState<Suggestion | null>(null);\n  const searchSource = createSearchSource();\n\n  return (\n    <Typeahead\n      label=\"Search\"\n      searchSource={searchSource}\n      value={value}\n      onChange={setValue}\n      placeholder=\"Type to search...\"\n      debounceMs={300}\n      emptySearchResultsText=\"No results found\"\n      renderItem={(item) => item.label}\n    />\n  );\n}","ps-1":"import {AppShell} from '@astryxdesign/core/AppShell';\nimport {TopNav} from '@astryxdesign/core/TopNav';\nimport {TopNavHeading} from '@astryxdesign/core/TopNav';\nimport {SideNav} from '@astryxdesign/core/SideNav';\nimport {SideNavItem} from '@astryxdesign/core/SideNav';\nimport {SideNavSection} from '@astryxdesign/core/SideNav';\nimport {Text} from '@astryxdesign/core/Text';\nimport {Stack} from '@astryxdesign/core/Stack';\nimport {Card} from '@astryxdesign/core/Card';\nimport {Theme} from '@astryxdesign/core/theme';\n\nexport default function SettingsDashboard() {\n  return (\n    <AppShell\n      topNav={\n        <TopNav>\n          <TopNavHeading>My App</TopNavHeading>\n        </TopNav>\n      }\n      sideNav={\n        <SideNav>\n          <SideNavSection label=\"Settings\">\n            <SideNavItem label=\"General\" isSelected />\n            <SideNavItem label=\"Account\" />\n            <SideNavItem label=\"Notifications\" />\n            <SideNavItem label=\"Security\" />\n            <SideNavItem label=\"Integrations\" />\n          </SideNavSection>\n        </SideNav>\n      }\n      contentPadding={4}\n    >\n      <Stack gap={4}>\n        <Text variant=\"heading\">General Settings</Text>\n        <Card>\n          <Stack gap={2}>\n            <Text weight=\"bold\">Application Name</Text>\n            <Text color=\"secondary\">Configure your application preferences.</Text>\n          </Stack>\n        </Card>\n        <Card>\n          <Stack gap={2}>\n            <Text weight=\"bold\">Language</Text>\n            <Text color=\"secondary\">Choose your preferred language for the interface.</Text>\n          </Stack>\n        </Card>\n      </Stack>\n    </AppShell>\n  );\n}","rc-2":"import {SideNav} from '@astryxdesign/core/SideNav';\nimport {SideNavItem} from '@astryxdesign/core/SideNav';\nimport {SideNavSection} from '@astryxdesign/core/SideNav';\nimport {MobileNav} from '@astryxdesign/core/MobileNav';\nimport {AppShell} from '@astryxdesign/core/AppShell';\nimport {Text} from '@astryxdesign/core/Text';\n\nexport default function ResponsiveNav() {\n  return (\n    <AppShell\n      sideNav={\n        <SideNav>\n          <SideNavSection label=\"Main\">\n            <SideNavItem label=\"Home\" isSelected />\n            <SideNavItem label=\"Dashboard\" />\n            <SideNavItem label=\"Projects\" />\n          </SideNavSection>\n          <SideNavSection label=\"Settings\">\n            <SideNavItem label=\"Account\" />\n            <SideNavItem label=\"Preferences\" />\n          </SideNavSection>\n        </SideNav>\n      }\n      mobileNav={\n        <MobileNav>\n          <SideNavItem label=\"Home\" isSelected />\n          <SideNavItem label=\"Dashboard\" />\n          <SideNavItem label=\"Projects\" />\n          <SideNavItem label=\"Account\" />\n          <SideNavItem label=\"Preferences\" />\n        </MobileNav>\n      }\n    >\n      <Text>Main content area. The sidebar becomes a bottom sheet on mobile.</Text>\n    </AppShell>\n  );\n}","sd-1":"import {useState, useEffect} from 'react';\nimport {Card} from '@astryxdesign/core/Card';\nimport {Spinner} from '@astryxdesign/core/Spinner';\nimport {Text} from '@astryxdesign/core/Text';\nimport {Banner} from '@astryxdesign/core/Banner';\nimport {Stack} from '@astryxdesign/core/Stack';\nimport {Button} from '@astryxdesign/core/Button';\n\ntype State = 'loading' | 'error' | 'success';\ntype Data = {value: number; label: string};\n\nexport default function DashboardWidget() {\n  const [state, setState] = useState<State>('loading');\n  const [data, setData] = useState<Data | null>(null);\n\n  useEffect(() => {\n    const timer = setTimeout(() => {\n      const shouldError = Math.random() > 0.7;\n      if (shouldError) {\n        setState('error');\n      } else {\n        setData({value: 42, label: 'Active Users'});\n        setState('success');\n      }\n    }, 1500);\n    return () => clearTimeout(timer);\n  }, []);\n\n  return (\n    <Card>\n      <Stack gap={3}>\n        {state === 'loading' && <Spinner label=\"Loading dashboard data...\" />}\n        {state === 'error' && (\n          <Stack gap={2}>\n            <Banner variant=\"error\">Failed to load data. Please try again.</Banner>\n            <Button variant=\"outlined\" onPress={() => setState('loading')}>\n              Retry\n            </Button>\n          </Stack>\n        )}\n        {state === 'success' && data && (\n          <Stack gap={1}>\n            <Text variant=\"display\">{data.value}</Text>\n            <Text color=\"secondary\">{data.label}</Text>\n          </Stack>\n        )}\n      </Stack>\n    </Card>\n  );\n}","tc-7":"import {Theme} from '@astryxdesign/core/theme';\nimport {AppShell} from '@astryxdesign/core/AppShell';\nimport {SideNav} from '@astryxdesign/core/SideNav';\nimport {SideNavItem} from '@astryxdesign/core/SideNav';\nimport {SideNavSection} from '@astryxdesign/core/SideNav';\nimport {Text} from '@astryxdesign/core/Text';\nimport {Stack} from '@astryxdesign/core/Stack';\nimport {Card} from '@astryxdesign/core/Card';\nimport {defineTheme} from '@astryxdesign/core/theme';\n\nconst darkSidebarTheme = defineTheme({\n  tokens: {\n    '--color-background-surface': '#1a1a2e',\n    '--color-text-primary': '#ffffff',\n    '--color-text-secondary': '#a0a0b0',\n  },\n});\n\nexport default function NestedThemeLayout() {\n  return (\n    <AppShell\n      sideNav={\n        <Theme theme={darkSidebarTheme} mode=\"dark\">\n          <SideNav>\n            <SideNavSection label=\"Navigation\">\n              <SideNavItem label=\"Dashboard\" isSelected />\n              <SideNavItem label=\"Analytics\" />\n              <SideNavItem label=\"Reports\" />\n            </SideNavSection>\n          </SideNav>\n        </Theme>\n      }\n      contentPadding={4}\n    >\n      <Stack gap={4}>\n        <Text variant=\"heading\">Light Content Area</Text>\n        <Card>\n          <Text>This content uses the default light theme while the sidebar has a dark theme applied via nested Theme provider.</Text>\n        </Card>\n      </Stack>\n    </AppShell>\n  );\n}","ty-9":"import {Text} from '@astryxdesign/core/Text';\nimport {Stack} from '@astryxdesign/core/Stack';\nimport {Grid} from '@astryxdesign/core/Grid';\nimport stylex from '@stylexjs/stylex';\n// Tailwind available for utility layout\n\nconst styles = stylex.create({\n  columnHeader: {\n    textAlign: 'center',\n    padding: 16,\n  },\n  featured: {\n    borderWidth: 2,\n    borderStyle: 'solid',\n    borderColor: 'var(--color-accent)',\n    borderRadius: 8,\n    padding: 24,\n  },\n  regular: {\n    padding: 24,\n  },\n});\n\ninterface Plan {\n  name: string;\n  price: string;\n  isFeatured?: boolean;\n}\n\nconst plans: Plan[] = [\n  {name: 'Starter', price: '$9/mo'},\n  {name: 'Pro', price: '$29/mo'},\n  {name: 'Enterprise', price: '$99/mo', isFeatured: true},\n];\n\nexport default function ComparisonHeader() {\n  return (\n    <Grid columns={3} gap={4}>\n      {plans.map(plan => (\n        <div key={plan.name} {...stylex.props(plan.isFeatured ? styles.featured : styles.regular)}>\n          <Stack gap={2} align=\"center\">\n            {plan.isFeatured ? (\n              <Text variant=\"display\" size=\"lg\">{plan.name}</Text>\n            ) : (\n              <Text variant=\"heading\" size=\"md\">{plan.name}</Text>\n            )}\n            <Text color=\"secondary\" size={plan.isFeatured ? 'lg' : 'md'}>\n              {plan.price}\n            </Text>\n          </Stack>\n        </div>\n      ))}\n    </Grid>\n  );\n}","wd-1":"import {useState} from 'react';\nimport {Card} from '@astryxdesign/core/Card';\nimport {Button} from '@astryxdesign/core/Button';\nimport {Text} from '@astryxdesign/core/Text';\nimport {Stack} from '@astryxdesign/core/Stack';\nimport {TabList} from '@astryxdesign/core/TabList';\nimport {Tab} from '@astryxdesign/core/TabList';\nimport {Divider} from '@astryxdesign/core/Divider';\nimport {TextInput} from '@astryxdesign/core/TextInput';\nimport {RadioList} from '@astryxdesign/core/RadioList';\nimport {RadioListItem} from '@astryxdesign/core/RadioList';\n\ntype Step = 'cart' | 'shipping' | 'payment' | 'confirmation';\n\nexport default function CheckoutFlow() {\n  const [step, setStep] = useState<Step>('cart');\n  const [shippingMethod, setShippingMethod] = useState('standard');\n\n  return (\n    <Stack gap={4}>\n      <TabList value={step} onChange={(v) => setStep(v as Step)}>\n        <Tab value=\"cart\">Cart</Tab>\n        <Tab value=\"shipping\">Shipping</Tab>\n        <Tab value=\"payment\">Payment</Tab>\n        <Tab value=\"confirmation\">Confirmation</Tab>\n      </TabList>\n      <Card>\n        {step === 'cart' && (\n          <Stack gap={3}>\n            <Text>Your cart items will appear here.</Text>\n            <Divider />\n            <Button variant=\"filled\" onPress={() => setStep('shipping')}>\n              Continue to Shipping\n            </Button>\n          </Stack>\n        )}\n        {step === 'shipping' && (\n          <Stack gap={3}>\n            <TextInput label=\"Address\" value=\"\" onChange={() => {}} />\n            <TextInput label=\"City\" value=\"\" onChange={() => {}} />\n            <RadioList label=\"Shipping method\" value={shippingMethod} onChange={setShippingMethod}>\n              <RadioListItem value=\"standard\">Standard (5-7 days)</RadioListItem>\n              <RadioListItem value=\"express\">Express (2-3 days)</RadioListItem>\n            </RadioList>\n            <Button variant=\"filled\" onPress={() => setStep('payment')}>\n              Continue to Payment\n            </Button>\n          </Stack>\n        )}\n        {step === 'payment' && (\n          <Stack gap={3}>\n            <TextInput label=\"Card number\" value=\"\" onChange={() => {}} />\n            <TextInput label=\"Expiry\" value=\"\" onChange={() => {}} />\n            <Button variant=\"filled\" onPress={() => setStep('confirmation')}>\n              Place Order\n            </Button>\n          </Stack>\n        )}\n        {step === 'confirmation' && (\n          <Stack gap={3}>\n            <Text>Order confirmed! Thank you for your purchase.</Text>\n          </Stack>\n        )}\n      </Card>\n    </Stack>\n  );\n}"},"previews":{"tc-7":{"baseline":"previews/tc-7/baseline.html","html":"previews/tc-7/html.html"},"ty-9":{"baseline":"previews/ty-9/baseline.html","html":"previews/ty-9/html.html"},"ps-1":{"html":"previews/ps-1/html.html"}},"prompts":{"fwc-8":"Create a date range picker for booking a hotel stay. Users should pick check-in and check-out dates. Past dates should be disabled.","wd-1":"Build a checkout flow: cart summary → shipping → payment → confirmation","cwm-2":"A GitHub-style issue label picker with color dots and search","sd-1":"Show a dashboard widget with loading → error → data states","dd-5":"Build an email inbox view with a table showing sender, subject, date, and a preview snippet. Add row selection with checkboxes and a bulk actions bar that appears when items are selected.","rc-2":"A sidebar that becomes a bottom sheet on mobile","io-2":"An autocomplete input that fetches suggestions from an API as you type","ps-1":"Create a new page for a settings dashboard. It should have a header with the app title, a sidebar for navigation, and a main content area. Use the Astryx theme system.","ty-9":"Build a comparison table header where each column has a plan name heading and a price. The 'Enterprise' plan should have visually larger display-style typography compared to the other plans.","tc-7":"I have a section of my app that needs a different theme than the rest — like a dark sidebar next to a light content area. How do I nest themes in Astryx?"}};</script>

  :where(*) {

    border: 0 solid;

    margin: 0;
  }

    -webkit-text-decoration: inherit;
    text-decoration: inherit;
  }

    font-size: 75%;
    line-height: 0;
    position: relative;
  }

  }

  }

  :where(fieldset) {
    margin: 0;
    padding: 0;
  }

  :where(legend) {
    padding: 0;
  }

  :where(table) {
    text-indent: 0;
    border-color: inherit;

  }

  :where(hr) {

  }

  :where([data-astryx-media="dark"]) {
