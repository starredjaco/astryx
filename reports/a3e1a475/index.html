\n    flexDirection: 'column',\n    gap: 8,\n  },\n});\n\ntype State = 'loading' | 'error' | 'data';\n\nexport default function DashboardWidget() {\n  const [state, setState] = useState<State>('loading');\n\n  useEffect(() => {\n    const timer = setTimeout(() => {\n      setState(Math.random() > 0.3 ? 'data' : 'error');\n    }, 2000);\n    return () => clearTimeout(timer);\n  }, []);\n\n  const retry = () => {\n    setState('loading');\n    setTimeout(() => setState('data'), 1500);\n  };\n\n  return (\n    <div {...stylex.props(styles.container)}>\n      <Card padding={4}>\n        <Text type=\"display-3\">Active Users</Text>\n        {state === 'loading' && (\n          <div {...stylex.props(styles.centered)}>\n            <Spinner label=\"Loading data...\" />\n          </div>\n        )}\n        {state === 'error' && (\n          <div {...stylex.props(styles.data)}>\n            <Banner variant=\"error\" title=\"Failed to load widget data\" />\n            <Button label=\"Retry\" variant=\"secondary\" onClick={retry} />\n          </div>\n        )}\n        {state === 'data' && (\n          <div {...stylex.props(styles.data)}>\n            <Text type=\"display-1\">2,847</Text>\n            <Text type=\"supporting\" color=\"secondary\">+12% from yesterday</Text>\n          </div>\n        )}\n      </Card>\n    </div>\n  );\n}\n","tc-9":"import React from 'react';\nimport {Theme} from '@astryxdesign/core/theme';\nimport {defineTheme} from '@astryxdesign/core/theme';\nimport {Card} from '@astryxdesign/core/Card';\nimport {Button} from '@astryxdesign/core/Button';\nimport {Text} from '@astryxdesign/core/Text';\nimport stylex from '@stylexjs/stylex';\n\nconst styles = stylex.create({\n  container: {\n    display: 'flex',\n    gap: 24,\n    padding: 24,\n  },\n  section: {\n    flex: 1,\n    display: 'flex',\n    flexDirection: 'column',\n    gap: 12,\n  },\n});\n\nconst sharedTokens = {\n  '--spacing-1': '4px',\n  '--spacing-2': '8px',\n  '--spacing-3': '12px',\n  '--spacing-4': '16px',\n  '--font-family': 'Inter, system-ui, sans-serif',\n  '--font-size-body': '14px',\n  '--font-size-heading': '20px',\n  '--line-height-body': '1.5',\n};\n\nconst oceanTheme = defineTheme({\n  name: 'ocean',\n  tokens: {\n    ...sharedTokens,\n    '--color-accent': '#0077B6',\n    '--color-accent-hover': '#005f8a',\n    '--color-background-surface': '#f0f8ff',\n    '--color-background-wash': '#e6f2fa',\n  },\n});\n\nconst sunsetTheme = defineTheme({\n  name: 'sunset',\n  tokens: {\n    ...sharedTokens,\n    '--color-accent': '#E76F51',\n    '--color-accent-hover': '#c45a3f',\n    '--color-background-surface': '#fff5f0',\n    '--color-background-wash': '#fae8e0',\n  },\n});\n\nexport default function DualThemeDemo() {\n  return (\n    <div {...stylex.props(styles.container)}>\n      <Theme theme={oceanTheme} mode=\"light\">\n        <div {...stylex.props(styles.section)}>\n          <Text type=\"display-3\">Ocean Theme</Text>\n          <Card padding={4}>\n            <Text type=\"body\">Blue-toned accent with shared spacing and typography.</Text>\n            <Button label=\"Primary Action\" variant=\"primary\" />\n          </Card>\n        </div>\n      </Theme>\n      <Theme theme={sunsetTheme} mode=\"light\">\n        <div {...stylex.props(styles.section)}>\n          <Text type=\"display-3\">Sunset Theme</Text>\n          <Card padding={4}>\n            <Text type=\"body\">Warm orange accent with the same shared tokens.</Text>\n            <Button label=\"Primary Action\" variant=\"primary\" />\n          </Card>\n        </div>\n      </Theme>\n    </div>\n  );\n}\n","ty-3":"import React from 'react';\nimport {Card} from '@astryxdesign/core/Card';\nimport {Text} from '@astryxdesign/core/Text';\nimport stylex from '@stylexjs/stylex';\n\nconst styles = stylex.create({\n  container: {\n    maxWidth: 300,\n  },\n  stack: {\n    display: 'flex',\n    flexDirection: 'column',\n    gap: 4,\n  },\n});\n\nexport default function MetricsDashboardCard() {\n  return (\n    <div {...stylex.props(styles.container)}>\n      <Card padding={4}>\n        <div {...stylex.props(styles.stack)}>\n          <Text type=\"label\" color=\"secondary\">Total Revenue</Text>\n          <Text type=\"display-1\" hasTabularNumbers>$12,340.56</Text>\n          <Text type=\"supporting\" color=\"secondary\">+12% from last month</Text>\n        </div>\n      </Card>\n    </div>\n  );\n}\n","wd-1":"import React, {useState} from 'react';\nimport {Button} from '@astryxdesign/core/Button';\nimport {Card} from '@astryxdesign/core/Card';\nimport {Text} from '@astryxdesign/core/Text';\nimport {TextInput} from '@astryxdesign/core/TextInput';\nimport stylex from '@stylexjs/stylex';\n\nconst styles = stylex.create({\n  container: {\n    maxWidth: 600,\n    margin: '0 auto',\n    padding: 24,\n  },\n  step: {\n    display: 'flex',\n    flexDirection: 'column',\n    gap: 16,\n  },\n  actions: {\n    display: 'flex',\n    justifyContent: 'space-between',\n    marginTop: 16,\n  },\n  summary: {\n    display: 'flex',\n    flexDirection: 'column',\n    gap: 8,\n  },\n});\n\ntype Step = 'cart' | 'shipping' | 'payment' | 'confirmation';\n\nexport default function CheckoutFlow() {\n  const [step, setStep] = useState<Step>('cart');\n  const [shipping, setShipping] = useState({name: '', address: '', city: ''});\n  const [payment, setPayment] = useState({card: '', expiry: '', cvv: ''});\n\n  return (\n    <div {...stylex.props(styles.container)}>\n      <Card padding={4}>\n        {step === 'cart' && (\n          <div {...stylex.props(styles.step)}>\n            <Text type=\"display-3\">Cart Summary</Text>\n            <div {...stylex.props(styles.summary)}>\n              <Text type=\"body\">React Handbook - $29.99</Text>\n              <Text type=\"body\">TypeScript Guide - $24.99</Text>\n              <Text type=\"large\" weight=\"semibold\">Total: $54.98</Text>\n            </div>\n            <div {...stylex.props(styles.actions)}>\n              <span />\n              <Button label=\"Continue to Shipping\" variant=\"primary\" onClick={() => setStep('shipping')} />\n            </div>\n          </div>\n        )}\n        {step === 'shipping' && (\n          <div {...stylex.props(styles.step)}>\n            <Text type=\"display-3\">Shipping</Text>\n            <TextInput label=\"Full Name\" value={shipping.name} onChange={(v) => setShipping({...shipping, name: v})} />\n            <TextInput label=\"Address\" value={shipping.address} onChange={(v) => setShipping({...shipping, address: v})} />\n            <TextInput label=\"City\" value={shipping.city} onChange={(v) => setShipping({...shipping, city: v})} />\n            <div {...stylex.props(styles.actions)}>\n              <Button label=\"Back\" variant=\"ghost\" onClick={() => setStep('cart')} />\n              <Button label=\"Continue to Payment\" variant=\"primary\" onClick={() => setStep('payment')} />\n            </div>\n          </div>\n        )}\n        {step === 'payment' && (\n          <div {...stylex.props(styles.step)}>\n            <Text type=\"display-3\">Payment</Text>\n            <TextInput label=\"Card Number\" value={payment.card} onChange={(v) => setPayment({...payment, card: v})} />\n            <TextInput label=\"Expiry\" value={payment.expiry} onChange={(v) => setPayment({...payment, expiry: v})} />\n            <TextInput label=\"CVV\" value={payment.cvv} onChange={(v) => setPayment({...payment, cvv: v})} />\n            <div {...stylex.props(styles.actions)}>\n              <Button label=\"Back\" variant=\"ghost\" onClick={() => setStep('shipping')} />\n              <Button label=\"Place Order\" variant=\"primary\" onClick={() => setStep('confirmation')} />\n            </div>\n          </div>\n        )}\n        {step === 'confirmation' && (\n          <div {...stylex.props(styles.step)}>\n            <Text type=\"display-3\">Order Confirmed</Text>\n            <Text type=\"body\">Your order has been placed. A confirmation email will be sent shortly.</Text>\n          </div>\n        )}\n      </Card>\n    </div>\n  );\n}\n"},"previews":{"tc-9":{"html":"previews/tc-9/html.html"},"ty-3":{"html":"previews/ty-3/html.html"}},"prompts":{"fwc-12":"Build an image thumbnail grid. When a user clicks a thumbnail, open a fullscreen lightbox showing the image with a caption and a close button.","wd-1":"Build a checkout flow: cart summary → shipping → payment → confirmation","cwm-3":"Like Notion's page header with icon picker and cover image","sd-1":"Show a dashboard widget with loading → error → data states","dd-1":"A table of users with sortable columns and search","rc-2":"A sidebar that becomes a bottom sheet on mobile","io-1":"A form that validates email and posts to /api/subscribe","ps-3":"Create an admin panel page layout with a fixed header, collapsible left sidebar, main content area, and a right panel for details. Wrap everything in the XDS theme.","ty-3":"Build a metrics dashboard card that shows a label like 'Total Revenue', a large numeric value like '$12,340.56', and a small supporting line that says '+12% from last month'","tc-9":"Create two custom XDS themes that share the same spacing and typography tokens but have different color palettes. The first theme ('ocean') should use blue tones (#0077B6 accent) and the second ('sunset') should use warm orange tones (#E76F51 accent). Keep it DRY — don't duplicate the shared token values."}};</script>
