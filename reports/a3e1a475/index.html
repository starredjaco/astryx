ion NotionPageHeader() {\n  const [icon, setIcon] = useState('📄');\n  const [coverUrl] = useState('https://picsum.photos/id/100/1200/400');\n  const [isPickerOpen, setIsPickerOpen] = useState(false);\n\n  return (\n    <Card padding={0}>\n      <div {...stylex.props(styles.header)}>\n        <img src={coverUrl} alt=\"Page cover\" {...stylex.props(styles.coverImage)} />\n        <div {...stylex.props(styles.titleRow)}>\n          <Popover\n            isOpen={isPickerOpen}\n            onOpenChange={setIsPickerOpen}\n            trigger={\n              <button {...stylex.props(styles.icon)} aria-label=\"Change icon\">\n                {icon}\n              </button>\n            }\n            placement=\"below-start\"\n          >\n            <div {...stylex.props(styles.emojiGrid)}>\n              {emojis.map((e) => (\n                <button\n                  key={e}\n                  {...stylex.props(styles.emojiBtn)}\n                  onClick={() => { setIcon(e); setIsPickerOpen(false); }}\n                >\n                  {e}\n                </button>\n              ))}\n            </div>\n          </Popover>\n          <Text type=\"display-2\">Untitled Page</Text>\n        </div>\n      </div>\n    </Card>\n  );\n}\n","dd-1":"import React, {useState, useMemo} from 'react';\nimport {Table} from '@astryxdesign/core/Table';\nimport {TextInput} from '@astryxdesign/core/TextInput';\nimport stylex from '@stylexjs/stylex';\n\nconst styles = stylex.create({\n  container: {\n    display: 'flex',\n    flexDirection: 'column',\n    gap: 16,\n    padding: 16,\n  },\n});\n\ninterface User extends Record<string, unknown> {\n  id: number;\n  name: string;\n  email: string;\n  role: string;\n  joined: string;\n}\n\nconst users: User[] = [\n  {id: 1, name: 'Alice Johnson', email: 'alice@example.com', role: 'Admin', joined: '2024-01-15'},\n  {id: 2, name: 'Bob Smith', email: 'bob@example.com', role: 'Editor', joined: '2024-02-20'},\n  {id: 3, name: 'Carol White', email: 'carol@example.com', role: 'Viewer', joined: '2024-03-10'},\n  {id: 4, name: 'David Brown', email: 'david@example.com', role: 'Editor', joined: '2024-04-05'},\n  {id: 5, name: 'Eve Davis', email: 'eve@example.com', role: 'Admin', joined: '2024-05-22'},\n];\n\nexport default function UserTable() {\n  const [search, setSearch] = useState('');\n  const [sortKey, setSortKey] = useState<keyof User>('name');\n  const [sortDir, setSortDir] = useState<'asc' | 'desc'>('asc');\n\n  const filtered = useMemo(() => {\n    const q = search.toLowerCase();\n    return users\n      .filter((u) => u.name.toLowerCase().includes(q) || u.email.toLowerCase().includes(q))\n      .sort((a, b) => {\n        const aVal = String(a[sortKey]);\n        const bVal = String(b[sortKey]);\n        return sortDir === 'asc' ? aVal.localeCompare(bVal) : bVal.localeCompare(aVal);\n      });\n  }, [search, sortKey, sortDir]);\n\n  const handleSort = (key: keyof User) => {\n    if (key === sortKey) {\n      setSortDir(sortDir === 'asc' ? 'desc' : 'asc');\n    } else {\n      setSortKey(key);\n      setSortDir('asc');\n    }\n  };\n\n  const columns = [\n    {key: 'name' as const, header: 'Name'},\n    {key: 'email' as const, header: 'Email'},\n    {key: 'role' as const, header: 'Role'},\n    {key: 'joined' as const, header: 'Joined'},\n  ];\n\n  return (\n    <div {...stylex.props(styles.container)}>\n      <TextInput label=\"Search users\" value={search} onChange={setSearch} placeholder=\"Search by name or email...\" />\n      <Table\n        data={filtered}\n        columns={columns}\n        idKey=\"id\"\n        hasHover\n      />\n    </div>\n  );\n}\n","fwc-12":"import React, {useState} from 'react';\nimport {Dialog} from '@astryxdesign/core/Dialog';\nimport {DialogHeader} from '@astryxdesign/core/Dialog';\nimport {DialogBody} from '@astryxdesign/core/Dialog';\nimport {Thumbnail} from '@astryxdesign/core/Thumbnail';\nimport {IconButton} from '@astryxdesign/core/IconButton';\nimport {Text} from '@astryxdesign/core/Text';\nimport stylex from '@stylexjs/stylex';\n\nconst styles = stylex.create({\n  grid: {\n    display: 'grid',\n    gridTemplateColumns: 'repeat(auto-fill, minmax(120px, 1fr))',\n    gap: 8,\n    padding: 16,\n  },\n  lightbox: {\n    display: 'flex',\n    flexDirection: 'column',\n    alignItems: 'center',\n    gap: 12,\n  },\n  image: {\n    maxWidth: '100%',\n    maxHeight: '70vh',\n    objectFit: 'contain',\n  },\n});\n\nconst images = [\n  {src: 'https://picsum.photos/id/10/400/300', caption: 'Mountain landscape'},\n  {src: 'https://picsum.photos/id/20/400/300', caption: 'Coastal sunset'},\n  {src: 'https://picsum.photos/id/30/400/300', caption: 'Forest path'},\n  {src: 'https://picsum.photos/id/40/400/300', caption: 'Urban skyline'},\n  {src: 'https://picsum.photos/id/50/400/300', caption: 'Desert dunes'},\n  {src: 'https://picsum.photos/id/60/400/300', caption: 'Lake reflection'},\n];\n\nexport default function ImageGrid() {\n  const [selected, setSelected] = useState<number | null>(null);\n\n  return (\n    <>\n      <div {...stylex.props(styles.grid)}>\n        {images.map((img, i) => (\n          <Thumbnail\n            key={i}\n            src={img.src}\n            alt={img.caption}\n            label={img.caption}\n            onClick={() => setSelected(i)}\n          />\n        ))}\n      </div>\n      <Dialog\n        isOpen={selected !== null}\n        onOpenChange={(open) => { if (!open) setSelected(null); }}\n        variant=\"fullscreen\"\n      >\n        <DialogHeader title={selected !== null ? images[selected].caption : ''} />\n        <DialogBody>\n          {selected !== null && (\n            <div {...stylex.props(styles.lightbox)}>\n              <img\n                src={images[selected].src}\n                alt={images[selected].caption}\n                {...stylex.props(styles.image)}\n              />\n              <Text type=\"body\">{images[selected].caption}</Text>\n            </div>\n          )}\n        </DialogBody>\n      </Dialog>\n    </>\n  );\n}\n","io-1":"import React, {useState} from 'react';\nimport {TextInput} from '@astryxdesign/core/TextInput';\nimport {Button} from '@astryxdesign/core/Button';\nimport {Card} from '@astryxdesign/core/Card';\nimport {Text} from '@astryxdesign/core/Text';\nimport {Banner} from '@astryxdesign/core/Banner';\nimport stylex from '@stylexjs/stylex';\n\nconst styles = stylex.create({\n  form: {\n    display: 'flex',\n    flexDirection: 'column',\n    gap: 16,\n    maxWidth: 400,\n    padding: 16,\n  },\n});\n\nexport default function SubscribeForm() {\n  const [email, setEmail] = useState('');\n  const [status, setStatus] = useState<'idle' | 'loading' | 'success' | 'error'>('idle');\n  const [errorMsg, setErrorMsg] = useState('');\n\n  const validateEmail = (value: string) => {\n    const re = /^[^\\s@]+@[^\\s@]+\\.[^\\s@]+$/;\n    return re.test(value);\n  };\n\n  const handleSubmit = async () => {\n    if (!validateEmail(email)) {\n      setErrorMsg('Please enter a valid email address');\n      return;\n    }\n    setErrorMsg('');\n    setStatus('loading');\n    try {\n      const res = await fetch('/api/subscribe', {\n        method: 'POST',\n        headers: {'Content-Type': 'application/json'},\n        body: JSON.stringify({email}),\n      });\n      if (!res.ok) throw new Error('Subscription failed');\n      setStatus('success');\n    } catch {\n      setStatus('error');\n      setErrorMsg('Something went wrong. Please try again.');\n    }\n  };\n\n  if (status === 'success') {\n    return (\n      <Card padding={4}>\n        <Banner variant=\"success\" title=\"Subscribed!\" description=\"Check your inbox for a confirmation email.\" />\n      </Card>\n    );\n  }\n\n  return (\n    <Card padding={4}>\n      <div {...stylex.props(styles.form)}>\n        <Text type=\"display-3\">Subscribe to updates</Text>\n        <TextInput\n          label=\"Email address\"\n          type=\"email\"\n          value={email}\n          onChange={setEmail}\n          placeholder=\"you@example.com\"\n          status={errorMsg ? {type: 'error', message: errorMsg} : undefined}\n          isRequired\n        />\n        <Button\n          label=\"Subscribe\"\n          variant=\"primary\"\n          isLoading={status === 'loading'}\n          onClick={handleSubmit}\n        />\n      </div>\n    </Card>\n  );\n}\n","ps-3":"import React from 'react';\nimport {AppShell} from '@astryxdesign/core/AppShell';\nimport {TopNav} from '@astryxdesign/core/TopNav';\nimport {SideNav} from '@astryxdesign/core/SideNav';\nimport {SideNavItem} from '@astryxdesign/core/SideNav';\nimport {SideNavSection} from '@astryxdesign/core/SideNav';\nimport {SideNavHeading} from '@astryxdesign/core/SideNav';\nimport {Text} from '@astryxdesign/core/Text';\nimport {Card} from '@astryxdesign/core/Card';\nimport {Theme} from '@astryxdesign/core/theme';\nimport {defineTheme} from '@astryxdesign/core/theme';\nimport stylex from '@stylexjs/stylex';\n\nconst styles = stylex.create({\n  content: {\n    display: 'grid',\n    gridTemplateColumns: '1fr 320px',\n    gap: 16,\n    padding: 24,\n    height: '100%',\n  },\n  main: {\n    display: 'flex',\n    flexDirection: 'column',\n    gap: 16,\n  },\n  details: {\n    display: 'flex',\n    flexDirection: 'column',\n    gap: 12,\n  },\n});\n\nconst adminTheme = defineTheme({\n  name: 'admin',\n  tokens: {\n    '--color-accent': '#4f46e5',\n  },\n});\n\nexport default function AdminPanel() {\n  return (\n    <Theme theme={adminTheme} mode=\"light\">\n      <AppShell\n        topNav={<TopNav title=\"Admin Panel\" />}\n        sideNav={\n          <SideNav\n            collapsible\n            header={<SideNavHeading>Admin</SideNavHeading>}\n          >\n            <SideNavSection title=\"Overview\">\n              <SideNavItem label=\"Dashboard\" isSelected />\n              <SideNavItem label=\"Analytics\" />\n            </SideNavSection>\n            <SideNavSection title=\"Management\">\n              <SideNavItem label=\"Users\" />\n              <SideNavItem label=\"Roles\" />\n              <SideNavItem label=\"Settings\" />\n            </SideNavSection>\n          </SideNav>\n        }\n      >\n        <div {...stylex.props(styles.content)}>\n          <div {...stylex.props(styles.main)}>\n            <Text type=\"display-3\">Dashboard</Text>\n            <Card padding={4}>\n              <Text type=\"body\">Main content area with metrics, charts, and data tables.</Text>\n            </Card>\n          </div>\n          <div {...stylex.props(styles.details)}>\n            <Text type=\"display-3\">Details</Text>\n            <Card padding={3}>\n              <Text type=\"body\">Right panel for context, detail views, or quick actions.</Text>\n            </Card>\n          </div>\n        </div>\n      </AppShell>\n    </Theme>\n  );\n}\n","rc-2":"import React, {useState, useEffect} from 'react';\nimport {SideNav} from '@astryxdesign/core/SideNav';\nimport {SideNavItem} from '@astryxdesign/core/SideNav';\nimport {SideNavSection} from '@astryxdesign/core/SideNav';\nimport {SideNavHeading} from '@astryxdesign/core/SideNav';\nimport {Button} from '@astryxdesign/core/Button';\nimport {Text} from '@astryxdesign/core/Text';\nimport stylex from '@stylexjs/stylex';\n\nconst styles = stylex.create({\n  layout: {\n    display: 'flex',\n    height: '100vh',\n  },\n  sidebar: {\n    width: 280,\n    borderRight: '1px solid var(--color-border-default)',\n  },\n  bottomSheet: {\n    position: 'fixed',\n    bottom: 0,\n    left: 0,\n    right: 0,\n    backgroundColor: 'var(--color-background-surface)',\n    borderTop: '1px solid var(--color-border-default)',\n    borderRadius: '16px 16px 0 0',\n    padding: 16,\n    maxHeight: '60vh',\n    overflowY: 'auto',\n    zIndex: 100,\n  },\n  overlay: {\n    position: 'fixed',\n    inset: 0,\n    backgroundColor: 'rgba(0, 0, 0, 0.4)',\n    zIndex: 99,\n  },\n  main: {\n    flex: 1,\n    padding: 24,\n  },\n  mobileToggle: {\n    position: 'fixed',\n    bottom: 16,\n    right: 16,\n    zIndex: 50,\n  },\n});\n\nexport default function ResponsiveSidebar() {\n  const [isMobile, setIsMobile] = useState(false);\n  const [isSheetOpen, setIsSheetOpen] = useState(false);\n\n  useEffect(() => {\n    const mq = window.matchMedia('(max-width: 768px)');\n    setIsMobile(mq.matches);\n    const handler = (e: MediaQueryListEvent) => setIsMobile(e.matches);\n    mq.addEventListener('change', handler);\n    return () => mq.removeEventListener('change', handler);\n  }, []);\n\n  const navContent = (\n    <SideNav header={<SideNavHeading>Navigation</SideNavHeading>}>\n      <SideNavSection title=\"Main\">\n        <SideNavItem label=\"Dashboard\" isSelected />\n        <SideNavItem label=\"Projects\" />\n        <SideNavItem label=\"Tasks\" />\n      </SideNavSection>\n      <SideNavSection title=\"Settings\">\n        <SideNavItem label=\"Profile\" />\n        <SideNavItem label=\"Preferences\" />\n      </SideNavSection>\n    </SideNav>\n  );\n\n  if (isMobile) {\n    return (\n      <div>\n        <div {...stylex.props(styles.main)}>\n          <Text type=\"display-3\">Page Content</Text>\n          <Text type=\"body\">Resize the window below 768px to see the bottom sheet.</Text>\n        </div>\n        {isSheetOpen && (\n          <>\n            <div {...stylex.props(styles.overlay)} onClick={() => setIsSheetOpen(false)} />\n            <div {...stylex.props(styles.bottomSheet)}>\n              {navContent}\n            </div>\n          </>\n        )}\n        <div {...stylex.props(styles.mobileToggle)}>\n          <Button label=\"Menu\" variant=\"primary\" onClick={() => setIsSheetOpen(!isSheetOpen)} />\n        </div>\n      </div>\n    );\n  }\n\n  return (\n    <div {...stylex.props(styles.layout)}>\n      <div {...stylex.props(styles.sidebar)}>\n        {navContent}\n      </div>\n      <div {...stylex.props(styles.main)}>\n        <Text type=\"display-3\">Page Content</Text>\n        <Text type=\"body\">Resize the window below 768px to see the bottom sheet.</Text>\n      </div>\n    </div>\n  );\n}\n","sd-1":"import React, {useState, useEffect} from 'react';\nimport {Card} from '@astryxdesign/core/Card';\nimport {Spinner} from '@astryxdesign/core/Spinner';\nimport {Text} from '@astryxdesign/core/Text';\nimport {Button} from '@astryxdesign/core/Button';\nimport {Banner} from '@astryxdesign/core/Banner';\nimport stylex from '@stylexjs/stylex';\n\nconst styles = stylex.create({\n  container: {\n    maxWidth: 400,\n    padding: 16,\n  },\n  centered: {\n    display: 'flex',\n    justifyContent: 'center',\n    alignItems: 'center',\n    minHeight: 120,\n  },\n  data: {\n    display: 'flex',\n    flexDirection: 'column',\n    gap: 8,\n  },\n});\n\ntype State = 'loading' | 'error' | 'data';\n\nexport default function DashboardWidget() {\n  const [state, setState] = useState<State>('loading');\n\n  useEffect(() => {\n    const timer = setTimeout(() => {\n      setState(Math.random() > 0.3 ? 'data' : 'error');\n    }, 2000);\n    return () => clearTimeout(timer);\n  }, []);\n\n  const retry = () => {\n    setState('loading');\n    setTimeout(() => setState('data'), 1500);\n  };\n\n  return (\n    <div {...stylex.props(styles.container)}>\n      <Card padding={4}>\n        <Text type=\"display-3\">Active Users</Text>\n        {state === 'loading' && (\n          <div {...stylex.props(styles.centered)}>\n            <Spinner label=\"Loading data...\" />\n          </div>\n        )}\n        {state === 'error' && (\n          <div {...stylex.props(styles.data)}>\n            <Banner variant=\"error\" title=\"Failed to load widget data\" />\n            <Button label=\"Retry\" variant=\"secondary\" onClick={retry} />\n          </div>\n        )}\n        {state === 'data' && (\n          <div {...stylex.props(styles.data)}>\n            <Text type=\"display-1\">2,847</Text>\n            <Text type=\"supporting\" color=\"secondary\">+12% from yesterday</Text>\n          </div>\n        )}\n      </Card>\n    </div>\n  );\n}\n","tc-9":"import React from 'react';\nimport {Theme} from '@astryxdesign/core/theme';\nimport {defineTheme} from '@astryxdesign/core/theme';\nimport {Card} from '@astryxdesign/core/Card';\nimport {Button} from '@astryxdesign/core/Button';\nimport {Text} from '@astryxdesign/core/Text';\nimport stylex from '@stylexjs/stylex';\n\nconst styles = stylex.create({\n  container: {\n    display: 'flex',\n    gap: 24,\n    padding: 24,\n  },\n  section: {\n    flex: 1,\n    display: 'flex',\n    flexDirection: 'column',\n    gap: 12,\n  },\n});\n\nconst sharedTokens = {\n  '--spacing-1': '4px',\n  '--spacing-2': '8px',\n  '--spacing-3': '12px',\n  '--spacing-4': '16px',\n  '--font-family': 'Inter, system-ui, sans-serif',\n  '--font-size-body': '14px',\n  '--font-size-heading': '20px',\n  '--line-height-body': '1.5',\n};\n\nconst oceanTheme = defineTheme({\n  name: 'ocean',\n  tokens: {\n    ...sharedTokens,\n    '--color-accent': '#0077B6',\n    '--color-accent-hover': '#005f8a',\n    '--color-background-surface': '#f0f8ff',\n    '--color-background-wash': '#e6f2fa',\n  },\n});\n\nconst sunsetTheme = defineTheme({\n  name: 'sunset',\n  tokens: {\n    ...sharedTokens,\n    '--color-accent': '#E76F51',\n    '--color-accent-hover': '#c45a3f',\n    '--color-background-surface': '#fff5f0',\n    '--color-background-wash': '#fae8e0',\n  },\n});\n\nexport default function DualThemeDemo() {\n  return (\n    <div {...stylex.props(styles.container)}>\n      <Theme theme={oceanTheme} mode=\"light\">\n        <div {...stylex.props(styles.section)}>\n          <Text type=\"display-3\">Ocean Theme</Text>\n          <Card padding={4}>\n            <Text type=\"body\">Blue-toned accent with shared spacing and typography.</Text>\n            <Button label=\"Primary Action\" variant=\"primary\" />\n          </Card>\n        </div>\n      </Theme>\n      <Theme theme={sunsetTheme} mode=\"light\">\n        <div {...stylex.props(styles.section)}>\n          <Text type=\"display-3\">Sunset Theme</Text>\n          <Card padding={4}>\n            <Text type=\"body\">Warm orange accent with the same shared tokens.</Text>\n            <Button label=\"Primary Action\" variant=\"primary\" />\n          </Card>\n        </div>\n      </Theme>\n    </div>\n  );\n}\n","ty-3":"import React from 'react';\nimport {Card} from '@astryxdesign/core/Card';\nimport {Text} from '@astryxdesign/core/Text';\nimport stylex from '@stylexjs/stylex';\n\nconst styles = stylex.create({\n  container: {\n    maxWidth: 300,\n  },\n  stack: {\n    display: 'flex',\n    flexDirection: 'column',\n    gap: 4,\n  },\n});\n\nexport default function MetricsDashboardCard() {\n  return (\n    <div {...stylex.props(styles.container)}>\n      <Card padding={4}>\n        <div {...stylex.props(styles.stack)}>\n          <Text type=\"label\" color=\"secondary\">Total Revenue</Text>\n          <Text type=\"display-1\" hasTabularNumbers>$12,340.56</Text>\n          <Text type=\"supporting\" color=\"secondary\">+12% from last month</Text>\n        </div>\n      </Card>\n    </div>\n  );\n}\n","wd-1":"import React, {useState} from 'react';\nimport {Button} from '@astryxdesign/core/Button';\nimport {Card} from '@astryxdesign/core/Card';\nimport {Text} from '@astryxdesign/core/Text';\nimport {TextInput} from '@astryxdesign/core/TextInput';\nimport stylex from '@stylexjs/stylex';\n\nconst styles = stylex.create({\n  container: {\n    maxWidth: 600,\n    margin: '0 auto',\n    padding: 24,\n  },\n  step: {\n    display: 'flex',\n    flexDirection: 'column',\n    gap: 16,\n  },\n  actions: {\n    display: 'flex',\n    justifyContent: 'space-between',\n    marginTop: 16,\n  },\n  summary: {\n    display: 'flex',\n    flexDirection: 'column',\n    gap: 8,\n  },\n});\n\ntype Step = 'cart' | 'shipping' | 'payment' | 'confirmation';\n\nexport default function CheckoutFlow() {\n  const [step, setStep] = useState<Step>('cart');\n  const [shipping, setShipping] = useState({name: '', address: '', city: ''});\n  const [payment, setPayment] = useState({card: '', expiry: '', cvv: ''});\n\n  return (\n    <div {...stylex.props(styles.container)}>\n      <Card padding={4}>\n        {step === 'cart' && (\n          <div {...stylex.props(styles.step)}>\n            <Text type=\"display-3\">Cart Summary</Text>\n            <div {...stylex.props(styles.summary)}>\n              <Text type=\"body\">React Handbook - $29.99</Text>\n              <Text type=\"body\">TypeScript Guide - $24.99</Text>\n              <Text type=\"large\" weight=\"semibold\">Total: $54.98</Text>\n            </div>\n            <div {...stylex.props(styles.actions)}>\n              <span />\n              <Button label=\"Continue to Shipping\" variant=\"primary\" onClick={() => setStep('shipping')} />\n            </div>\n          </div>\n        )}\n        {step === 'shipping' && (\n          <div {...stylex.props(styles.step)}>\n            <Text type=\"display-3\">Shipping</Text>\n            <TextInput label=\"Full Name\" value={shipping.name} onChange={(v) => setShipping({...shipping, name: v})} />\n            <TextInput label=\"Address\" value={shipping.address} onChange={(v) => setShipping({...shipping, address: v})} />\n            <TextInput label=\"City\" value={shipping.city} onChange={(v) => setShipping({...shipping, city: v})} />\n            <div {...stylex.props(styles.actions)}>\n              <Button label=\"Back\" variant=\"ghost\" onClick={() => setStep('cart')} />\n              <Button label=\"Continue to Payment\" variant=\"primary\" onClick={() => setStep('payment')} />\n            </div>\n          </div>\n        )}\n        {step === 'payment' && (\n          <div {...stylex.props(styles.step)}>\n            <Text type=\"display-3\">Payment</Text>\n            <TextInput label=\"Card Number\" value={payment.card} onChange={(v) => setPayment({...payment, card: v})} />\n            <TextInput label=\"Expiry\" value={payment.expiry} onChange={(v) => setPayment({...payment, expiry: v})} />\n            <TextInput label=\"CVV\" value={payment.cvv} onChange={(v) => setPayment({...payment, cvv: v})} />\n            <div {...stylex.props(styles.actions)}>\n              <Button label=\"Back\" variant=\"ghost\" onClick={() => setStep('shipping')} />\n              <Button label=\"Place Order\" variant=\"primary\" onClick={() => setStep('confirmation')} />\n            </div>\n          </div>\n        )}\n        {step === 'confirmation' && (\n          <div {...stylex.props(styles.step)}>\n            <Text type=\"display-3\">Order Confirmed</Text>\n            <Text type=\"body\">Your order has been placed. A confirmation email will be sent shortly.</Text>\n          </div>\n        )}\n      </Card>\n    </div>\n  );\n}\n"},"baselineSourceCode":{"cwm-3":"import React, {useState} from 'react';\nimport {Card} from '@/components/ui/card';\nimport {Button} from '@/components/ui/button';\nimport {Popover, PopoverContent, PopoverTrigger} from '@/components/ui/popover';\n\nconst emojis = ['📄', '🎯', '🚀', '💡', '📊', '🎨', '🔥', '⭐', '📝', '🏆', '💻', '🌍'];\n\nexport default function NotionPageHeader() {\n  const [icon, setIcon] = useState('📄');\n  const coverUrl = 'https://picsum.photos/id/100/1200/400';\n\n  return (\n    <Card className=\"overflow-hidden\">\n      <img src={coverUrl} alt=\"Page cover\" className=\"h-48 w-full object-cover\" />\n      <div className=\"flex items-center gap-3 p-4\">\n        <Popover>\n          <PopoverTrigger asChild>\n            <button className=\"text-3xl hover:bg-accent rounded p-1\">{icon}</button>\n          </PopoverTrigger>\n          <PopoverContent className=\"w-48\">\n            <div className=\"grid grid-cols-6 gap-1\">\n              {emojis.map((e) => (\n                <button key={e} className=\"p-1 text-xl hover:bg-accent rounded\" onClick={() => setIcon(e)}>{e}</button>\n              ))}\n            </div>\n          </PopoverContent>\n        </Popover>\n        <h1 className=\"text-2xl font-bold\">Untitled Page</h1>\n      </div>\n    </Card>\n  );\n}\n","dd-1":"import React, {useState, useMemo} from 'react';\nimport {Input} from '@/components/ui/input';\nimport {Table, TableBody, TableCell, TableHead, TableHeader, TableRow} from '@/components/ui/table';\nimport {Button} from '@/components/ui/button';\n\ninterface User {\n  id: number;\n  name: string;\n  email: string;\n  role: string;\n  joined: string;\n}\n\nconst users: User[] = [\n  {id: 1, name: 'Alice Johnson', email: 'alice@example.com', role: 'Admin', joined: '2024-01-15'},\n  {id: 2, name: 'Bob Smith', email: 'bob@example.com', role: 'Editor', joined: '2024-02-20'},\n  {id: 3, name: 'Carol White', email: 'carol@example.com', role: 'Viewer', joined: '2024-03-10'},\n  {id: 4, name: 'David Brown', email: 'david@example.com', role: 'Editor', joined: '2024-04-05'},\n  {id: 5, name: 'Eve Davis', email: 'eve@example.com', role: 'Admin', joined: '2024-05-22'},\n];\n\nexport default function UserTable() {\n  const [search, setSearch] = useState('');\n  const [sortKey, setSortKey] = useState<keyof User>('name');\n  const [sortDir, setSortDir] = useState<'asc' | 'desc'>('asc');\n\n  const filtered = useMemo(() => {\n    const q = search.toLowerCase();\n    return users\n      .filter((u) => u.name.toLowerCase().includes(q) || u.email.toLowerCase().includes(q))\n      .sort((a, b) => {\n        const aVal = String(a[sortKey]);\n        const bVal = String(b[sortKey]);\n        return sortDir === 'asc' ? aVal.localeCompare(bVal) : bVal.localeCompare(aVal);\n      });\n  }, [search, sortKey, sortDir]);\n\n  const handleSort = (key: keyof User) => {\n    if (key === sortKey) setSortDir(sortDir === 'asc' ? 'desc' : 'asc');\n    else { setSortKey(key); setSortDir('asc'); }\n  };\n\n  return (\n    <div className=\"space-y-4 p-4\">\n      <Input placeholder=\"Search by name or email...\" value={search} onChange={(e) => setSearch(e.target.value)} />\n      <Table>\n        <TableHeader>\n          <TableRow>\n            {(['name', 'email', 'role', 'joined'] as const).map((key) => (\n              <TableHead key={key}>\n                <Button variant=\"ghost\" size=\"sm\" onClick={() => handleSort(key)}>\n                  {key.charAt(0).toUpperCase() + key.slice(1)}\n                  {sortKey === key && (sortDir === 'asc' ? ' ↑' : ' ↓')}\n                </Button>\n              </TableHead>\n            ))}\n          </TableRow>\n        </TableHeader>\n        <TableBody>\n          {filtered.map((user) => (\n            <TableRow key={user.id}>\n              <TableCell>{user.name}</TableCell>\n              <TableCell>{user.email}</TableCell>\n              <TableCell>{user.role}</TableCell>\n              <TableCell>{user.joined}</TableCell>\n            </TableRow>\n          ))}\n        </TableBody>\n      </Table>\n    </div>\n  );\n}\n","fwc-12":"import React, {useState} from 'react';\nimport {Dialog, DialogContent, DialogHeader, DialogTitle} from '@/components/ui/dialog';\nimport {Button} from '@/components/ui/button';\n\nconst images = [\n  {src: 'https://picsum.photos/id/10/400/300', caption: 'Mountain landscape'},\n  {src: 'https://picsum.photos/id/20/400/300', caption: 'Coastal sunset'},\n  {src: 'https://picsum.photos/id/30/400/300', caption: 'Forest path'},\n  {src: 'https://picsum.photos/id/40/400/300', caption: 'Urban skyline'},\n  {src: 'https://picsum.photos/id/50/400/300', caption: 'Desert dunes'},\n  {src: 'https://picsum.photos/id/60/400/300', caption: 'Lake reflection'},\n];\n\nexport default function ImageGrid() {\n  const [selected, setSelected] = useState<number | null>(null);\n\n  return (\n    <>\n      <div className=\"grid grid-cols-3 gap-4 p-4\">\n        {images.map((img, i) => (\n          <button\n            key={i}\n            onClick={() => setSelected(i)}\n            className=\"overflow-hidden rounded-lg border hover:ring-2 hover:ring-primary\"\n          >\n            <img src={img.src} alt={img.caption} className=\"aspect-square w-full object-cover\" />\n          </button>\n        ))}\n      </div>\n      <Dialog open={selected !== null} onOpenChange={(open) => { if (!open) setSelected(null); }}>\n        <DialogContent className=\"max-w-4xl\">\n          <DialogHeader>\n            <DialogTitle>{selected !== null ? images[selected].caption : ''}</DialogTitle>\n          </DialogHeader>\n          {selected !== null && (\n            <div className=\"flex flex-col items-center gap-4\">\n              <img src={images[selected].src} alt={images[selected].caption} className=\"max-h-[70vh] object-contain\" />\n              <p className=\"text-sm text-muted-foreground\">{images[selected].caption}</p>\n            </div>\n          )}\n        </DialogContent>\n      </Dialog>\n    </>\n  );\n}\n","io-1":"import React, {useState} from 'react';\nimport {Button} from '@/components/ui/button';\nimport {Card, CardContent, CardHeader, CardTitle} from '@/components/ui/card';\nimport {Input} from '@/components/ui/input';\nimport {Label} from '@/components/ui/label';\n\nexport default function SubscribeForm() {\n  const [email, setEmail] = useState('');\n  const [status, setStatus] = useState<'idle' | 'loading' | 'success' | 'error'>('idle');\n  const [errorMsg, setErrorMsg] = useState('');\n\n  const validateEmail = (value: string) => /^[^\\s@]+@[^\\s@]+\\.[^\\s@]+$/.test(value);\n\n  const handleSubmit = async () => {\n    if (!validateEmail(email)) {\n      setErrorMsg('Please enter a valid email address');\n      return;\n    }\n    setErrorMsg('');\n    setStatus('loading');\n    try {\n      const res = await fetch('/api/subscribe', {\n        method: 'POST',\n        headers: {'Content-Type': 'application/json'},\n        body: JSON.stringify({email}),\n      });\n      if (!res.ok) throw new Error('Failed');\n      setStatus('success');\n    } catch {\n      setStatus('error');\n      setErrorMsg('Something went wrong. Please try again.');\n    }\n  };\n\n  if (status === 'success') {\n    return (\n      <Card className=\"max-w-md\">\n        <CardContent className=\"p-6\">\n          <p className=\"text-green-600 font-medium\">Subscribed! Check your inbox for a confirmation email.</p>\n        </CardContent>\n      </Card>\n    );\n  }\n\n  return (\n    <Card className=\"max-w-md\">\n      <CardHeader>\n        <CardTitle>Subscribe to updates</CardTitle>\n      </CardHeader>\n      <CardContent className=\"space-y-4\">\n        <div className=\"space-y-2\">\n          <Label htmlFor=\"email\">Email address</Label>\n          <Input id=\"email\" type=\"email\" value={email} onChange={(e) => setEmail(e.target.value)} placeholder=\"you@example.com\" />\n          {errorMsg && <p className=\"text-sm text-destructive\">{errorMsg}</p>}\n        </div>\n        <Button onClick={handleSubmit} disabled={status === 'loading'}>\n          {status === 'loading' ? 'Subscribing...' : 'Subscribe'}\n        </Button>\n      </CardContent>\n    </Card>\n  );\n}\n","ps-3":"import React from 'react';\nimport {Button} from '@/components/ui/button';\nimport {Card, CardContent} from '@/components/ui/card';\nimport {Sheet, SheetContent, SheetTrigger} from '@/components/ui/sheet';\n\nexport default function AdminPanel() {\n  return (\n    <div className=\"flex h-screen flex-col\">\n      <header className=\"border-b px-4 py-3 flex items-center justify-between bg-background sticky top-0 z-10\">\n        <h1 className=\"text-lg font-semibold\">Admin Panel</h1>\n      </header>\n      <div className=\"flex flex-1 overflow-hidden\">\n        <aside className=\"w-56 border-r p-4 hidden md:block overflow-y-auto\">\n          <nav className=\"space-y-1\">\n            <a href=\"#\" className=\"block rounded px-3 py-2 bg-accent font-medium\">Dashboard</a>\n            <a href=\"#\" className=\"block rounded px-3 py-2 hover:bg-accent\">Analytics</a>\n            <a href=\"#\" className=\"block rounded px-3 py-2 hover:bg-accent\">Users</a>\n            <a href=\"#\" className=\"block rounded px-3 py-2 hover:bg-accent\">Roles</a>\n            <a href=\"#\" className=\"block rounded px-3 py-2 hover:bg-accent\">Settings</a>\n          </nav>\n        </aside>\n        <main className=\"flex-1 p-6 overflow-y-auto\">\n          <h2 className=\"text-xl font-bold mb-4\">Dashboard</h2>\n          <Card>\n            <CardContent className=\"p-4\">\n              Main content area with metrics, charts, and data tables.\n            </CardContent>\n          </Card>\n        </main>\n        <aside className=\"w-72 border-l p-4 hidden lg:block overflow-y-auto\">\n          <h3 className=\"text-lg font-semibold mb-3\">Details</h3>\n          <Card>\n            <CardContent className=\"p-4\">\n              Right panel for context, detail views, or quick actions.\n            </CardContent>\n          </Card>\n        </aside>\n      </div>\n    </div>\n  );\n}\n","rc-2":"import React, {useState, useEffect} from 'react';\nimport {Button} from '@/components/ui/button';\nimport {Sheet, SheetContent, SheetTrigger} from '@/components/ui/sheet';\n\nfunction NavContent() {\n  return (\n    <nav className=\"space-y-4 p-4\">\n      <h2 className=\"text-lg font-semibold\">Navigation</h2>\n      <div className=\"space-y-1\">\n        <a href=\"#\" className=\"block rounded px-3 py-2 bg-accent\">Dashboard</a>\n        <a href=\"#\" className=\"block rounded px-3 py-2 hover:bg-accent\">Projects</a>\n        <a href=\"#\" className=\"block rounded px-3 py-2 hover:bg-accent\">Tasks</a>\n      </div>\n      <h3 className=\"text-sm font-medium text-muted-foreground pt-4\">Settings</h3>\n      <div className=\"space-y-1\">\n        <a href=\"#\" className=\"block rounded px-3 py-2 hover:bg-accent\">Profile</a>\n        <a href=\"#\" className=\"block rounded px-3 py-2 hover:bg-accent\">Preferences</a>\n      </div>\n    </nav>\n  );\n}\n\nexport default function ResponsiveSidebar() {\n  const [isMobile, setIsMobile] = useState(false);\n\n  useEffect(() => {\n    const mq = window.matchMedia('(max-width: 768px)');\n    setIsMobile(mq.matches);\n    const handler = (e: MediaQueryListEvent) => setIsMobile(e.matches);\n    mq.addEventListener('change', handler);\n    return () => mq.removeEventListener('change', handler);\n  }, []);\n\n  if (isMobile) {\n    return (\n      <div className=\"p-4\">\n        <Sheet>\n          <SheetTrigger asChild>\n            <Button className=\"fixed bottom-4 right-4 z-50\">Menu</Button>\n          </SheetTrigger>\n          <SheetContent side=\"bottom\" className=\"rounded-t-2xl max-h-[60vh]\">\n            <NavContent />\n          </SheetContent>\n        </Sheet>\n        <h1 className=\"text-xl font-bold\">Page Content</h1>\n        <p className=\"text-muted-foreground\">Resize below 768px to see the bottom sheet.</p>\n      </div>\n    );\n  }\n\n  return (\n    <div className=\"flex h-screen\">\n      <aside className=\"w-64 border-r\">\n        <NavContent />\n      </aside>\n      <main className=\"flex-1 p-6\">\n        <h1 className=\"text-xl font-bold\">Page Content</h1>\n        <p className=\"text-muted-foreground\">Resize below 768px to see the bottom sheet.</p>\n      </main>\n    </div>\n  );\n}\n","sd-1":"import React, {useState, useEffect} from 'react';\nimport {Card, CardContent, CardHeader, CardTitle} from '@/components/ui/card';\nimport {Button} from '@/components/ui/button';\n\ntype State = 'loading' | 'error' | 'data';\n\nexport default function DashboardWidget() {\n  const [state, setState] = useState<State>('loading');\n\n  useEffect(() => {\n    const timer = setTimeout(() => {\n      setState(Math.random() > 0.3 ? 'data' : 'error');\n    }, 2000);\n    return () => clearTimeout(timer);\n  }, []);\n\n  const retry = () => {\n    setState('loading');\n    setTimeout(() => setState('data'), 1500);\n  };\n\n  return (\n    <Card className=\"w-96\">\n      <CardHeader>\n        <CardTitle>Active Users</CardTitle>\n      </CardHeader>\n      <CardContent>\n        {state === 'loading' && (\n          <div className=\"flex h-24 items-center justify-center\">\n            <div className=\"h-8 w-8 animate-spin rounded-full border-4 border-primary border-t-transparent\" />\n          </div>\n        )}\n        {state === 'error' && (\n          <div className=\"space-y-3\">\n            <p className=\"text-destructive\">Failed to load widget data</p>\n            <Button variant=\"secondary\" onClick={retry}>Retry</Button>\n          </div>\n        )}\n        {state === 'data' && (\n          <div className=\"space-y-1\">\n            <p className=\"text-4xl font-bold\">2,847</p>\n            <p className=\"text-sm text-muted-foreground\">+12% from yesterday</p>\n          </div>\n        )}\n      </CardContent>\n    </Card>\n  );\n}\n","tc-9":"import React from 'react';\nimport {Card, CardContent, CardHeader, CardTitle} from '@/components/ui/card';\nimport {Button} from '@/components/ui/button';\n\nexport default function DualThemeDemo() {\n  return (\n    <div className=\"flex gap-6 p-6\">\n      <div className=\"flex-1 space-y-4\" style={{'--accent': '#0077B6'} as React.CSSProperties}>\n        <h2 className=\"text-xl font-bold\" style={{color: '#0077B6'}}>Ocean Theme</h2>\n        <Card className=\"border\" style={{backgroundColor: '#f0f8ff'}}>\n          <CardContent className=\"p-4 space-y-3\">\n            <p className=\"text-sm\">Blue-toned accent with shared spacing and typography.</p>\n            <Button style={{backgroundColor: '#0077B6', color: 'white'}}>Primary Action</Button>\n          </CardContent>\n        </Card>\n      </div>\n      <div className=\"flex-1 space-y-4\" style={{'--accent': '#E76F51'} as React.CSSProperties}>\n        <h2 className=\"text-xl font-bold\" style={{color: '#E76F51'}}>Sunset Theme</h2>\n        <Card className=\"border\" style={{backgroundColor: '#fff5f0'}}>\n          <CardContent className=\"p-4 space-y-3\">\n            <p className=\"text-sm\">Warm orange accent with the same shared tokens.</p>\n            <Button style={{backgroundColor: '#E76F51', color: 'white'}}>Primary Action</Button>\n          </CardContent>\n        </Card>\n      </div>\n    </div>\n  );\n}\n","ty-3":"import React from 'react';\nimport {Card, CardContent} from '@/components/ui/card';\n\nexport default function MetricsDashboardCard() {\n  return (\n    <Card className=\"w-72\">\n      <CardContent className=\"p-4 space-y-1\">\n        <p className=\"text-sm text-muted-foreground\">Total Revenue</p>\n        <p className=\"text-3xl font-bold tabular-nums\">$12,340.56</p>\n        <p className=\"text-xs text-muted-foreground\">+12% from last month</p>\n      </CardContent>\n    </Card>\n  );\n}\n","wd-1":"import React, {useState} from 'react';\nimport {Button} from '@/components/ui/button';\nimport {Card, CardContent, CardHeader, CardTitle} from '@/components/ui/card';\nimport {Input} from '@/components/ui/input';\nimport {Label} from '@/components/ui/label';\n\ntype Step = 'cart' | 'shipping' | 'payment' | 'confirmation';\n\nexport default function CheckoutFlow() {\n  const [step, setStep] = useState<Step>('cart');\n  const [shipping, setShipping] = useState({name: '', address: '', city: ''});\n  const [payment, setPayment] = useState({card: '', expiry: '', cvv: ''});\n\n  return (\n    <div className=\"mx-auto max-w-lg p-6\">\n      <Card>\n        <CardHeader>\n          <CardTitle>\n            {step === 'cart' && 'Cart Summary'}\n            {step === 'shipping' && 'Shipping'}\n            {step === 'payment' && 'Payment'}\n            {step === 'confirmation' && 'Order Confirmed'}\n          </CardTitle>\n        </CardHeader>\n        <CardContent className=\"space-y-4\">\n          {step === 'cart' && (\n            <>\n              <p>React Handbook - $29.99</p>\n              <p>TypeScript Guide - $24.99</p>\n              <p className=\"font-semibold\">Total: $54.98</p>\n              <Button onClick={() => setStep('shipping')}>Continue to Shipping</Button>\n            </>\n          )}\n          {step === 'shipping' && (\n            <>\n              <div className=\"space-y-2\">\n                <Label htmlFor=\"name\">Full Name</Label>\n                <Input id=\"name\" value={shipping.name} onChange={(e) => setShipping({...shipping, name: e.target.value})} />\n              </div>\n              <div className=\"space-y-2\">\n                <Label htmlFor=\"address\">Address</Label>\n                <Input id=\"address\" value={shipping.address} onChange={(e) => setShipping({...shipping, address: e.target.value})} />\n              </div>\n              <div className=\"space-y-2\">\n                <Label htmlFor=\"city\">City</Label>\n                <Input id=\"city\" value={shipping.city} onChange={(e) => setShipping({...shipping, city: e.target.value})} />\n              </div>\n              <div className=\"flex justify-between\">\n                <Button variant=\"ghost\" onClick={() => setStep('cart')}>Back</Button>\n                <Button onClick={() => setStep('payment')}>Continue to Payment</Button>\n              </div>\n            </>\n          )}\n          {step === 'payment' && (\n            <>\n              <div className=\"space-y-2\">\n                <Label htmlFor=\"card\">Card Number</Label>\n                <Input id=\"card\" value={payment.card} onChange={(e) => setPayment({...payment, card: e.target.value})} />\n              </div>\n              <div className=\"space-y-2\">\n                <Label htmlFor=\"expiry\">Expiry</Label>\n                <Input id=\"expiry\" value={payment.expiry} onChange={(e) => setPayment({...payment, expiry: e.target.value})} />\n              </div>\n              <div className=\"space-y-2\">\n                <Label htmlFor=\"cvv\">CVV</Label>\n                <Input id=\"cvv\" value={payment.cvv} onChange={(e) => setPayment({...payment, cvv: e.target.value})} />\n              </div>\n              <div className=\"flex justify-between\">\n                <Button variant=\"ghost\" onClick={() => setStep('shipping')}>Back</Button>\n                <Button onClick={() => setStep('confirmation')}>Place Order</Button>\n              </div>\n            </>\n          )}\n          {step === 'confirmation' && (\n            <p>Your order has been placed. A confirmation email will be sent shortly.</p>\n          )}\n        </CardContent>\n      </Card>\n    </div>\n  );\n}\n"},"htmlSourceCode":{"cwm-3":"import React, {useState} from 'react';\n\nconst emojis = ['📄', '🎯', '🚀', '💡', '📊', '🎨', '🔥', '⭐', '📝', '🏆', '💻', '🌍'];\n\nexport default function NotionPageHeader() {\n  const [icon, setIcon] = useState('📄');\n  const [isPickerOpen, setIsPickerOpen] = useState(false);\n\n  return (\n    <div style={{border: '1px solid #e0e0e0', borderRadius: 8, overflow: 'hidden'}}>\n      <img src=\"https://picsum.photos/id/100/1200/400\" alt=\"Cover\" style={{width: '100%', height: 200, objectFit: 'cover'}} />\n      <div style={{display: 'flex', alignItems: 'center', gap: 12, padding: 16, position: 'relative'}}>\n        <button\n          onClick={() => setIsPickerOpen(!isPickerOpen)}\n          style={{fontSize: 32, background: 'none', border: 'none', cursor: 'pointer'}}\n          aria-label=\"Change icon\"\n        >\n          {icon}\n        </button>\n        {isPickerOpen && (\n          <div style={{position: 'absolute', top: 56, left: 16, background: 'white', border: '1px solid #ddd', borderRadius: 8, padding: 8, display: 'grid', gridTemplateColumns: 'repeat(6, 1fr)', gap: 4, zIndex: 10}}>\n            {emojis.map((e) => (\n              <button key={e} onClick={() => { setIcon(e); setIsPickerOpen(false); }} style={{fontSize: 20, background: 'none', border: 'none', cursor: 'pointer', padding: 4}}>\n                {e}\n              </button>\n            ))}\n          </div>\n        )}\n        <h1 style={{fontSize: 24, fontWeight: 700, margin: 0}}>Untitled Page</h1>\n      </div>\n    </div>\n  );\n}\n","dd-1":"import React, {useState, useMemo} from 'react';\n\ninterface User {\n  id: number;\n  name: string;\n  email: string;\n  role: string;\n  joined: string;\n}\n\nconst users: User[] = [\n  {id: 1, name: 'Alice Johnson', email: 'alice@example.com', role: 'Admin', joined: '2024-01-15'},\n  {id: 2, name: 'Bob Smith', email: 'bob@example.com', role: 'Editor', joined: '2024-02-20'},\n  {id: 3, name: 'Carol White', email: 'carol@example.com', role: 'Viewer', joined: '2024-03-10'},\n  {id: 4, name: 'David Brown', email: 'david@example.com', role: 'Editor', joined: '2024-04-05'},\n  {id: 5, name: 'Eve Davis', email: 'eve@example.com', role: 'Admin', joined: '2024-05-22'},\n];\n\nexport default function UserTable() {\n  const [search, setSearch] = useState('');\n  const [sortKey, setSortKey] = useState<keyof User>('name');\n  const [sortDir, setSortDir] = useState<'asc' | 'desc'>('asc');\n\n  const filtered = useMemo(() => {\n    const q = search.toLowerCase();\n    return users\n      .filter((u) => u.name.toLowerCase().includes(q) || u.email.toLowerCase().includes(q))\n      .sort((a, b) => {\n        const aVal = String(a[sortKey]);\n        const bVal = String(b[sortKey]);\n        return sortDir === 'asc' ? aVal.localeCompare(bVal) : bVal.localeCompare(aVal);\n      });\n  }, [search, sortKey, sortDir]);\n\n  const handleSort = (key: keyof User) => {\n    if (key === sortKey) setSortDir(sortDir === 'asc' ? 'desc' : 'asc');\n    else { setSortKey(key); setSortDir('asc'); }\n  };\n\n  const thStyle: React.CSSProperties = {textAlign: 'left', padding: '8px 12px', borderBottom: '2px solid #e0e0e0', cursor: 'pointer'};\n  const tdStyle: React.CSSProperties = {padding: '8px 12px', borderBottom: '1px solid #f0f0f0'};\n\n  return (\n    <div style={{padding: 16}}>\n      <input\n        placeholder=\"Search by name or email...\"\n        value={search}\n        onChange={(e) => setSearch(e.target.value)}\n        style={{width: '100%', padding: '8px 12px', border: '1px solid #ccc', borderRadius: 4, marginBottom: 16}}\n      />\n      <table style={{width: '100%', borderCollapse: 'collapse'}}>\n        <thead>\n          <tr>\n            {(['name', 'email', 'role', 'joined'] as const).map((key) => (\n              <th key={key} style={thStyle} onClick={() => handleSort(key)}>\n                {key.charAt(0).toUpperCase() + key.slice(1)}\n                {sortKey === key && (sortDir === 'asc' ? ' ↑' : ' ↓')}\n              </th>\n            ))}\n          </tr>\n        </thead>\n        <tbody>\n          {filtered.map((user) => (\n            <tr key={user.id}>\n              <td style={tdStyle}>{user.name}</td>\n              <td style={tdStyle}>{user.email}</td>\n              <td style={tdStyle}>{user.role}</td>\n              <td style={tdStyle}>{user.joined}</td>\n            </tr>\n          ))}\n        </tbody>\n      </table>\n    </div>\n  );\n}\n","fwc-12":"import React, {useState} from 'react';\n\nconst images = [\n  {src: 'https://picsum.photos/id/10/400/300', caption: 'Mountain landscape'},\n  {src: 'https://picsum.photos/id/20/400/300', caption: 'Coastal sunset'},\n  {src: 'https://picsum.photos/id/30/400/300', caption: 'Forest path'},\n  {src: 'https://picsum.photos/id/40/400/300', caption: 'Urban skyline'},\n  {src: 'https://picsum.photos/id/50/400/300', caption: 'Desert dunes'},\n  {src: 'https://picsum.photos/id/60/400/300', caption: 'Lake reflection'},\n];\n\nexport default function ImageGrid() {\n  const [selected, setSelected] = useState<number | null>(null);\n\n  return (\n    <>\n      <div style={{display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 8, padding: 16}}>\n        {images.map((img, i) => (\n          <button\n            key={i}\n            onClick={() => setSelected(i)}\n            style={{border: '1px solid #ddd', borderRadius: 8, overflow: 'hidden', cursor: 'pointer', padding: 0, background: 'none'}}\n          >\n            <img src={img.src} alt={img.caption} style={{width: '100%', aspectRatio: '1', objectFit: 'cover'}} />\n          </button>\n        ))}\n      </div>\n      {selected !== null && (\n        <div\n          style={{position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.85)', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', zIndex: 1000}}\n          onClick={() => setSelected(null)}\n        >\n          <button\n            onClick={() => setSelected(null)}\n            style={{position: 'absolute', top: 16, right: 16, background: 'white', border: 'none', borderRadius: '50%', width: 36, height: 36, fontSize: 20, cursor: 'pointer'}}\n            aria-label=\"Close\"\n          >\n            &times;\n          </button>\n          <img src={images[selected].src} alt={images[selected].caption} style={{maxWidth: '90%', maxHeight: '70vh', objectFit: 'contain'}} />\n          <p style={{color: 'white', marginTop: 12, fontSize: 14}}>{images[selected].caption}</p>\n        </div>\n      )}\n    </>\n  );\n}\n","io-1":"import React, {useState} from 'react';\n\nexport default function SubscribeForm() {\n  const [email, setEmail] = useState('');\n  const [status, setStatus] = useState<'idle' | 'loading' | 'success' | 'error'>('idle');\n  const [errorMsg, setErrorMsg] = useState('');\n\n  const validateEmail = (value: string) => /^[^\\s@]+@[^\\s@]+\\.[^\\s@]+$/.test(value);\n\n  const handleSubmit = async () => {\n    if (!validateEmail(email)) {\n      setErrorMsg('Please enter a valid email address');\n      return;\n    }\n    setErrorMsg('');\n    setStatus('loading');\n    try {\n      const res = await fetch('/api/subscribe', {\n        method: 'POST',\n        headers: {'Content-Type': 'application/json'},\n        body: JSON.stringify({email}),\n      });\n      if (!res.ok) throw new Error('Failed');\n      setStatus('success');\n    } catch {\n      setStatus('error');\n      setErrorMsg('Something went wrong. Please try again.');\n    }\n  };\n\n  if (status === 'success') {\n    return (\n      <div style={{border: '1px solid #e0e0e0', borderRadius: 8, padding: 24, maxWidth: 400}}>\n        <p style={{color: '#16a34a', fontWeight: 500}}>Subscribed! Check your inbox for a confirmation email.</p>\n      </div>\n    );\n  }\n\n  return (\n    <div style={{border: '1px solid #e0e0e0', borderRadius: 8, padding: 24, maxWidth: 400}}>\n      <h2 style={{margin: '0 0 16px', fontSize: 18, fontWeight: 600}}>Subscribe to updates</h2>\n      <div style={{marginBottom: 12}}>\n        <label style={{display: 'block', fontSize: 14, fontWeight: 500, marginBottom: 4}}>Email address</label>\n        <input\n          type=\"email\"\n          value={email}\n          onChange={(e) => setEmail(e.target.value)}\n          placeholder=\"you@example.com\"\n          style={{width: '100%', padding: '8px 12px', border: '1px solid #ccc', borderRadius: 4}}\n        />\n        {errorMsg && <p style={{color: '#dc2626', fontSize: 13, marginTop: 4}}>{errorMsg}</p>}\n      </div>\n      <button\n        onClick={handleSubmit}\n        disabled={status === 'loading'}\n        style={{padding: '10px 20px', background: '#0066cc', color: 'white', border: 'none', borderRadius: 4, cursor: 'pointer', fontWeight: 600}}\n      >\n        {status === 'loading' ? 'Subscribing...' : 'Subscribe'}\n      </button>\n    </div>\n  );\n}\n","ps-3":"import React, {useState} from 'react';\n\nexport default function AdminPanel() {\n  const [sidebarOpen, setSidebarOpen] = useState(true);\n\n  return (\n    <div style={{display: 'flex', flexDirection: 'column', height: '100vh'}}>\n      <header style={{borderBottom: '1px solid #e0e0e0', padding: '12px 16px', display: 'flex', alignItems: 'center', gap: 12, position: 'sticky', top: 0, background: 'white', zIndex: 10}}>\n        <button onClick={() => setSidebarOpen(!sidebarOpen)} style={{background: 'none', border: 'none', cursor: 'pointer', fontSize: 20}}>☰</button>\n        <h1 style={{fontSize: 18, fontWeight: 600, margin: 0}}>Admin Panel</h1>\n      </header>\n      <div style={{display: 'flex', flex: 1, overflow: 'hidden'}}>\n        {sidebarOpen && (\n          <aside style={{width: 220, borderRight: '1px solid #e0e0e0', padding: 16, overflowY: 'auto'}}>\n            <nav>\n              <a href=\"#\" style={{display: 'block', padding: '8px 12px', background: '#f0f0f0', borderRadius: 4, textDecoration: 'none', color: '#333', marginBottom: 4, fontWeight: 500}}>Dashboard</a>\n              <a href=\"#\" style={{display: 'block', padding: '8px 12px', borderRadius: 4, textDecoration: 'none', color: '#333', marginBottom: 4}}>Analytics</a>\n              <a href=\"#\" style={{display: 'block', padding: '8px 12px', borderRadius: 4, textDecoration: 'none', color: '#333', marginBottom: 4}}>Users</a>\n              <a href=\"#\" style={{display: 'block', padding: '8px 12px', borderRadius: 4, textDecoration: 'none', color: '#333', marginBottom: 4}}>Roles</a>\n              <a href=\"#\" style={{display: 'block', padding: '8px 12px', borderRadius: 4, textDecoration: 'none', color: '#333'}}>Settings</a>\n            </nav>\n          </aside>\n        )}\n        <main style={{flex: 1, padding: 24, overflowY: 'auto'}}>\n          <h2 style={{fontSize: 20, fontWeight: 700, marginBottom: 16}}>Dashboard</h2>\n          <div style={{border: '1px solid #e0e0e0', borderRadius: 8, padding: 16}}>\n            Main content area with metrics, charts, and data tables.\n          </div>\n        </main>\n        <aside style={{width: 280, borderLeft: '1px solid #e0e0e0', padding: 16, overflowY: 'auto'}}>\n          <h3 style={{fontSize: 16, fontWeight: 600, marginBottom: 12}}>Details</h3>\n          <div style={{border: '1px solid #e0e0e0', borderRadius: 8, padding: 12}}>\n            Right panel for context, detail views, or quick actions.\n          </div>\n        </aside>\n      </div>\n    </div>\n  );\n}\n","rc-2":"import React, {useState, useEffect} from 'react';\n\nfunction NavContent() {\n  return (\n    <nav>\n      <h2 style={{fontSize: 16, fontWeight: 600, margin: '0 0 12px'}}>Navigation</h2>\n      <ul style={{listStyle: 'none', padding: 0, margin: 0}}>\n        <li><a href=\"#\" style={{display: 'block', padding: '8px 12px', background: '#f0f0f0', borderRadius: 4, textDecoration: 'none', color: '#333', marginBottom: 4}}>Dashboard</a></li>\n        <li><a href=\"#\" style={{display: 'block', padding: '8px 12px', borderRadius: 4, textDecoration: 'none', color: '#333', marginBottom: 4}}>Projects</a></li>\n        <li><a href=\"#\" style={{display: 'block', padding: '8px 12px', borderRadius: 4, textDecoration: 'none', color: '#333', marginBottom: 4}}>Tasks</a></li>\n      </ul>\n      <h3 style={{fontSize: 13, color: '#666', margin: '16px 0 8px'}}>Settings</h3>\n      <ul style={{listStyle: 'none', padding: 0, margin: 0}}>\n        <li><a href=\"#\" style={{display: 'block', padding: '8px 12px', borderRadius: 4, textDecoration: 'none', color: '#333', marginBottom: 4}}>Profile</a></li>\n        <li><a href=\"#\" style={{display: 'block', padding: '8px 12px', borderRadius: 4, textDecoration: 'none', color: '#333'}}>Preferences</a></li>\n      </ul>\n    </nav>\n  );\n}\n\nexport default function ResponsiveSidebar() {\n  const [isMobile, setIsMobile] = useState(false);\n  const [isOpen, setIsOpen] = useState(false);\n\n  useEffect(() => {\n    const mq = window.matchMedia('(max-width: 768px)');\n    setIsMobile(mq.matches);\n    const handler = (e: MediaQueryListEvent) => setIsMobile(e.matches);\n    mq.addEventListener('change', handler);\n    return () => mq.removeEventListener('change', handler);\n  }, []);\n\n  if (isMobile) {\n    return (\n      <div style={{padding: 16}}>\n        <h1 style={{fontSize: 20, fontWeight: 700}}>Page Content</h1>\n        <p style={{color: '#666'}}>Resize below 768px to see the bottom sheet.</p>\n        {isOpen && (\n          <>\n            <div onClick={() => setIsOpen(false)} style={{position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.4)', zIndex: 99}} />\n            <div style={{position: 'fixed', bottom: 0, left: 0, right: 0, background: 'white', borderRadius: '16px 16px 0 0', padding: 16, maxHeight: '60vh', overflowY: 'auto', zIndex: 100}}>\n              <NavContent />\n            </div>\n          </>\n        )}\n        <button onClick={() => setIsOpen(!isOpen)} style={{position: 'fixed', bottom: 16, right: 16, padding: '10px 20px', background: '#0066cc', color: 'white', border: 'none', borderRadius: 8, cursor: 'pointer', zIndex: 50}}>Menu</button>\n      </div>\n    );\n  }\n\n  return (\n    <div style={{display: 'flex', height: '100vh'}}>\n      <aside style={{width: 240, borderRight: '1px solid #e0e0e0', padding: 16}}>\n        <NavContent />\n      </aside>\n      <main style={{flex: 1, padding: 24}}>\n        <h1 style={{fontSize: 20, fontWeight: 700}}>Page Content</h1>\n        <p style={{color: '#666'}}>Resize below 768px to see the bottom sheet.</p>\n      </main>\n    </div>\n  );\n}\n","sd-1":"import React, {useState, useEffect} from 'react';\n\ntype State = 'loading' | 'error' | 'data';\n\nexport default function DashboardWidget() {\n  const [state, setState] = useState<State>('loading');\n\n  useEffect(() => {\n    const timer = setTimeout(() => {\n      setState(Math.random() > 0.3 ? 'data' : 'error');\n    }, 2000);\n    return () => clearTimeout(timer);\n  }, []);\n\n  const retry = () => {\n    setState('loading');\n    setTimeout(() => setState('data'), 1500);\n  };\n\n  return (\n    <div style={{border: '1px solid #e0e0e0', borderRadius: 8, padding: 20, maxWidth: 360}}>\n      <h3 style={{margin: '0 0 12px', fontSize: 16, fontWeight: 600}}>Active Users</h3>\n      {state === 'loading' && (\n        <div style={{display: 'flex', justifyContent: 'center', padding: 32}}>\n          <div style={{width: 32, height: 32, border: '3px solid #e0e0e0', borderTopColor: '#0066cc', borderRadius: '50%', animation: 'spin 1s linear infinite'}} />\n          <style>{`@keyframes spin { to { transform: rotate(360deg) } }`}</style>\n        </div>\n      )}\n      {state === 'error' && (\n        <div>\n          <p style={{color: '#dc2626', marginBottom: 8}}>Failed to load widget data</p>\n          <button onClick={retry} style={{padding: '6px 12px', border: '1px solid #ccc', borderRadius: 4, cursor: 'pointer'}}>Retry</button>\n        </div>\n      )}\n      {state === 'data' && (\n        <div>\n          <p style={{fontSize: 36, fontWeight: 700, margin: 0}}>2,847</p>\n          <p style={{fontSize: 13, color: '#666', margin: '4px 0 0'}}>+12% from yesterday</p>\n        </div>\n      )}\n    </div>\n  );\n}\n","tc-9":"import React from 'react';\n\nconst sharedStyle = {fontFamily: 'Inter, system-ui, sans-serif', fontSize: 14, lineHeight: 1.5};\n\nexport default function DualThemeDemo() {\n  return (\n    <div style={{display: 'flex', gap: 24, padding: 24, ...sharedStyle}}>\n      <div style={{flex: 1}}>\n        <h2 style={{fontSize: 20, fontWeight: 700, color: '#0077B6', marginBottom: 12}}>Ocean Theme</h2>\n        <div style={{background: '#f0f8ff', border: '1px solid #b8d4e8', borderRadius: 8, padding: 16}}>\n          <p style={{margin: '0 0 12px'}}>Blue-toned accent with shared spacing and typography.</p>\n          <button style={{padding: '8px 16px', background: '#0077B6', color: 'white', border: 'none', borderRadius: 4, cursor: 'pointer', fontWeight: 600}}>Primary Action</button>\n        </div>\n      </div>\n      <div style={{flex: 1}}>\n        <h2 style={{fontSize: 20, fontWeight: 700, color: '#E76F51', marginBottom: 12}}>Sunset Theme</h2>\n        <div style={{background: '#fff5f0', border: '1px solid #e8c4b8', borderRadius: 8, padding: 16}}>\n          <p style={{margin: '0 0 12px'}}>Warm orange accent with the same shared tokens.</p>\n          <button style={{padding: '8px 16px', background: '#E76F51', color: 'white', border: 'none', borderRadius: 4, cursor: 'pointer', fontWeight: 600}}>Primary Action</button>\n        </div>\n      </div>\n    </div>\n  );\n}\n","ty-3":"import React from 'react';\n\nexport default function MetricsDashboardCard() {\n  return (\n    <div style={{border: '1px solid #e0e0e0', borderRadius: 8, padding: 16, maxWidth: 280}}>\n      <p style={{fontSize: 13, color: '#666', margin: '0 0 4px'}}>Total Revenue</p>\n      <p style={{fontSize: 32, fontWeight: 700, margin: '0 0 4px', fontVariantNumeric: 'tabular-nums'}}>$12,340.56</p>\n      <p style={{fontSize: 12, color: '#666', margin: 0}}>+12% from last month</p>\n    </div>\n  );\n}\n","wd-1":"import React, {useState} from 'react';\n\ntype Step = 'cart' | 'shipping' | 'payment' | 'confirmation';\n\nexport default function CheckoutFlow() {\n  const [step, setStep] = useState<Step>('cart');\n  const [shipping, setShipping] = useState({name: '', address: '', city: ''});\n  const [payment, setPayment] = useState({card: '', expiry: '', cvv: ''});\n\n  const cardStyle: React.CSSProperties = {border: '1px solid #e0e0e0', borderRadius: 8, padding: 24, maxWidth: 500, margin: '0 auto'};\n  const inputStyle: React.CSSProperties = {width: '100%', padding: '8px 12px', border: '1px solid #ccc', borderRadius: 4, marginTop: 4};\n  const btnStyle: React.CSSProperties = {padding: '10px 20px', border: 'none', borderRadius: 4, cursor: 'pointer', fontWeight: 600};\n  const primaryBtn: React.CSSProperties = {...btnStyle, background: '#0066cc', color: 'white'};\n  const ghostBtn: React.CSSProperties = {...btnStyle, background: 'transparent', color: '#666'};\n\n  return (\n    <div style={cardStyle}>\n      {step === 'cart' && (\n        <div>\n          <h2 style={{margin: '0 0 16px'}}>Cart Summary</h2>\n          <p>React Handbook - $29.99</p>\n          <p>TypeScript Guide - $24.99</p>\n          <p style={{fontWeight: 600, marginTop: 8}}>Total: $54.98</p>\n          <div style={{marginTop: 16, textAlign: 'right'}}>\n            <button style={primaryBtn} onClick={() => setStep('shipping')}>Continue to Shipping</button>\n          </div>\n        </div>\n      )}\n      {step === 'shipping' && (\n        <div>\n          <h2 style={{margin: '0 0 16px'}}>Shipping</h2>\n          <label>Full Name<input style={inputStyle} value={shipping.name} onChange={(e) => setShipping({...shipping, name: e.target.value})} /></label>\n          <label style={{display: 'block', marginTop: 12}}>Address<input style={inputStyle} value={shipping.address} onChange={(e) => setShipping({...shipping, address: e.target.value})} /></label>\n          <label style={{display: 'block', marginTop: 12}}>City<input style={inputStyle} value={shipping.city} onChange={(e) => setShipping({...shipping, city: e.target.value})} /></label>\n          <div style={{display: 'flex', justifyContent: 'space-between', marginTop: 16}}>\n            <button style={ghostBtn} onClick={() => setStep('cart')}>Back</button>\n            <button style={primaryBtn} onClick={() => setStep('payment')}>Continue to Payment</button>\n          </div>\n        </div>\n      )}\n      {step === 'payment' && (\n        <div>\n          <h2 style={{margin: '0 0 16px'}}>Payment</h2>\n          <label>Card Number<input style={inputStyle} value={payment.card} onChange={(e) => setPayment({...payment, card: e.target.value})} /></label>\n          <label style={{display: 'block', marginTop: 12}}>Expiry<input style={inputStyle} value={payment.expiry} onChange={(e) => setPayment({...payment, expiry: e.target.value})} /></label>\n          <label style={{display: 'block', marginTop: 12}}>CVV<input style={inputStyle} value={payment.cvv} onChange={(e) => setPayment({...payment, cvv: e.target.value})} /></label>\n          <div style={{display: 'flex', justifyContent: 'space-between', marginTop: 16}}>\n            <button style={ghostBtn} onClick={() => setStep('shipping')}>Back</button>\n            <button style={primaryBtn} onClick={() => setStep('confirmation')}>Place Order</button>\n          </div>\n        </div>\n      )}\n      {step === 'confirmation' && (\n        <div>\n          <h2 style={{margin: '0 0 16px'}}>Order Confirmed</h2>\n          <p>Your order has been placed. A confirmation email will be sent shortly.</p>\n        </div>\n      )}\n    </div>\n  );\n}\n"},"astryxTailwindSourceCode":{"cwm-3":"import React, {useState} from 'react';\nimport {Card} from '@astryxdesign/core/Card';\nimport {Text} from '@astryxdesign/core/Text';\nimport {Button} from '@astryxdesign/core/Button';\nimport {Popover} from '@astryxdesign/core/Popover';\nimport stylex from '@stylexjs/stylex';\n\nconst styles = stylex.create({\n  header: {\n    display: 'flex',\n    flexDirection: 'column',\n    gap: 8,\n  },\n  coverImage: {\n    width: '100%',\n    height: 200,\n    objectFit: 'cover',\n    borderRadius: 8,\n  },\n  titleRow: {\n    display: 'flex',\n    alignItems: 'center',\n    gap: 12,\n    padding: 16,\n  },\n  icon: {\n    fontSize: 32,\n    cursor: 'pointer',\n  },\n  emojiGrid: {\n    display: 'grid',\n    gridTemplateColumns: 'repeat(6, 1fr)',\n    gap: 4,\n    padding: 8,\n  },\n  emojiBtn: {\n    fontSize: 24,\n    cursor: 'pointer',\n    padding: 4,\n    borderRadius: 4,\n    border: 'none',\n    background: 'transparent',\n  },\n});\n\nconst emojis = ['📄', '🎯', '🚀', '💡', '📊', '🎨', '🔥', '⭐', '📝', '🏆', '💻', '🌍'];\n\nexport default function NotionPageHeader() {\n  const [icon, setIcon] = useState('📄');\n  const [coverUrl] = useState('https://picsum.photos/id/100/1200/400');\n  const [isPickerOpen, setIsPickerOpen] = useState(false);\n\n  return (\n    <Card padding={0}>\n      <div {...stylex.props(styles.header)}>\n        <img src={coverUrl} alt=\"Page cover\" {...stylex.props(styles.coverImage)} />\n        <div {...stylex.props(styles.titleRow)}>\n          <Popover\n            isOpen={isPickerOpen}\n            onOpenChange={setIsPickerOpen}\n            trigger={\n              <button {...stylex.props(styles.icon)} aria-label=\"Change icon\">\n                {icon}\n              </button>\n            }\n            placement=\"below-start\"\n          >\n            <div {...stylex.props(styles.emojiGrid)}>\n              {emojis.map((e) => (\n                <button\n                  key={e}\n                  {...stylex.props(styles.emojiBtn)}\n                  onClick={() => { setIcon(e); setIsPickerOpen(false); }}\n                >\n                  {e}\n                </button>\n              ))}\n            </div>\n          </Popover>\n          <Text type=\"display-2\">Untitled Page</Text>\n        </div>\n      </div>\n    </Card>\n  );\n}\n","dd-1":"import React, {useState, useMemo} from 'react';\nimport {Table} from '@astryxdesign/core/Table';\nimport {TextInput} from '@astryxdesign/core/TextInput';\nimport stylex from '@stylexjs/stylex';\n\nconst styles = stylex.create({\n  container: {\n    display: 'flex',\n    flexDirection: 'column',\n    gap: 16,\n    padding: 16,\n  },\n});\n\ninterface User extends Record<string, unknown> {\n  id: number;\n  name: string;\n  email: string;\n  role: string;\n  joined: string;\n}\n\nconst users: User[] = [\n  {id: 1, name: 'Alice Johnson', email: 'alice@example.com', role: 'Admin', joined: '2024-01-15'},\n  {id: 2, name: 'Bob Smith', email: 'bob@example.com', role: 'Editor', joined: '2024-02-20'},\n  {id: 3, name: 'Carol White', email: 'carol@example.com', role: 'Viewer', joined: '2024-03-10'},\n  {id: 4, name: 'David Brown', email: 'david@example.com', role: 'Editor', joined: '2024-04-05'},\n  {id: 5, name: 'Eve Davis', email: 'eve@example.com', role: 'Admin', joined: '2024-05-22'},\n];\n\nexport default function UserTable() {\n  const [search, setSearch] = useState('');\n  const [sortKey, setSortKey] = useState<keyof User>('name');\n  const [sortDir, setSortDir] = useState<'asc' | 'desc'>('asc');\n\n  const filtered = useMemo(() => {\n    const q = search.toLowerCase();\n    return users\n      .filter((u) => u.name.toLowerCase().includes(q) || u.email.toLowerCase().includes(q))\n      .sort((a, b) => {\n        const aVal = String(a[sortKey]);\n        const bVal = String(b[sortKey]);\n        return sortDir === 'asc' ? aVal.localeCompare(bVal) : bVal.localeCompare(aVal);\n      });\n  }, [search, sortKey, sortDir]);\n\n  const handleSort = (key: keyof User) => {\n    if (key === sortKey) {\n      setSortDir(sortDir === 'asc' ? 'desc' : 'asc');\n    } else {\n      setSortKey(key);\n      setSortDir('asc');\n    }\n  };\n\n  const columns = [\n    {key: 'name' as const, header: 'Name'},\n    {key: 'email' as const, header: 'Email'},\n    {key: 'role' as const, header: 'Role'},\n    {key: 'joined' as const, header: 'Joined'},\n  ];\n\n  return (\n    <div {...stylex.props(styles.container)}>\n      <TextInput label=\"Search users\" value={search} onChange={setSearch} placeholder=\"Search by name or email...\" />\n      <Table\n        data={filtered}\n        columns={columns}\n        idKey=\"id\"\n        hasHover\n      />\n    </div>\n  );\n}\n","fwc-12":"import React, {useState} from 'react';\nimport {Dialog} from '@astryxdesign/core/Dialog';\nimport {DialogHeader} from '@astryxdesign/core/Dialog';\nimport {DialogBody} from '@astryxdesign/core/Dialog';\nimport {Thumbnail} from '@astryxdesign/core/Thumbnail';\nimport {Text} from '@astryxdesign/core/Text';\nimport stylex from '@stylexjs/stylex';\n\nconst styles = stylex.create({\n  grid: {\n    display: 'grid',\n    gridTemplateColumns: 'repeat(auto-fill, minmax(120px, 1fr))',\n    gap: 8,\n    padding: 16,\n  },\n  lightbox: {\n    display: 'flex',\n    flexDirection: 'column',\n    alignItems: 'center',\n    gap: 12,\n  },\n  image: {\n    maxWidth: '100%',\n    maxHeight: '70vh',\n    objectFit: 'contain',\n  },\n});\n\nconst images = [\n  {src: 'https://picsum.photos/id/10/400/300', caption: 'Mountain landscape'},\n  {src: 'https://picsum.photos/id/20/400/300', caption: 'Coastal sunset'},\n  {src: 'https://picsum.photos/id/30/400/300', caption: 'Forest path'},\n  {src: 'https://picsum.photos/id/40/400/300', caption: 'Urban skyline'},\n  {src: 'https://picsum.photos/id/50/400/300', caption: 'Desert dunes'},\n  {src: 'https://picsum.photos/id/60/400/300', caption: 'Lake reflection'},\n];\n\nexport default function ImageGrid() {\n  const [selected, setSelected] = useState<number | null>(null);\n\n  return (\n    <>\n      <div {...stylex.props(styles.grid)}>\n        {images.map((img, i) => (\n          <Thumbnail\n            key={i}\n            src={img.src}\n            alt={img.caption}\n            label={img.caption}\n            onClick={() => setSelected(i)}\n          />\n        ))}\n      </div>\n      <Dialog\n        isOpen={selected !== null}\n        onOpenChange={(open) => { if (!open) setSelected(null); }}\n        variant=\"fullscreen\"\n      >\n        <DialogHeader title={selected !== null ? images[selected].caption : ''} />\n        <DialogBody>\n          {selected !== null && (\n            <div {...stylex.props(styles.lightbox)}>\n              <img\n                src={images[selected].src}\n                alt={images[selected].caption}\n                {...stylex.props(styles.image)}\n              />\n              <Text type=\"body\">{images[selected].caption}</Text>\n            </div>\n          )}\n        </DialogBody>\n      </Dialog>\n    </>\n  );\n}\n","io-1":"import React, {useState} from 'react';\nimport {TextInput} from '@astryxdesign/core/TextInput';\nimport {Button} from '@astryxdesign/core/Button';\nimport {Card} from '@astryxdesign/core/Card';\nimport {Text} from '@astryxdesign/core/Text';\nimport {Banner} from '@astryxdesign/core/Banner';\nimport stylex from '@stylexjs/stylex';\n\nconst styles = stylex.create({\n  form: {\n    display: 'flex',\n    flexDirection: 'column',\n    gap: 16,\n    maxWidth: 400,\n    padding: 16,\n  },\n});\n\nexport default function SubscribeForm() {\n  const [email, setEmail] = useState('');\n  const [status, setStatus] = useState<'idle' | 'loading' | 'success' | 'error'>('idle');\n  const [errorMsg, setErrorMsg] = useState('');\n\n  const validateEmail = (value: string) => {\n    const re = /^[^\\s@]+@[^\\s@]+\\.[^\\s@]+$/;\n    return re.test(value);\n  };\n\n  const handleSubmit = async () => {\n    if (!validateEmail(email)) {\n      setErrorMsg('Please enter a valid email address');\n      return;\n    }\n    setErrorMsg('');\n    setStatus('loading');\n    try {\n      const res = await fetch('/api/subscribe', {\n        method: 'POST',\n        headers: {'Content-Type': 'application/json'},\n        body: JSON.stringify({email}),\n      });\n      if (!res.ok) throw new Error('Subscription failed');\n      setStatus('success');\n    } catch {\n      setStatus('error');\n      setErrorMsg('Something went wrong. Please try again.');\n    }\n  };\n\n  if (status === 'success') {\n    return (\n      <Card padding={4}>\n        <Banner variant=\"success\" title=\"Subscribed!\" description=\"Check your inbox for a confirmation email.\" />\n      </Card>\n    );\n  }\n\n  return (\n    <Card padding={4}>\n      <div {...stylex.props(styles.form)}>\n        <Text type=\"display-3\">Subscribe to updates</Text>\n        <TextInput\n          label=\"Email address\"\n          type=\"email\"\n          value={email}\n          onChange={setEmail}\n          placeholder=\"you@example.com\"\n          status={errorMsg ? {type: 'error', message: errorMsg} : undefined}\n          isRequired\n        />\n        <Button\n          label=\"Subscribe\"\n          variant=\"primary\"\n          isLoading={status === 'loading'}\n          onClick={handleSubmit}\n        />\n      </div>\n    </Card>\n  );\n}\n","ps-3":"import React from 'react';\nimport {AppShell} from '@astryxdesign/core/AppShell';\nimport {TopNav} from '@astryxdesign/core/TopNav';\nimport {SideNav} from '@astryxdesign/core/SideNav';\nimport {SideNavItem} from '@astryxdesign/core/SideNav';\nimport {SideNavSection} from '@astryxdesign/core/SideNav';\nimport {SideNavHeading} from '@astryxdesign/core/SideNav';\nimport {Text} from '@astryxdesign/core/Text';\nimport {Card} from '@astryxdesign/core/Card';\nimport {Theme} from '@astryxdesign/core/theme';\nimport {defineTheme} from '@astryxdesign/core/theme';\nimport stylex from '@stylexjs/stylex';\n\nconst styles = stylex.create({\n  content: {\n    display: 'grid',\n    gridTemplateColumns: '1fr 320px',\n    gap: 16,\n    padding: 24,\n    height: '100%',\n  },\n  main: {\n    display: 'flex',\n    flexDirection: 'column',\n    gap: 16,\n  },\n  details: {\n    display: 'flex',\n    flexDirection: 'column',\n    gap: 12,\n  },\n});\n\nconst adminTheme = defineTheme({\n  name: 'admin',\n  tokens: {\n    '--color-accent': '#4f46e5',\n  },\n});\n\nexport default function AdminPanel() {\n  return (\n    <Theme theme={adminTheme} mode=\"light\">\n      <AppShell\n        topNav={<TopNav title=\"Admin Panel\" />}\n        sideNav={\n          <SideNav\n            collapsible\n            header={<SideNavHeading>Admin</SideNavHeading>}\n          >\n            <SideNavSection title=\"Overview\">\n              <SideNavItem label=\"Dashboard\" isSelected />\n              <SideNavItem label=\"Analytics\" />\n            </SideNavSection>\n            <SideNavSection title=\"Management\">\n              <SideNavItem label=\"Users\" />\n              <SideNavItem label=\"Roles\" />\n              <SideNavItem label=\"Settings\" />\n            </SideNavSection>\n          </SideNav>\n        }\n      >\n        <div {...stylex.props(styles.content)}>\n          <div {...stylex.props(styles.main)}>\n            <Text type=\"display-3\">Dashboard</Text>\n            <Card padding={4}>\n              <Text type=\"body\">Main content area with metrics, charts, and data tables.</Text>\n            </Card>\n          </div>\n          <div {...stylex.props(styles.details)}>\n            <Text type=\"display-3\">Details</Text>\n            <Card padding={3}>\n              <Text type=\"body\">Right panel for context, detail views, or quick actions.</Text>\n            </Card>\n          </div>\n        </div>\n      </AppShell>\n    </Theme>\n  );\n}\n","rc-2":"import React, {useState, useEffect} from 'react';\nimport {SideNav} from '@astryxdesign/core/SideNav';\nimport {SideNavItem} from '@astryxdesign/core/SideNav';\nimport {SideNavSection} from '@astryxdesign/core/SideNav';\nimport {SideNavHeading} from '@astryxdesign/core/SideNav';\nimport {Button} from '@astryxdesign/core/Button';\nimport {Text} from '@astryxdesign/core/Text';\nimport stylex from '@stylexjs/stylex';\n\nconst styles = stylex.create({\n  layout: {\n    display: 'flex',\n    height: '100vh',\n  },\n  sidebar: {\n    width: 280,\n    borderRight: '1px solid var(--color-border-default)',\n  },\n  bottomSheet: {\n    position: 'fixed',\n    bottom: 0,\n    left: 0,\n    right: 0,\n    backgroundColor: 'var(--color-background-surface)',\n    borderTop: '1px solid var(--color-border-default)',\n    borderRadius: '16px 16px 0 0',\n    padding: 16,\n    maxHeight: '60vh',\n    overflowY: 'auto',\n    zIndex: 100,\n  },\n  overlay: {\n    position: 'fixed',\n    inset: 0,\n    backgroundColor: 'rgba(0, 0, 0, 0.4)',\n    zIndex: 99,\n  },\n  main: {\n    flex: 1,\n    padding: 24,\n  },\n  mobileToggle: {\n    position: 'fixed',\n    bottom: 16,\n    right: 16,\n    zIndex: 50,\n  },\n});\n\nexport default function ResponsiveSidebar() {\n  const [isMobile, setIsMobile] = useState(false);\n  const [isSheetOpen, setIsSheetOpen] = useState(false);\n\n  useEffect(() => {\n    const mq = window.matchMedia('(max-width: 768px)');\n    setIsMobile(mq.matches);\n    const handler = (e: MediaQueryListEvent) => setIsMobile(e.matches);\n    mq.addEventListener('change', handler);\n    return () => mq.removeEventListener('change', handler);\n  }, []);\n\n  const navContent = (\n    <SideNav header={<SideNavHeading>Navigation</SideNavHeading>}>\n      <SideNavSection title=\"Main\">\n        <SideNavItem label=\"Dashboard\" isSelected />\n        <SideNavItem label=\"Projects\" />\n        <SideNavItem label=\"Tasks\" />\n      </SideNavSection>\n      <SideNavSection title=\"Settings\">\n        <SideNavItem label=\"Profile\" />\n        <SideNavItem label=\"Preferences\" />\n      </SideNavSection>\n    </SideNav>\n  );\n\n  if (isMobile) {\n    return (\n      <div>\n        <div {...stylex.props(styles.main)}>\n          <Text type=\"display-3\">Page Content</Text>\n          <Text type=\"body\">Resize the window below 768px to see the bottom sheet.</Text>\n        </div>\n        {isSheetOpen && (\n          <>\n            <div {...stylex.props(styles.overlay)} onClick={() => setIsSheetOpen(false)} />\n            <div {...stylex.props(styles.bottomSheet)}>\n              {navContent}\n            </div>\n          </>\n        )}\n        <div {...stylex.props(styles.mobileToggle)}>\n          <Button label=\"Menu\" variant=\"primary\" onClick={() => setIsSheetOpen(!isSheetOpen)} />\n        </div>\n      </div>\n    );\n  }\n\n  return (\n    <div {...stylex.props(styles.layout)}>\n      <div {...stylex.props(styles.sidebar)}>\n        {navContent}\n      </div>\n      <div {...stylex.props(styles.main)}>\n        <Text type=\"display-3\">Page Content</Text>\n        <Text type=\"body\">Resize the window below 768px to see the bottom sheet.</Text>\n      </div>\n    </div>\n  );\n}\n","sd-1":"import React, {useState, useEffect} from 'react';\nimport {Card} from '@astryxdesign/core/Card';\nimport {Spinner} from '@astryxdesign/core/Spinner';\nimport {Text} from '@astryxdesign/core/Text';\nimport {Button} from '@astryxdesign/core/Button';\nimport {Banner} from '@astryxdesign/core/Banner';\nimport stylex from '@stylexjs/stylex';\n\nconst styles = stylex.create({\n  container: {\n    maxWidth: 400,\n    padding: 16,\n  },\n  centered: {\n    display: 'flex',\n    justifyContent: 'center',\n    alignItems: 'center',\n    minHeight: 120,\n  },\n  data: {\n    display: 'flex',
