# Review signal — deterministic labels that route reviews and gate auto-merge.
#
# On PR open/update this workflow inspects the changed file paths (never the
# code itself) and the PR author, then applies up to two labels:
#
#   needs:code-review   — HIGH-RISK code areas: a new package, a new
#                         component/module (in core — NOT lab, which is the
#                         canary staging area), any runtime change under
#                         core/src (incl. styling — core has high blast radius),
#                         or public API surface, NOT confined to low-risk areas
#                         (themes, templates, sandbox, storybook, docsite).
#                         Requests review from CODEOWNERS. Skipped when the
#                         author is an ENGOWNER (eng self-serves code).
#
#   needs:design-review — DESIGN-AFFECTING changes anywhere: StyleX styling,
#                         theme/token files, or a template's .tsx. Keyed on
#                         visual signals only — NOT docs and NOT "a new dir
#                         appeared" (styleless modules don't count). NOT
#                         area-gated — a theme/template edit is where design
#                         lives. Requests review from DESIGNOWNERS. Skipped when
#                         the author is a DESIGNOWNER (design self-serves design).
#
# Either label DISABLES auto-merge so the PR can't merge unattended, and is
# cleared when an entitled owner approves (code → CODEOWNER; design → DESIGNOWNER
# or CODEOWNER). Detection is path-based and deterministic; the Copilot reviewer
# reads these labels to focus its review (see .github/copilot-instructions.md).
#
# HARD GATE: this also emits a "review-required" CHECK RUN. When gated, its
# conclusion is action_required — which blocks a required check (GitHub treats
# only success/skipped/neutral as passing) yet renders as an orange "Action
# required", NOT a red failure, so the UI reads "needs review" not "broken". An
# owner's approval flips it to success. Make "review-required" a REQUIRED status
# check in branch protection: a required check blocks non-admin merges even for
# internal contributors who have write access (write lets you merge a green PR,
# not a blocked one). With this in place, native required-review count can drop
# to 0 — the check is the author-aware gate.
#
# Uses pull_request_target so it can label / request reviewers / disable
# auto-merge on fork PRs. It only reads the PR file LIST and repo owner files via
# the API — it never checks out or runs PR-controlled code. Do not add checkout
# or build steps here.

name: Review signal

on:
  pull_request_target:
    branches: ["main"]
    types: [opened, synchronize, reopened, ready_for_review, converted_to_draft]
  pull_request_review:
    types: [submitted]
  # Manual re-trigger. The App only auto-runs on the PR events above, so if it
  # ever misses one (e.g. the workflow was added after a PR was opened, leaving
  # the required "review-required" check stuck as Expected/pending), this is the
  # recovery lever. Leave `pr` blank to re-flag EVERY open PR (backfill); pass a
  # number to re-flag just that one.
  workflow_dispatch:
    inputs:
      pr:
        description: "PR number to re-flag (blank = all open PRs)"
        required: false
        type: string

permissions: {}

concurrency:
  # One group per PR for the event/single-dispatch paths; a run-scoped group for
  # the backfill-all dispatch so it is never cancelled by an unrelated re-run.
  group: review-signal-${{ github.event.pull_request.number || github.event.inputs.pr || github.run_id }}
  cancel-in-progress: true

env:
  CODE_LABEL: "needs:code-review"
  DESIGN_LABEL: "needs:design-review"
  COMMUNITY_LABEL: "community"

jobs:
  # ---------------------------------------------------------------------------
  # Detect signals from changed paths + author; label, request reviewers, gate.
  # ---------------------------------------------------------------------------
  flag:
    if: >-
      github.event_name == 'pull_request_target'
      || github.event_name == 'workflow_dispatch'
    name: Flag review signals
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
      checks: write
    steps:
      - name: Detect signals and route
        uses: actions/github-script@v9
        with:
          script: |
            const { owner, repo } = context.repo;
            const CODE = process.env.CODE_LABEL;
            const DESIGN = process.env.DESIGN_LABEL;
            const COMMUNITY = process.env.COMMUNITY_LABEL;

            // Resolve which PR(s) to flag. On a PR event we get the payload PR.
            // On manual dispatch we take the `pr` input (one PR), or re-flag
            // every open PR when it's blank (backfill / mass recovery).
            let prs;
            if (context.eventName === 'workflow_dispatch') {
              const num = (context.payload.inputs.pr || '').trim();
              if (num) {
                const { data } = await github.rest.pulls.get({
                  owner, repo, pull_number: Number(num),
                });
                prs = [data];
              } else {
                prs = await github.paginate(github.rest.pulls.list, {
                  owner, repo, state: 'open', per_page: 100,
                });
                core.info(`Backfill: re-flagging ${prs.length} open PR(s).`);
              }
            } else {
              prs = [context.payload.pull_request];
            }

            let hadError = false;
            for (const pr of prs) {
              try {
                await flagOne(pr);
              } catch (e) {
                hadError = true;
                core.warning(`Failed to flag PR #${pr.number}: ${e.message}`);
              }
            }
            if (hadError) core.setFailed('One or more PRs failed to flag; see warnings.');

            // ================= per-PR detection + routing =================
            async function flagOne(pr) {
            const author = pr.user.login.toLowerCase();
            // Bots (Dependabot, github-actions, etc.) are our own automation,
            // not community contributors, and their PRs (dep bumps, chores) are
            // mechanical and CI-gated. Exempt them from both the review gates
            // and the community label entirely.
            const authorIsBot = pr.user.type === 'Bot' || /\[bot\]$/.test(author);

            // --- Read owner sets from repo files at the base ref. ---
            async function handlesFrom(path, { starLineOnly = false } = {}) {
              try {
                const { data } = await github.rest.repos.getContent({
                  owner, repo, path, ref: pr.base.ref,
                });
                let text = Buffer.from(data.content, 'base64').toString('utf8');
                if (starLineOnly) {
                  const star = text.split('\n').map((l) => l.trim())
                    .find((l) => l.startsWith('*'));
                  text = star || '';
                }
                // Strip comment lines (# ...) so an @handle mentioned in a
                // file header comment is not parsed as a real owner.
                const body = text
                  .split('\n')
                  .filter((l) => !l.trim().startsWith('#'))
                  .join('\n');
                return (body.match(/@[A-Za-z0-9-]+/g) || [])
                  .map((h) => h.slice(1).toLowerCase());
              } catch (e) {
                core.warning(`Could not read ${path}: ${e.message}`);
                return [];
              }
            }
            const engOwners = await handlesFrom('.github/ENGOWNERS');
            const designOwners = await handlesFrom('.github/DESIGNOWNERS');
            const codeOwners = await handlesFrom('.github/CODEOWNERS', { starLineOnly: true });
            const authorIsEng = engOwners.includes(author);
            const authorIsDesign = designOwners.includes(author);

            // Bot PRs: no gate, no community label. Set the check to success so
            // a required "review-required" doesn't block them, drop any stray
            // gate/community labels, and stop.
            if (authorIsBot) {
              core.info(`@${author} is a bot — exempt from review gates.`);
              const current = pr.labels.map((l) => l.name);
              for (const name of [CODE, DESIGN, COMMUNITY]) {
                if (current.includes(name)) {
                  try {
                    await github.rest.issues.removeLabel({
                      owner, repo, issue_number: pr.number, name,
                    });
                  } catch (e) {
                    core.warning(`Could not remove ${name}: ${e.message}`);
                  }
                }
              }
              try {
                await github.rest.checks.create({
                  owner, repo, name: 'review-required', head_sha: pr.head.sha,
                  status: 'completed', conclusion: 'success',
                  output: { title: 'No review required', summary: 'Automated (bot) PR — exempt from review gates.' },
                });
              } catch (e) {
                core.warning(`Could not set review-required check: ${e.message}`);
              }
              return;
            }

            // --- Changed files. ---
            const allFiles = await github.paginate(github.rest.pulls.listFiles, {
              owner, repo, pull_number: pr.number, per_page: 100,
            });
            // lab is the canary-only staging area — new components are EXPECTED
            // to develop and harden there before promotion. Skip the entire
            // packages/lab/** folder for ALL signal detection (code and design)
            // by filtering it out once, up front. lab is a SAFE SPACE (below).
            const isLab = (p) => /^packages\/lab\//.test(p);
            const files = allFiles.filter((f) => !isLab(f.filename));
            const paths = files.map((f) => f.filename);

            // Two DIFFERENT categories — do not conflate them:
            //
            //   SAFE SPACES — experimentation / staging. Exempt from BOTH gates.
            //     No review of any kind is expected here.
            //     lab (filtered above), sandbox, storybook.
            //
            //   DESIGN SPACES — where design work lives. Exempt from the CODE
            //     gate (low-risk for code), but they TRIGGER the DESIGN gate.
            //     themes, templates, docsite.
            //
            // Both are low-risk for the CODE gate, so the code gate ignores
            // their union; only the design gate cares about the distinction.
            const isSafeSpace = (p) =>
              isLab(p) || /^apps\/(sandbox|storybook)\//.test(p);
            const isDesignSpace = (p) =>
              /^packages\/themes\//.test(p) ||
              /^packages\/cli\/templates\//.test(p) ||
              /^apps\/docsite\//.test(p);
            // Code gate ignores both categories.
            const isCodeExempt = (p) => isSafeSpace(p) || isDesignSpace(p);
            const consideredCode = paths.filter((p) => !isCodeExempt(p));

            // A "source barrel" is packages/<pkg>/src/**/index.ts(x). We do NOT
            // hardcode which packages are component libraries — any package's
            // src barrel counts, so new packages are covered automatically.
            // Safe/design spaces and lab are already excluded above.
            const isSrcBarrel = (p) =>
              /^packages\/[^/]+\/src\/(.+\/)?index\.tsx?$/.test(p);
            // A NEW component/module is a newly-added top-level src dir barrel.
            const isNewComponentBarrel = (p) =>
              /^packages\/[^/]+\/src\/[^/]+\/index\.tsx?$/.test(p) &&
              !isCodeExempt(p);
            // Any RUNTIME change under core/src (incl. styling .tsx) is
            // higher-blast-radius than a leaf change — core is what everything
            // composites over, so a change there warrants review even when it's
            // styling-only. Docs/tests/stories are excluded (they don't gate).
            const isCoreRuntime = (p) =>
              /^packages\/core\/src\/.+\.tsx?$/.test(p) &&
              !/\.test\.tsx?$/.test(p) &&
              !/\.doc\.mjs$/.test(p) &&
              !/\.stories\.tsx?$/.test(p);

            // ============ HIGH-RISK CODE ============
            const codeReasons = [];
            const newPackage = files.some(
              (f) => f.status === 'added' &&
                /^packages\/[^/]+\/package\.json$/.test(f.filename),
            );
            if (newPackage) codeReasons.push('new package');
            const newComponent = files.some(
              (f) => f.status === 'added' && isNewComponentBarrel(f.filename),
            );
            if (newComponent) codeReasons.push('new component/module');
            const apiSurface = consideredCode.some(
              (p) => isSrcBarrel(p) || /^packages\/[^/]+\/package\.json$/.test(p),
            );
            if (apiSurface && !newPackage && !newComponent) {
              codeReasons.push('public API surface change');
            }
            const coreChange = paths.some(isCoreRuntime);
            if (coreChange && !codeReasons.includes('new component/module')) {
              codeReasons.push('core change');
            }
            // Eng owners self-serve code — no code tag for them.
            const codeHighRisk = codeReasons.length > 0 && !authorIsEng;

            // ============ DESIGN-AFFECTING ============
            // DESIGN SPACES trigger this gate; SAFE SPACES never do (both
            // defined above). Keyed on visual signals, NOT on "a new dir
            // appeared" (that caught infra like i18n) and NOT on docs
            // (.doc.mjs / .md / content).
            //   - Component StyleX — visual changes to shipped components,
            //     anywhere except a safe space.
            //   - themes / templates — design spaces (themes src, template .tsx).
            //   - docsite — a published design surface, but only its VISUAL dirs
            //     (app/, components/, themes/); blog/markdown content, lib/data
            //     plumbing, generated output, and tests are skipped.
            const isDocsiteVisual = (p) =>
              /^apps\/docsite\/src\/(app|components|themes)\/.+\.(tsx|stylex\.ts)$/.test(p) &&
              !/\.test\.tsx?$/.test(p);
            const designReasons = [];
            if (paths.some((p) => /\.stylex\.tsx?$/.test(p) && !isSafeSpace(p))) designReasons.push('StyleX styles');
            if (paths.some((p) => /^packages\/themes\/.+\/src\/.+\.tsx?$/.test(p))) designReasons.push('theme/token change');
            if (paths.some((p) => /^packages\/cli\/templates\/.+\.tsx$/.test(p))) designReasons.push('template change');
            if (paths.some(isDocsiteVisual)) designReasons.push('docsite visual change');
            // Design owners self-serve design — no design tag for them.
            const designAffecting = designReasons.length > 0 && !authorIsDesign;

            core.info(`author=@${author} eng=${authorIsEng} design=${authorIsDesign}`);
            core.info(`code: ${codeHighRisk} (${codeReasons.join(', ') || '-'})`);
            core.info(`design: ${designAffecting} (${designReasons.join(', ') || '-'})`);

            // --- Resolve approvals by reading reviews (fork-safe). ---
            // The clear job runs on pull_request_review, but that event does NOT
            // reliably dispatch a workflow run for FORK PRs — so a fork
            // contributor's gate would never clear via that path. Instead, read
            // the PR's reviews here (this job runs on pull_request_target and
            // workflow_dispatch, both of which work for forks) and treat a gate
            // as satisfied when an entitled owner has approved:
            //   code gate   → a CODEOWNER approval
            //   design gate → a DESIGNOWNER or CODEOWNER approval
            // We use each reviewer's LATEST review state so a later
            // CHANGES_REQUESTED/DISMISSED correctly un-satisfies it.
            let codeApproved = false;
            let designApproved = false;
            try {
              const reviews = await github.paginate(github.rest.pulls.listReviews, {
                owner, repo, pull_number: pr.number, per_page: 100,
              });
              const latestByUser = new Map();
              for (const r of reviews) {
                if (!r.user) continue;
                // Ignore comment-only reviews; keep the latest APPROVED /
                // CHANGES_REQUESTED / DISMISSED per reviewer.
                if (r.state === 'COMMENTED') continue;
                latestByUser.set(r.user.login.toLowerCase(), r.state);
              }
              for (const [login, state] of latestByUser) {
                if (state !== 'APPROVED') continue;
                if (codeOwners.includes(login)) { codeApproved = true; designApproved = true; }
                else if (designOwners.includes(login)) { designApproved = true; }
              }
            } catch (e) {
              core.warning(`Could not read reviews: ${e.message}`);
            }

            // Effective gate = detected gate minus what an entitled owner
            // already approved.
            const codeGated = codeHighRisk && !codeApproved;
            const designGated = designAffecting && !designApproved;
            core.info(`approvals: code=${codeApproved} design=${designApproved} → codeGated=${codeGated} designGated=${designGated}`);

            // --- Apply labels. ---
            const current = pr.labels.map((l) => l.name);
            const toAdd = [];
            if (codeGated && !current.includes(CODE)) toAdd.push(CODE);
            if (designGated && !current.includes(DESIGN)) toAdd.push(DESIGN);
            // A quiet "community" marker on PRs authored by someone who is not
            // on the eng or design team, so the contribution queue is filterable
            // (label:community) separately from the review gates. Absence = team.
            const authorIsOwner = authorIsEng || authorIsDesign;
            if (!authorIsOwner && !current.includes(COMMUNITY)) toAdd.push(COMMUNITY);
            if (toAdd.length) {
              await github.rest.issues.addLabels({
                owner, repo, issue_number: pr.number, labels: toAdd,
              });
            }
            // Keep it accurate: if an owner's PR somehow carries it (e.g. author
            // was added to an owners file after opening), drop it.
            if (authorIsOwner && current.includes(COMMUNITY)) {
              try {
                await github.rest.issues.removeLabel({
                  owner, repo, issue_number: pr.number, name: COMMUNITY,
                });
              } catch (e) {
                core.warning(`Could not remove ${COMMUNITY}: ${e.message}`);
              }
            }
            // Remove gate labels an entitled owner has already approved away
            // (fork-safe clearing — the pull_request_review clear job doesn't
            // fire for forks, so we reconcile here from the reviews we read).
            async function dropLabel(name) {
              try {
                await github.rest.issues.removeLabel({
                  owner, repo, issue_number: pr.number, name,
                });
                core.info(`Cleared ${name} (approved).`);
              } catch (e) {
                core.warning(`Could not remove ${name}: ${e.message}`);
              }
            }
            if (!codeGated && current.includes(CODE)) await dropLabel(CODE);
            if (!designGated && current.includes(DESIGN)) await dropLabel(DESIGN);

            // --- Request reviewers (can't request the author; ignore 422s). ---
            async function requestReviewers(handles) {
              const reviewers = [...new Set(handles)].filter((h) => h !== author);
              if (!reviewers.length) return;
              try {
                await github.rest.pulls.requestReviewers({
                  owner, repo, pull_number: pr.number, reviewers,
                });
              } catch (e) {
                core.warning(`requestReviewers(${reviewers.join(',')}) failed: ${e.message}`);
              }
            }
            if (codeGated) await requestReviewers(codeOwners);
            if (designGated) await requestReviewers(designOwners);

            // --- Either gate disables auto-merge. ---
            if ((codeGated || designGated) && pr.auto_merge) {
              try {
                await github.graphql(
                  `mutation ($id: ID!) {
                     disablePullRequestAutoMerge(input: { pullRequestId: $id }) {
                       pullRequest { number }
                     }
                   }`,
                  { id: pr.node_id },
                );
                core.info('Disabled auto-merge (review required).');
              } catch (e) {
                core.warning(`Could not disable auto-merge: ${e.message}`);
              }
            }

            // No explanatory comment is posted here on purpose. The label + the
            // auto-merge disable are the mechanical signal; the Copilot reviewer
            // reads the label (see .github/copilot-instructions.md) and explains
            // *why* review is needed with actual judgment — better than a static
            // comment could.

            // --- The blocking gate: a "review-required" check run. ---
            // When gated, we set conclusion=action_required — which BLOCKS a
            // required check (GitHub only treats success/skipped/neutral as
            // passing) but renders as an orange "Action required", NOT a red
            // failure, so the UI signal reads "needs review" rather than
            // "something broke". An owner's approval flips it to success (see the
            // clear job). Make this a required status check named "review-required"
            // in branch protection so write-access internal contributors are held
            // too — a required check blocks non-admins regardless of write access.
            const gated = codeGated || designGated;
            const gateReasons = [
              ...(codeGated ? codeReasons : []),
              ...(designGated ? designReasons.map((r) => `design: ${r}`) : []),
            ];
            try {
              await github.rest.checks.create({
                owner,
                repo,
                name: 'review-required',
                head_sha: pr.head.sha,
                status: 'completed',
                conclusion: gated ? 'action_required' : 'success',
                output: gated
                  ? {
                      title: 'Review required before merge',
                      summary: [
                        'This PR needs a human review before it can merge:',
                        '',
                        ...gateReasons.map((r) => `- ${r}`),
                        '',
                        'It clears automatically when an entitled owner approves',
                        '(code owner for code, design owner or code owner for design).',
                        'Eng owners self-serve code; design owners self-serve design.',
                      ].join('\n'),
                    }
                  : {
                      title: 'No review required',
                      summary:
                        'No high-risk code or design-affecting change was detected for this author, so no human review is required to merge.',
                    },
              });
              core.info(`review-required check: ${gated ? 'action_required' : 'success'}`);
            } catch (e) {
              core.warning(`Could not set review-required check: ${e.message}`);
            }
            } // end flagOne

  # Anchor job for the review-clear chain. On a review submission the flag job
  # is skipped (it only runs on pull_request_target / workflow_dispatch), so
  # without a job that actually runs, the workflow run could end up "skipped"
  # rather than "completed" and not reliably fire the review-clear workflow_run.
  # This tiny job always runs on pull_request_review so the workflow completes,
  # letting review-clear.yml resolve the PR and re-dispatch the fork-safe clear.
  review-anchor:
    if: github.event_name == 'pull_request_review' && github.event.review.state == 'approved'
    name: Anchor review-clear chain
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Note approval
        run: echo "Approval on PR #${{ github.event.pull_request.number }} — review-clear will re-dispatch the flag job."
